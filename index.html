<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>مدرب قواعد اللغة الإنجليزية</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --line: #e4e9f2;
      --blue: #0ea5e9;
      --green: #16a34a;
      --gold: #caa000;
      --rose: #e11d48;
      --fire: #f97316;
      --shadow: 0 14px 34px rgba(16, 24, 40, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #eef8ff 0, var(--bg) 220px);
      letter-spacing: 0;
    }

    button, input {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .phone, .auth-screen {
      width: min(430px, 100%);
      min-height: 100vh;
      margin: 0 auto;
    }

    .phone {
      padding: 12px 12px 24px;
    }

    .app-top {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid rgba(228, 233, 242, 0.9);
      margin-bottom: 8px;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-dot {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #e5f6ff;
      color: #0284c7;
      font-weight: 900;
      font-size: 0.86rem;
      flex: 0 0 auto;
    }

    .brand strong {
      display: block;
      font-size: 0.98rem;
      line-height: 1.15;
    }

    .brand small {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      margin-top: 2px;
      max-width: 150px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-tools {
      display: flex;
      gap: 5px;
      align-items: center;
      flex: 0 0 auto;
    }

    .tiny-btn {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      padding: 0 8px;
      font-size: 0.71rem;
      font-weight: 850;
    }

    .mini-stats {
      display: grid;
      grid-template-columns: 54px repeat(3, 1fr);
      gap: 7px;
      margin: 8px 0 10px;
      align-items: stretch;
    }

    .mini-card {
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
      display: grid;
      place-items: center;
      text-align: center;
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.04);
      padding: 6px 4px;
    }

    .mini-card strong {
      display: block;
      direction: ltr;
      font-size: 1.02rem;
      line-height: 1;
      margin-bottom: 4px;
    }

    .mini-card span {
      display: block;
      color: var(--muted);
      font-size: 0.66rem;
      font-weight: 850;
    }

    .done strong { color: var(--green); }
    .errors strong { color: var(--rose); }
    .left strong { color: var(--gold); }

    .flame-card {
      background: transparent;
      border: 0;
      box-shadow: none;
      min-height: 52px;
      padding: 0;
    }

    .flame-shape {
      width: 39px;
      height: 47px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #ffbd2f 0%, var(--fire) 55%, #dc3b10 100%);
      border-radius: 52% 52% 48% 48% / 68% 68% 36% 36%;
      transform: rotate(7deg);
      box-shadow: 0 7px 16px rgba(249, 115, 22, 0.24);
    }

    .flame-shape span {
      direction: ltr;
      transform: rotate(-7deg);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 900;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.22);
    }

    .question-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .progress-strip {
      height: 5px;
      background: #e7edf6;
    }

    .progress-strip span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--fire));
    }

    .question-body {
      padding: 14px;
    }

    .q-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 850;
      margin-bottom: 10px;
    }

    .question-text {
      min-height: 116px;
      display: flex;
      align-items: center;
      direction: ltr;
      text-align: left;
      font-size: 1.23rem;
      line-height: 1.55;
      font-weight: 850;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
    }

    .answers {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .answer-btn {
      width: 100%;
      min-height: 58px;
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 10px;
      align-items: center;
      direction: ltr;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 10px;
      font-weight: 750;
    }

    .answer-key {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #f0f4f9;
      font-size: 0.82rem;
      font-weight: 900;
    }

    .answer-btn.correct {
      border-color: #95d9a9;
      background: #edfbf1;
    }

    .answer-btn.wrong {
      border-color: #f0a2b5;
      background: #fff1f4;
    }

    .answer-btn:disabled {
      cursor: default;
    }

    .feedback {
      display: none;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fbfdff;
    }

    .feedback.show { display: block; }

    .feedback-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 42px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-weight: 900;
      font-size: 0.9rem;
    }

    .feedback-head.ok { color: var(--green); }
    .feedback-head.no { color: var(--rose); }

    .feedback-body {
      direction: ltr;
      text-align: left;
      line-height: 1.72;
      color: #27364a;
      padding: 12px;
      font-size: 0.95rem;
    }

    .nav-only {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .nav-btn {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      font-weight: 900;
    }

    .nav-btn.primary {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .gpt-btn {
      width: 100%;
      min-height: 44px;
      margin-top: 12px;
      border: 1px solid #9fd3f4;
      border-radius: 999px;
      background: #eaf7ff;
      color: #0369a1;
      font-weight: 900;
    }

    .auth-screen {
      padding: 24px 16px;
      display: grid;
      align-items: center;
    }

    .auth-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .auth-card h1 {
      margin: 0 0 6px;
      font-size: 1.28rem;
    }

    .auth-card p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.88rem;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .auth-tab, .auth-submit {
      min-height: 42px;
      border-radius: 999px;
      font-weight: 900;
    }

    .auth-tab {
      border: 1px solid var(--line);
      background: #fff;
    }

    .auth-tab.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 850;
    }

    .field input {
      width: 100%;
      min-height: 44px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .field input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.12);
    }

    .auth-submit {
      width: 100%;
      margin-top: 14px;
      border: 0;
      background: var(--ink);
      color: #fff;
    }

    .auth-msg {
      min-height: 22px;
      margin-top: 10px;
      color: var(--rose);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .sheet {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(16, 24, 40, 0.35);
      display: grid;
      align-items: end;
    }

    .sheet-panel {
      width: min(430px, 100%);
      max-height: 84vh;
      margin: 0 auto;
      overflow: auto;
      border-radius: 16px 16px 0 0;
      background: #fff;
      box-shadow: 0 -18px 48px rgba(16, 24, 40, 0.18);
      padding: 14px;
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .sheet-head h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .close-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 900;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .analysis-card, .list-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
      padding: 10px;
    }

    .analysis-card strong {
      display: block;
      direction: ltr;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .analysis-card span, .list-item p {
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.82rem;
    }

    .section-title {
      margin: 14px 0 8px;
      font-weight: 900;
      font-size: 0.92rem;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .list-item button {
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: inherit;
      padding: 0;
    }

    .list-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.9rem;
    }

    .empty {
      min-height: 200px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 18px;
    }

    @media (min-width: 431px) {
      body {
        background:
          linear-gradient(90deg, rgba(229, 238, 248, 0.65) 0 1px, transparent 1px 100%),
          linear-gradient(0deg, rgba(229, 238, 248, 0.65) 0 1px, transparent 1px 100%),
          #eef3fa;
        background-size: 34px 34px;
      }

      .phone, .auth-screen {
        background: linear-gradient(180deg, #eef8ff 0, var(--bg) 220px);
      }
    }
  </style>
</head>
<body>
  <section class="auth-screen" id="authScreen">
    <form class="auth-card" id="authForm">
      <h1>English Grammar</h1>
      <p>سجل دخولك ليحفظ التطبيق تقدمك وتحليل أخطائك على هذا الجهاز.</p>
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" type="button">دخول</button>
        <button class="auth-tab" id="registerTab" type="button">تسجيل</button>
      </div>
      <div class="field">
        <label for="usernameInput">اسم المستخدم</label>
        <input id="usernameInput" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="passwordInput">كلمة المرور</label>
        <input id="passwordInput" type="password" autocomplete="current-password" required>
      </div>
      <button class="auth-submit" id="authSubmit" type="submit">دخول</button>
      <div class="auth-msg" id="authMessage"></div>
    </form>
  </section>

  <main class="phone" id="app" hidden>
    <header class="app-top">
      <div class="brand">
        <div class="brand-dot">G</div>
        <div>
          <strong>English Grammar</strong>
          <small id="userLabel"></small>
        </div>
      </div>
      <div class="top-tools">
        <button class="tiny-btn" id="completedBtn" type="button">المنجزة</button>
        <button class="tiny-btn" id="analysisBtn" type="button">تحليل</button>
        <button class="tiny-btn" id="logoutBtn" type="button">خروج</button>
      </div>
    </header>

    <section class="mini-stats" aria-label="ملخص التقدم">
      <div class="mini-card flame-card">
        <div class="flame-shape"><span id="todayMinutes">0</span></div>
      </div>
      <div class="mini-card done"><strong id="masteredCount">0</strong><span>أتقنت</span></div>
      <div class="mini-card errors"><strong id="errorCount">0</strong><span>أخطاء</span></div>
      <div class="mini-card left"><strong id="remainingCount">0</strong><span>متبقي</span></div>
    </section>

    <section class="question-card" aria-live="polite">
      <div class="progress-strip"><span id="progressBar"></span></div>
      <div class="question-body" id="questionArea"></div>
    </section>
  </main>

  <section class="sheet" id="sheet" hidden>
    <div class="sheet-panel">
      <div class="sheet-head">
        <h2 id="sheetTitle"></h2>
        <button class="close-btn" id="closeSheet" type="button">×</button>
      </div>
      <div id="sheetBody"></div>
    </div>
  </section>

  <script id="questions-data" type="application/json">[{"id":"q3","number":3,"text":"Water ______ at 100 degrees Celsius.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"is boiling"},{"key":"B","text":"boils"},{"key":"C","text":"boil"},{"key":"D","text":"has boiled"}],"correct":"B","explanation":"We use the Present Simple (boils) for scientific facts and universal truths. Option A (is boiling) is present continuous, used for actions happening right now, not general facts. Option C (boil) lacks the -s for third person singular. Option D (has boiled) is present perfect, which doesn't fit a timeless fact."},{"id":"q5","number":5,"text":"She can't come to the phone; she ______ a shower.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"takes"},{"key":"B","text":"has taken"},{"key":"C","text":"is taking"},{"key":"D","text":"took"}],"correct":"C","explanation":"An action happening right now (at the moment of speaking) calls for Present Continuous (is taking). Option A (takes) would suggest a habitual action. Option B (has taken) would mean she already finished the shower. Option D (took) is past simple, not now."},{"id":"q8","number":8,"text":"Look at those clouds! It ______.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"is going to rain"},{"key":"B","text":"rains"},{"key":"C","text":"has rained"},{"key":"D","text":"rained"}],"correct":"A","explanation":"When there is present evidence (clouds) for a future prediction, we use \"be going to\" (is going to rain). Option B (rains) is present simple for schedules, not predictions with evidence. Option C and D are past/present perfect, wrong time."},{"id":"q101","number":101,"text":"The woman ______ lives next door is a surgeon.","level":"Beginner","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"who"},{"key":"C","text":"what"},{"key":"D","text":"whom"}],"correct":"B","explanation":"\"Who\" is used for the subject of a relative clause referring to people. \"Which\" is for things, \"what\" is not a relative pronoun, and \"whom\" is for objects."},{"id":"q102","number":102,"text":"This is the book ______ I told you about.","level":"Beginner","topic":"الجمل الوصلية","options":[{"key":"A","text":"who"},{"key":"B","text":"what"},{"key":"C","text":"that"},{"key":"D","text":"where"}],"correct":"C","explanation":"\"That\" can refer to things in defining relative clauses. \"Who\" is for people, \"what\" is incorrect (should be \"the thing that\"), \"where\" is for places."},{"id":"q105","number":105,"text":"There's a man here ______ wants to speak to you.","level":"Beginner","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"who"},{"key":"C","text":"what"},{"key":"D","text":"where"}],"correct":"B","explanation":"Subject relative clause for person: \"who\". \"Which\" things, \"what\" not possible, \"where\" place."},{"id":"q108","number":108,"text":"That's the restaurant ______ we had our first date.","level":"Beginner","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"where"},{"key":"C","text":"that"},{"key":"D","text":"when"}],"correct":"B","explanation":"\"Where\" for places. \"Which\" needs a preposition (\"in which\"), \"that\" also possible with preposition but less natural, \"when\" time."},{"id":"q113","number":113,"text":"I need someone ______ I can trust.","level":"Beginner","topic":"الجمل الوصلية","options":[{"key":"A","text":"whom"},{"key":"B","text":"which"},{"key":"C","text":"what"},{"key":"D","text":"where"}],"correct":"A","explanation":"Object relative pronoun for person: \"whom\" (or \"who\" informal). \"Which\" things, \"what\" not relative, \"where\" place."},{"id":"q116","number":116,"text":"The boy ______ bike was stolen is my friend.","level":"Beginner","topic":"الجمل الوصلية","options":[{"key":"A","text":"who"},{"key":"B","text":"which"},{"key":"C","text":"whose"},{"key":"D","text":"whom"}],"correct":"C","explanation":"\"Whose\" possessive. \"Who\" subject, \"which\" things, \"whom\" object."},{"id":"q121","number":121,"text":"I need some ______ about the course.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"informations"},{"key":"B","text":"information"},{"key":"C","text":"an information"},{"key":"D","text":"many informations"}],"correct":"B","explanation":"\"Information\" is uncountable, so no plural -s, no \"an\", not used with \"many\". \"Some information\" is correct."},{"id":"q122","number":122,"text":"She gave me ______ good advice.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"some"},{"key":"D","text":"many"}],"correct":"C","explanation":"\"Advice\" is uncountable. We use \"some\" or \"a piece of\". \"A/an\" no, \"many\" for countables."},{"id":"q124","number":124,"text":"How ______ people came to the meeting?","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"much"},{"key":"B","text":"many"},{"key":"C","text":"little"},{"key":"D","text":"any"}],"correct":"B","explanation":"\"People\" is countable, so \"many\". \"Much\" uncountable, \"little\" uncountable, \"any\" is for questions/negatives but not with \"how\" like this."},{"id":"q125","number":125,"text":"There isn't ______ milk left.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"some"},{"key":"B","text":"many"},{"key":"C","text":"any"},{"key":"D","text":"a few"}],"correct":"C","explanation":"Negative sentences use \"any\" with uncountable or plural nouns. \"Some\" positive, \"many\" countable, \"a few\" countable."},{"id":"q129","number":129,"text":"The news ______ shocking.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"were"},{"key":"C","text":"have been"},{"key":"D","text":"is"}],"correct":"D","explanation":"\"News\" is uncountable and singular despite the -s. \"Is\" is correct. \"Are/were\" plural."},{"id":"q130","number":130,"text":"I need ______ pair of scissors.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"some"},{"key":"D","text":"any"}],"correct":"A","explanation":"\"Pair\" is singular and starts with a consonant sound, so \"a\". \"An\" before vowel, \"some\" uncountable/plural, \"any\" negative."},{"id":"q131","number":131,"text":"Mathematics ______ my favorite subject.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"were"},{"key":"C","text":"is"},{"key":"D","text":"have been"}],"correct":"C","explanation":"\"Mathematics\" is singular despite -s. \"Is\" correct. \"Are\" plural."},{"id":"q132","number":132,"text":"We saw ______ elephant at the zoo.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"the"},{"key":"D","text":"some"}],"correct":"B","explanation":"\"Elephant\" starts with a vowel sound, so \"an\". \"A\" before consonants, \"the\" specific (not mentioned before), \"some\" plural/uncountable."},{"id":"q133","number":133,"text":"______ sun rises in the east.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"A"},{"key":"B","text":"An"},{"key":"C","text":"The"},{"key":"D","text":"Some"}],"correct":"C","explanation":"Unique things use \"the\". \"A/an\" would be any sun, incorrect. \"Some\" no."},{"id":"q135","number":135,"text":"He goes to work by ______ bus.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"the"},{"key":"D","text":"no article"}],"correct":"D","explanation":"By + transport without article: by bus, by car. \"A bus\" would be a specific bus, not the means."},{"id":"q139","number":139,"text":"I saw ______ very interesting movie last night.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"the"},{"key":"D","text":"some"}],"correct":"A","explanation":"First mention, singular countable, consonant sound: \"a\". \"An\" before vowel sound."},{"id":"q140","number":140,"text":"Would you like ______ water?","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"some"},{"key":"D","text":"a few"}],"correct":"C","explanation":"Offering uncountable noun: \"some\". \"A/an\" no, \"a few\" countable."},{"id":"q143","number":143,"text":"I found a ______ wallet on the floor.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"leather black small"},{"key":"B","text":"small black leather"},{"key":"C","text":"black leather small"},{"key":"D","text":"leather small black"}],"correct":"B","explanation":"Adjective order: opinion-size-color-origin-material-purpose. \"Small\" (size), \"black\" (color), \"leather\" (material). So \"small black leather\"."},{"id":"q148","number":148,"text":"Each of the team members ______ a role.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"have"},{"key":"B","text":"are"},{"key":"C","text":"has"},{"key":"D","text":"were"}],"correct":"C","explanation":"\"Each\" is singular, so \"has\". \"Have\" plural."},{"id":"q155","number":155,"text":"I need to buy ______ bread.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"a loaf of"},{"key":"C","text":"many"},{"key":"D","text":"a few"}],"correct":"B","explanation":"\"Bread\" uncountable, so \"a loaf of\". \"A\" no, \"many\" no, \"a few\" no."},{"id":"q157","number":157,"text":"We had ______ fantastic time at the party.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"the"},{"key":"D","text":"no article"}],"correct":"A","explanation":"\"Have a good/great/fantastic time\" is a fixed expression with \"a\"."},{"id":"q161","number":161,"text":"I'm interested ______ learning Japanese.","level":"Beginner","topic":"الجر والتراكيب","options":[{"key":"A","text":"at"},{"key":"B","text":"on"},{"key":"C","text":"for"},{"key":"D","text":"in"}],"correct":"D","explanation":"\"Interested in\" + noun/gerund. \"At/on/for\" incorrect prepositions."},{"id":"q162","number":162,"text":"She's married ______ a doctor.","level":"Beginner","topic":"الجر والتراكيب","options":[{"key":"A","text":"with"},{"key":"B","text":"to"},{"key":"C","text":"of"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Married to\", not \"married with\". \"With\" is a common direct translation error."},{"id":"q166","number":166,"text":"I'm looking forward ______ you soon.","level":"Beginner","topic":"الجر والتراكيب","options":[{"key":"A","text":"to see"},{"key":"B","text":"to seeing"},{"key":"C","text":"seeing"},{"key":"D","text":"for seeing"}],"correct":"B","explanation":"\"Look forward to\" + gerund (to is a preposition here). \"To see\" infinitive mistake."},{"id":"q170","number":170,"text":"She's not very good ______ math.","level":"Beginner","topic":"الجر والتراكيب","options":[{"key":"A","text":"in"},{"key":"B","text":"at"},{"key":"C","text":"on"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Good at\" something. \"In\" is for \"good in a subject\" occasionally but \"good at\" is standard for skills."},{"id":"q172","number":172,"text":"He's ______ the phone right now.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"in"},{"key":"B","text":"on"},{"key":"C","text":"at"},{"key":"D","text":"with"}],"correct":"B","explanation":"\"On the phone\" means talking on the telephone."},{"id":"q173","number":173,"text":"We arrived ______ the airport at 6.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to"},{"key":"B","text":"at"},{"key":"C","text":"in"},{"key":"D","text":"on"}],"correct":"B","explanation":"\"Arrive at\" for buildings, stations, airports. \"Arrive in\" for cities/countries. \"To\" is common mistake."},{"id":"q174","number":174,"text":"I have been waiting ______ two hours.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"since"},{"key":"B","text":"for"},{"key":"C","text":"from"},{"key":"D","text":"during"}],"correct":"B","explanation":"\"For\" with a duration (two hours). \"Since\" with a point in time."},{"id":"q175","number":175,"text":"She has been here ______ Monday.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"for"},{"key":"B","text":"from"},{"key":"C","text":"since"},{"key":"D","text":"during"}],"correct":"C","explanation":"\"Since\" + starting point (Monday). \"For\" + duration."},{"id":"q176","number":176,"text":"The cat jumped ______ the table.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"on"},{"key":"B","text":"onto"},{"key":"C","text":"in"},{"key":"D","text":"into"}],"correct":"B","explanation":"Movement to the surface: \"jump onto\". \"On\" indicates location, not movement. \"Into\" entering a volume."},{"id":"q179","number":179,"text":"She's afraid ______ spiders.","level":"Beginner","topic":"الجر والتراكيب","options":[{"key":"A","text":"from"},{"key":"B","text":"of"},{"key":"C","text":"for"},{"key":"D","text":"about"}],"correct":"B","explanation":"\"Afraid of\" something."},{"id":"q180","number":180,"text":"The room is full ______ people.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"with"},{"key":"B","text":"of"},{"key":"C","text":"from"},{"key":"D","text":"by"}],"correct":"B","explanation":"\"Full of\". \"Full with\" is a common mistake."},{"id":"q182","number":182,"text":"She's worried ______ the exam.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"for"},{"key":"B","text":"about"},{"key":"C","text":"of"},{"key":"D","text":"to"}],"correct":"B","explanation":"\"Worried about\" something."},{"id":"q184","number":184,"text":"I prefer tea ______ coffee.","level":"Beginner","topic":"المقارنات","options":[{"key":"A","text":"than"},{"key":"B","text":"from"},{"key":"C","text":"to"},{"key":"D","text":"over"}],"correct":"C","explanation":"\"Prefer X to Y\". \"Than\" is used with comparatives. \"Over\" is sometimes used but \"to\" is standard."},{"id":"q186","number":186,"text":"I'm depending ______ you to help me.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"on"},{"key":"B","text":"in"},{"key":"C","text":"at"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Depend on\" someone."},{"id":"q188","number":188,"text":"I'll pay ______ the meal.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"for"},{"key":"B","text":"on"},{"key":"C","text":"to"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Pay for\" something. \"Pay\" alone means pay someone."},{"id":"q192","number":192,"text":"She's searching ______ her keys.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"of"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"at"}],"correct":"C","explanation":"\"Search for\" something. \"Search\" without preposition means to look through a place (search the house)."},{"id":"q194","number":194,"text":"He's going to complain ______ the noise.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"about"},{"key":"B","text":"for"},{"key":"C","text":"of"},{"key":"D","text":"on"}],"correct":"A","explanation":"\"Complain about\" something."},{"id":"q197","number":197,"text":"I'll pick you ______ at the station.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"up"},{"key":"B","text":"on"},{"key":"C","text":"out"},{"key":"D","text":"in"}],"correct":"A","explanation":"Phrasal verb \"pick up\" (collect). \"Pick on\" bully, \"pick out\" choose, \"pick in\" not standard."},{"id":"q198","number":198,"text":"The plane took ______ an hour late.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"off"},{"key":"B","text":"out"},{"key":"C","text":"up"},{"key":"D","text":"away"}],"correct":"A","explanation":"\"Take off\" depart (plane). \"Take out\" remove, \"take up\" start a hobby, \"take away\" remove."},{"id":"q203","number":203,"text":"She promised ______ me tomorrow.","level":"Beginner","topic":"المصدر و ing","options":[{"key":"A","text":"calling"},{"key":"B","text":"to call"},{"key":"C","text":"call"},{"key":"D","text":"called"}],"correct":"B","explanation":"\"Promise\" + to-infinitive."},{"id":"q205","number":205,"text":"He decided ______ a new language.","level":"Beginner","topic":"المصدر و ing","options":[{"key":"A","text":"learn"},{"key":"B","text":"to learn"},{"key":"C","text":"learning"},{"key":"D","text":"learned"}],"correct":"B","explanation":"\"Decide\" + to-infinitive."},{"id":"q209","number":209,"text":"Don't forget ______ the tickets.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"bring"},{"key":"B","text":"bringing"},{"key":"C","text":"to bring"},{"key":"D","text":"brought"}],"correct":"C","explanation":"\"Forget to do\" = fail to do. \"Forget doing\" = forget a past memory."},{"id":"q214","number":214,"text":"I'd like ______ a word with you.","level":"Beginner","topic":"المصدر و ing","options":[{"key":"A","text":"to have"},{"key":"B","text":"having"},{"key":"C","text":"have"},{"key":"D","text":"had"}],"correct":"A","explanation":"\"Would like\" + to-infinitive."},{"id":"q220","number":220,"text":"I'm busy ______ the report.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"write"},{"key":"B","text":"writing"},{"key":"C","text":"to write"},{"key":"D","text":"wrote"}],"correct":"B","explanation":"\"Busy\" + gerund (busy doing)."},{"id":"q223","number":223,"text":"I saw him ______ the building.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"enter"},{"key":"B","text":"to enter"},{"key":"C","text":"entered"},{"key":"D","text":"entering"}],"correct":"A","explanation":"\"See someone do\" (complete action) or \"doing\" (in progress). Both are grammatical. The test might prefer \"enter\" for a quick action. I'll set A and mention both."},{"id":"q227","number":227,"text":"I'm looking forward to ______ from you.","level":"Beginner","topic":"المصدر و ing","options":[{"key":"A","text":"hear"},{"key":"B","text":"hearing"},{"key":"C","text":"be heard"},{"key":"D","text":"heard"}],"correct":"B","explanation":"\"Look forward to\" + gerund."},{"id":"q234","number":234,"text":"She ______ to be a teacher, but now she's a manager.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"used"},{"key":"B","text":"use"},{"key":"C","text":"uses"},{"key":"D","text":"using"}],"correct":"A","explanation":"\"Used to\" for past state. \"Use\" is wrong spelling, \"uses\" present, \"using\" no."},{"id":"q235","number":235,"text":"It's difficult ______ a good job these days.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"find"},{"key":"B","text":"finding"},{"key":"C","text":"to find"},{"key":"D","text":"found"}],"correct":"C","explanation":"\"It's difficult + to infinitive\". \"It's difficult to find.\" Gerund also possible but infinitive is the standard dummy subject pattern."},{"id":"q237","number":237,"text":"He's too tired ______.","level":"Beginner","topic":"المصدر و ing","options":[{"key":"A","text":"work"},{"key":"B","text":"working"},{"key":"C","text":"to work"},{"key":"D","text":"worked"}],"correct":"C","explanation":"\"Too + adjective + to infinitive\"."},{"id":"q241","number":241,"text":"The bridge ______ last year.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"is built"},{"key":"B","text":"was built"},{"key":"C","text":"built"},{"key":"D","text":"has built"}],"correct":"B","explanation":"Passive past simple: \"was built\". \"Is built\" present, \"built\" active, \"has built\" active."},{"id":"q242","number":242,"text":"English ______ all over the world.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"speaks"},{"key":"B","text":"is spoken"},{"key":"C","text":"spoke"},{"key":"D","text":"has spoken"}],"correct":"B","explanation":"Passive present simple: \"is spoken\"."},{"id":"q253","number":253,"text":"We had our luggage ______ by the porter.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"carry"},{"key":"B","text":"carried"},{"key":"C","text":"to carry"},{"key":"D","text":"carrying"}],"correct":"B","explanation":"\"Have something done\" past participle."},{"id":"q254","number":254,"text":"The windows are cleaned twice a week. (Change to active)","level":"Beginner","topic":"الجمل الوصلية","options":[{"key":"A","text":"clean"},{"key":"B","text":"cleans"},{"key":"C","text":"cleaned"},{"key":"D","text":"is cleaned"}],"correct":"B","explanation":"Active voice: \"Who cleans the windows?\" (subject question, no auxiliary for simple present). \"Clean\" plural, \"cleaned\" past."},{"id":"q256","number":256,"text":"He said, \"I'm tired.\" → He said that ______ tired.","level":"Beginner","topic":"الكلام المنقول والأسئلة","options":[{"key":"A","text":"I'm"},{"key":"B","text":"he's"},{"key":"C","text":"he was"},{"key":"D","text":"he is"}],"correct":"C","explanation":"Reported speech: present → past. \"I'm\" becomes \"he was\"."},{"id":"q259","number":259,"text":"\"Close the door!\" she told me. → She told me ______ the door.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to close"},{"key":"B","text":"close"},{"key":"C","text":"closing"},{"key":"D","text":"closed"}],"correct":"A","explanation":"Reported commands: tell + object + to infinitive."},{"id":"q261","number":261,"text":"\"Don't touch that!\" → She warned us ______ that.","level":"Beginner","topic":"المصدر و ing","options":[{"key":"A","text":"to not touch"},{"key":"B","text":"not to touch"},{"key":"C","text":"not touch"},{"key":"D","text":"don't touch"}],"correct":"B","explanation":"Negative command: not to + infinitive."},{"id":"q266","number":266,"text":"\"I'm going to study abroad,\" she announced. → She announced that she ______ to study abroad.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"is going"},{"key":"B","text":"was going"},{"key":"C","text":"will go"},{"key":"D","text":"goes"}],"correct":"B","explanation":"\"Am/is going to\" → \"was going to\"."},{"id":"q274","number":274,"text":"\"Are you coming with us?\" → They asked if I ______ with them.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"am coming"},{"key":"B","text":"was coming"},{"key":"C","text":"will come"},{"key":"D","text":"come"}],"correct":"B","explanation":"Present continuous → past continuous."},{"id":"q275","number":275,"text":"\"Please, please, help me!\" → She begged me ______ her.","level":"Beginner","topic":"المصدر و ing","options":[{"key":"A","text":"help"},{"key":"B","text":"to help"},{"key":"C","text":"helping"},{"key":"D","text":"helped"}],"correct":"B","explanation":"\"Beg\" + object + to infinitive.\n\n---\n\n**Section 10: Conjunctions and Linking Words (276–310)**"},{"id":"q276","number":276,"text":"She was tired, ______ she continued working.","level":"Beginner","topic":"الروابط والجمل","options":[{"key":"A","text":"so"},{"key":"B","text":"but"},{"key":"C","text":"because"},{"key":"D","text":"although"}],"correct":"B","explanation":"Contrast: \"but\". \"So\" result, \"because\" reason, \"although\" subordinating conjunction."},{"id":"q277","number":277,"text":"I took a taxi ______ I was late.","level":"Beginner","topic":"الروابط والجمل","options":[{"key":"A","text":"so"},{"key":"B","text":"because"},{"key":"C","text":"but"},{"key":"D","text":"so that"}],"correct":"B","explanation":"Reason: \"because\"."},{"id":"q284","number":284,"text":"We left early, ______ we arrived on time.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"so"},{"key":"B","text":"because"},{"key":"C","text":"but"},{"key":"D","text":"although"}],"correct":"A","explanation":"Result: \"so\"."},{"id":"q287","number":287,"text":"Call me ______ you arrive.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"as soon as"},{"key":"B","text":"until"},{"key":"C","text":"while"},{"key":"D","text":"during"}],"correct":"A","explanation":"\"As soon as\" (immediately after). \"Until\" up to that point, \"while\" during, \"during\" prep."},{"id":"q288","number":288,"text":"I'll wait ______ you finish.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"until"},{"key":"B","text":"as soon as"},{"key":"C","text":"after"},{"key":"D","text":"when"}],"correct":"A","explanation":"Up to that time: \"until\". \"As soon as\" would mean I'll wait the moment you finish, not before."},{"id":"q289","number":289,"text":"______ she was reading, the phone rang.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"During"},{"key":"B","text":"While"},{"key":"C","text":"As soon as"},{"key":"D","text":"Until"}],"correct":"B","explanation":"\"While\" + past continuous clause. \"During\" + noun."},{"id":"q292","number":292,"text":"______ it stops raining, we'll stay inside.","level":"Beginner","topic":"الشرطيات والرغبات","options":[{"key":"A","text":"Unless"},{"key":"B","text":"If"},{"key":"C","text":"When"},{"key":"D","text":"As"}],"correct":"A","explanation":"\"Unless\" (if it doesn't). \"If it stops, we'll go out\" opposite meaning. So \"Unless it stops, we'll stay inside.\""},{"id":"q294","number":294,"text":"I like both tea ______ coffee.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"and"},{"key":"B","text":"or"},{"key":"C","text":"nor"},{"key":"D","text":"but"}],"correct":"A","explanation":"\"Both... and...\""},{"id":"q301","number":301,"text":"She is taller ______ her sister.","level":"Beginner","topic":"المقارنات","options":[{"key":"A","text":"than"},{"key":"B","text":"then"},{"key":"C","text":"as"},{"key":"D","text":"that"}],"correct":"A","explanation":"Comparative + than. \"Then\" is time, \"as\" equality, \"that\" no."},{"id":"q302","number":302,"text":"He is the ______ student in the class.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"most intelligent"},{"key":"B","text":"more intelligent"},{"key":"C","text":"intelligentest"},{"key":"D","text":"intelligent"}],"correct":"A","explanation":"Superlative: \"the most intelligent\" (long adjective). \"More\" comparative, \"intelligentest\" wrong form."},{"id":"q305","number":305,"text":"She runs as ______ as a cheetah.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"faster"},{"key":"B","text":"fast"},{"key":"C","text":"fastest"},{"key":"D","text":"more fast"}],"correct":"B","explanation":"As + adjective/adverb + as: \"as fast as\"."},{"id":"q306","number":306,"text":"This is one of ______ interesting books I've read.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"most"},{"key":"B","text":"the most"},{"key":"C","text":"more"},{"key":"D","text":"the more"}],"correct":"B","explanation":"Superlative with \"one of the most\"."},{"id":"q312","number":312,"text":"I wish it ______ raining.","level":"Beginner","topic":"الشرطيات والرغبات","options":[{"key":"A","text":"stops"},{"key":"B","text":"stopped"},{"key":"C","text":"would stop"},{"key":"D","text":"will stop"}],"correct":"C","explanation":"Wish for change: \"would stop\". \"Stopped\" also possible but \"would stop\" expresses annoyance."},{"id":"q313","number":313,"text":"If I ______ you, I wouldn't do that.","level":"Beginner","topic":"الشرطيات والرغبات","options":[{"key":"A","text":"am"},{"key":"B","text":"was"},{"key":"C","text":"were"},{"key":"D","text":"have been"}],"correct":"C","explanation":"Second conditional subjunctive \"were\". \"Was\" accepted informally but \"were\" is grammatically standard."},{"id":"q320","number":320,"text":"I'm proud ______ my son.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B",
