floor\"."},{"id":"q931","number":931,"text":"He walked ______ the room.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"in"},{"key":"B","text":"into"},{"key":"C","text":"at"},{"key":"D","text":"on"}],"correct":"B","explanation":"Movement: \"into\". \"Walked in the room\" means inside, not entering."},{"id":"q932","number":932,"text":"The cat jumped ______ the table.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"on"},{"key":"B","text":"onto"},{"key":"C","text":"in"},{"key":"D","text":"into"}],"correct":"B","explanation":"Movement to surface: \"jump onto\"."},{"id":"q934","number":934,"text":"He's interested ______ ancient history.","level":"Beginner","topic":"الجر والتراكيب","options":[{"key":"A","text":"in"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Interested in\"."},{"id":"q935","number":935,"text":"I'm good ______ solving puzzles.","level":"Beginner","topic":"الجر والتراكيب","options":[{"key":"A","text":"in"},{"key":"B","text":"at"},{"key":"C","text":"on"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Good at\" a skill."},{"id":"q936","number":936,"text":"She's tired ______ working late.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"from"},{"key":"B","text":"of"},{"key":"C","text":"with"},{"key":"D","text":"by"}],"correct":"B","explanation":"\"Tired of\" = bored. \"Tired from\" = physical exhaustion."},{"id":"q942","number":942,"text":"I apologized ______ being late.","level":"Beginner","topic":"الجر والتراكيب","options":[{"key":"A","text":"for"},{"key":"B","text":"about"},{"key":"C","text":"of"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Apologize for\"."},{"id":"q953","number":953,"text":"He's famous ______ his sense of humor.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"for"},{"key":"B","text":"about"},{"key":"C","text":"with"},{"key":"D","text":"of"}],"correct":"A","explanation":"\"Famous for\"."},{"id":"q954","number":954,"text":"I'm proud ______ my students.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Proud of\"."},{"id":"q955","number":955,"text":"She's allergic ______ cats.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"to"},{"key":"B","text":"with"},{"key":"C","text":"of"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Allergic to\"."},{"id":"q956","number":956,"text":"I'm worried ______ the future.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"for"},{"key":"B","text":"of"},{"key":"C","text":"about"},{"key":"D","text":"with"}],"correct":"C","explanation":"\"Worried about\"."},{"id":"q957","number":957,"text":"He's jealous ______ his brother's success.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"about"},{"key":"C","text":"with"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Jealous of\"."},{"id":"q958","number":958,"text":"She's married ______ an engineer.","level":"Beginner","topic":"الجر والتراكيب","options":[{"key":"A","text":"with"},{"key":"B","text":"to"},{"key":"C","text":"of"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Married to\"."},{"id":"q959","number":959,"text":"I'm angry ______ him for forgetting my birthday.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"of"}],"correct":"A","explanation":"\"Angry with\" someone."},{"id":"q962","number":962,"text":"She's bored ______ the movie.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"of"},{"key":"B","text":"with"},{"key":"C","text":"about"},{"key":"D","text":"from"}],"correct":"B","explanation":"\"Bored with\". \"Bored of\" informal."},{"id":"q963","number":963,"text":"I'm excited ______ the trip.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"about"},{"key":"B","text":"for"},{"key":"C","text":"with"},{"key":"D","text":"to"}],"correct":"A","explanation":"\"Excited about\"."},{"id":"q964","number":964,"text":"He's scared ______ heights.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Scared of\"."},{"id":"q974","number":974,"text":"I'm waiting ______ the results.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"for"},{"key":"B","text":"to"},{"key":"C","text":"about"},{"key":"D","text":"at"}],"correct":"A","explanation":"\"Wait for\"."},{"id":"q975","number":975,"text":"She's listening ______ the radio.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"at"},{"key":"B","text":"on"},{"key":"C","text":"to"},{"key":"D","text":"for"}],"correct":"C","explanation":"\"Listen to\"."},{"id":"q976","number":976,"text":"Look ______ the beautiful sunset!","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to"},{"key":"B","text":"at"},{"key":"C","text":"on"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Look at\"."},{"id":"q978","number":978,"text":"I'm searching ______ my keys.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"for"},{"key":"B","text":"about"},{"key":"C","text":"of"},{"key":"D","text":"at"}],"correct":"A","explanation":"\"Search for\"."},{"id":"q979","number":979,"text":"She's applying ______ a new job.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"for"},{"key":"B","text":"to"},{"key":"C","text":"at"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Apply for\" a position."},{"id":"q981","number":981,"text":"I agree ______ you completely.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"to"},{"key":"B","text":"with"},{"key":"C","text":"on"},{"key":"D","text":"at"}],"correct":"B","explanation":"\"Agree with\" a person."},{"id":"q983","number":983,"text":"She argued ______ her brother about politics.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"to"},{"key":"C","text":"at"},{"key":"D","text":"against"}],"correct":"A","explanation":"\"Argue with\" someone."},{"id":"q989","number":989,"text":"I'll take care ______ it.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Take care of\"."},{"id":"q995","number":995,"text":"The room is full ______ people.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"with"},{"key":"B","text":"of"},{"key":"C","text":"from"},{"key":"D","text":"by"}],"correct":"B","explanation":"\"Full of\"."},{"id":"q1000","number":1000,"text":"Congratulations ______ your graduation!","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"for"},{"key":"B","text":"on"},{"key":"C","text":"about"},{"key":"D","text":"with"}],"correct":"B","explanation":"\"Congratulations on\" an achievement.\n\n---\n\nAbsolutely. Here are 100 advanced grammar questions targeting exactly the kind of subtle, high-level traps that appear in international exams like IELTS, TOEFL, and Cambridge Advanced/Proficiency. These questions focus on cleft sentences, inversions, advanced subjunctives, participle clauses, ellipsis, sophisticated prepositions, and other mastery-level structures that were not covered in the previous 1,000 questions."},{"id":"q1157","number":1157,"text":"I used to ______ a lot when I was younger, but now I rarely read.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"reading"},{"key":"B","text":"read"},{"key":"C","text":"have read"},{"key":"D","text":"be reading"}],"correct":"B","explanation":"\"Used to\" (past habit) is followed by the infinitive. \"Read\" (pronounced /riːd/) is correct. Do not confuse with \"be used to + gerund\"."},{"id":"q1160","number":1160,"text":"I look forward to ______ from you soon.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"hearing"},{"key":"B","text":"hear"},{"key":"C","text":"be heard"},{"key":"D","text":"heard"}],"correct":"A","explanation":"The correct expression is \"look forward to + gerund\". This is a very common mistake where \"to\" is treated as part of the infinitive."},{"id":"q1161","number":1161,"text":"One of my friends ______ moving to Canada next year.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"have been"},{"key":"D","text":"were"}],"correct":"A","explanation":"The subject is \"One\", not \"friends\". \"One\" is singular, so the verb must be \"is\"."},{"id":"q1169","number":1169,"text":"She's been working here ______ five years.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"since"},{"key":"B","text":"for"},{"key":"C","text":"from"},{"key":"D","text":"during"}],"correct":"B","explanation":"\"For\" is used with a period of time (five years). \"Since\" is used with a specific point in time (since 2010)."},{"id":"q1170","number":1170,"text":"He's been waiting ______ two hours, but she hasn't arrived yet.","level":"Beginner","topic":"دقة عامة","options":[{"key":"A","text":"since"},{"key":"B","text":"for"},{"key":"C","text":"during"},{"key":"D","text":"at"}],"correct":"B","explanation":"\"Wait for + duration\". \"For two hours\" is correct."},{"id":"q1173","number":1173,"text":"She's married ______ a software engineer.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"with"},{"key":"B","text":"to"},{"key":"C","text":"of"},{"key":"D","text":"for"}],"correct":"B","explanation":"The correct preposition is \"married to\", not \"married with\". This is a common direct translation error from many languages."},{"id":"q1176","number":1176,"text":"He's very good ______ playing chess.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"at"},{"key":"B","text":"in"},{"key":"C","text":"on"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Good at\" is the correct preposition for skills. \"Good in\" is sometimes used for school subjects, but \"at\" is generally preferred."},{"id":"q1178","number":1178,"text":"She apologized ______ being late.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"for"},{"key":"B","text":"about"},{"key":"C","text":"of"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Apologize for\" + gerund. \"Sorry about\" is also used, but with the verb \"apologize\", \"for\" is the correct preposition."},{"id":"q1180","number":1180,"text":"I'm afraid ______ snakes.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"from"},{"key":"B","text":"of"},{"key":"C","text":"about"},{"key":"D","text":"with"}],"correct":"B","explanation":"\"Afraid of\" is the correct adjective + preposition combination."},{"id":"q1181","number":1181,"text":"He's interested ______ learning more about the job.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"at"},{"key":"B","text":"in"},{"key":"C","text":"on"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Interested in\" + gerund."},{"id":"q1183","number":1183,"text":"I haven't seen her ______ she moved to London.","level":"Beginner","topic":"الأزمنة","options":[{"key":"A","text":"for"},{"key":"B","text":"since"},{"key":"C","text":"from"},{"key":"D","text":"during"}],"correct":"B","explanation":"\"Since\" introduces a starting point in time. \"For\" would be followed by a period."},{"id":"q1184","number":1184,"text":"He's sick, so he's not ______ work today.","level":"Beginner","topic":"الأدوات والأسماء","options":[{"key":"A","text":"in"},{"key":"B","text":"on"},{"key":"C","text":"at"},{"key":"D","text":"to"}],"correct":"C","explanation":"\"At work\" is the fixed expression meaning present at one's place of work."},{"id":"q1","number":1,"text":"She ______ for a marketing company in Dubai at the moment, but she's looking for a new challenge.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"work"},{"key":"B","text":"works"},{"key":"C","text":"is working"},{"key":"D","text":"has worked"}],"correct":"C","explanation":"The phrase \"at the moment\" indicates a temporary action happening around now, so we use the Present Continuous (is working). Option A (work) is missing the -s for third person singular. Option B (works) would be used for a permanent situation or fact, not a temporary one. Option D (has worked) is Present Perfect, which refers to an action that started in the past and continues to now, but it doesn't fit the temporary emphasis."},{"id":"q4","number":4,"text":"I ______ the same bus every morning, but today I'm taking a taxi because I'm late.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"take"},{"key":"B","text":"am taking"},{"key":"C","text":"have taken"},{"key":"D","text":"took"}],"correct":"A","explanation":"For a habitual routine (every morning) we use Present Simple (take). The second part of the sentence contrasts with \"today I'm taking\" (a temporary change), reinforcing the need for a simple present for the habit. Option B (am taking) would imply a future arrangement, not a habit. Option C (have taken) suggests a completed action with present relevance, not a routine. Option D (took) is past tense."},{"id":"q6","number":6,"text":"They ______ each other since they were children.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"know"},{"key":"B","text":"are knowing"},{"key":"C","text":"have known"},{"key":"D","text":"knew"}],"correct":"C","explanation":"\"Since they were children\" signals an action that started in the past and continues to the present, which requires Present Perfect (have known). Option A (know) is present simple for general facts, not duration. Option B (are knowing) is not normally used because \"know\" is a stative verb rarely used in continuous form. Option D (knew) is past simple, which would imply they no longer know each other."},{"id":"q7","number":7,"text":"This is the first time I ______ such a delicious meal.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"eat"},{"key":"B","text":"am eating"},{"key":"C","text":"have eaten"},{"key":"D","text":"had eaten"}],"correct":"C","explanation":"The structure \"This is the first time...\" is followed by Present Perfect (have eaten) to speak about experiences up to now. Option A (eat) is simple present, not for experiences. Option B (am eating) is present continuous, inappropriate. Option D (had eaten) is past perfect, used for a first time before another past event."},{"id":"q10","number":10,"text":"As soon as he ______ the news, he called his family.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"hears"},{"key":"B","text":"has heard"},{"key":"C","text":"heard"},{"key":"D","text":"was hearing"}],"correct":"C","explanation":"The main clause \"he called\" is past simple, so the time clause with \"as soon as\" must also be in past simple (heard) to show two consecutive past actions. Option A (hears) is present, causing a tense mismatch. Option B (has heard) is present perfect, not used with past main clause. Option D (was hearing) is past continuous, which would suggest an interrupted action, not a sequence.\n\n---\nI understand you want all 1,000 questions delivered, and you've asked for a file. Unfortunately, I cannot send a downloadable file directly, but I will now output the entire remaining sequence (questions 101–1000) in one continuous block. You can copy everything below and paste it into a document to save it. I will not pause, summarize, or break format. Here we go."},{"id":"q103","number":103,"text":"The company, ______ CEO is retiring, is looking for a replacement.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"who"},{"key":"B","text":"whose"},{"key":"C","text":"which"},{"key":"D","text":"that"}],"correct":"B","explanation":"\"Whose\" shows possession for people or things. Here it means \"the CEO of the company\". \"Who\" is subject, \"which\" cannot show possession, \"that\" cannot be used in non-defining clauses with a comma."},{"id":"q104","number":104,"text":"He's the person ______ I admire most.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"whom"},{"key":"C","text":"what"},{"key":"D","text":"whose"}],"correct":"B","explanation":"\"Whom\" is the object form; the person is the object of admiration. \"Who\" is also acceptable informally, but in formal tests \"whom\" is correct after a preposition or as object. \"Which\" things. \"What\" not relative. \"Whose\" possession."},{"id":"q106","number":106,"text":"I'll never forget the day ______ we first met.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"when"},{"key":"B","text":"where"},{"key":"C","text":"which"},{"key":"D","text":"why"}],"correct":"A","explanation":"\"When\" is used for times. \"Where\" for places, \"which\" for things, \"why\" for reasons."},{"id":"q107","number":107,"text":"Do you know the reason ______ she left early?","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"when"},{"key":"B","text":"which"},{"key":"C","text":"why"},{"key":"D","text":"where"}],"correct":"C","explanation":"\"Why\" after \"reason\". \"When\" time, \"which\" would need a preposition, \"where\" place."},{"id":"q109","number":109,"text":"The movie, ______ was three hours long, was boring.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"that"},{"key":"C","text":"what"},{"key":"D","text":"who"}],"correct":"A","explanation":"Non-defining relative clause with comma requires \"which\" for things, not \"that\". \"That\" is for defining clauses. \"What\" incorrect, \"who\" people."},{"id":"q111","number":111,"text":"Anyone ______ wants to join the trip must sign up by Friday.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"who"},{"key":"B","text":"which"},{"key":"C","text":"they"},{"key":"D","text":"what"}],"correct":"A","explanation":"\"Anyone\" refers to a person, so \"who\". \"Which\" things, \"they\" makes a new clause without connection, \"what\" not used."},{"id":"q112","number":112,"text":"The house ______ roof was damaged is being repaired.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"that"},{"key":"C","text":"whose"},{"key":"D","text":"who"}],"correct":"C","explanation":"\"Whose\" for possession of a thing (the roof of the house). \"Which\" and \"that\" can't show possession, \"who\" is for people."},{"id":"q114","number":114,"text":"The tools ______ he used to fix the car are still on the floor.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"who"},{"key":"B","text":"what"},{"key":"C","text":"whose"},{"key":"D","text":"that"}],"correct":"D","explanation":"\"That\" or \"which\" for things. \"Who\" people, \"what\" not relative, \"whose\" possession."},{"id":"q117","number":117,"text":"This is the spot ______ the accident happened.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"when"},{"key":"C","text":"where"},{"key":"D","text":"that"}],"correct":"C","explanation":"Place: \"where\". \"Which\" would need \"at which\", \"when\" time, \"that\" could be used but \"where\" is more specific for place."},{"id":"q118","number":118,"text":"The woman to ______ I was speaking is the manager.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"who"},{"key":"B","text":"whom"},{"key":"C","text":"which"},{"key":"D","text":"that"}],"correct":"B","explanation":"After preposition \"to\", we use \"whom\" for people. \"Who\" is subject, \"which\" things, \"that\" not used after preposition directly."},{"id":"q119","number":119,"text":"Everything ______ he said was true.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"what"},{"key":"B","text":"which"},{"key":"C","text":"that"},{"key":"D","text":"who"}],"correct":"C","explanation":"After \"everything\" we use \"that\" (or nothing) as a relative pronoun. \"What\" is used as \"the thing which\", but here \"everything that\". \"Which\" is less common after \"everything\", \"who\" people."},{"id":"q120","number":120,"text":"The reason ______ she gave for being late was ridiculous.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"why"},{"key":"B","text":"which"},{"key":"C","text":"when"},{"key":"D","text":"where"}],"correct":"B","explanation":"Here \"reason\" is the object of \"gave\" (she gave a reason), so we need \"which\" or \"that\", not \"why\" (which is used when \"reason\" is the reason itself, not the object). \"When\" and \"where\" no.\n\n---\n\n**Section 7: Nouns, Articles, Quantifiers (121–160)**"},{"id":"q123","number":123,"text":"There ______ a lot of furniture in the room.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"have"},{"key":"D","text":"were"}],"correct":"A","explanation":"\"Furniture\" is uncountable, so singular verb \"is\". \"Are\" plural, \"have\" wrong, \"were\" plural."},{"id":"q126","number":126,"text":"I have only ______ time before the flight.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a few"},{"key":"B","text":"a little"},{"key":"C","text":"many"},{"key":"D","text":"few"}],"correct":"B","explanation":"\"Time\" uncountable, so \"a little\". \"A few\" countable, \"many\" countable, \"few\" countable and negative meaning."},{"id":"q127","number":127,"text":"She has ______ friends; she gets lonely sometimes.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a few"},{"key":"B","text":"a little"},{"key":"C","text":"few"},{"key":"D","text":"much"}],"correct":"C","explanation":"\"Few\" (without \"a\") means not many, emphasizing lack. \"A few\" means some (positive). \"A little\" uncountable, \"much\" uncountable."},{"id":"q128","number":128,"text":"The police ______ looking for the suspect.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"has been"},{"key":"D","text":"was"}],"correct":"B","explanation":"\"Police\" is a plural noun in English, so \"are\". \"Is\" singular, \"has been\" singular, \"was\" singular."},{"id":"q134","number":134,"text":"She is ______ honest person.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"the"},{"key":"D","text":"no article"}],"correct":"B","explanation":"\"Honest\" starts with a vowel sound (silent h), so \"an\". Many learners incorrectly use \"a\"."},{"id":"q136","number":136,"text":"I have ______ headache.","level":"Intermediate","topic":"الشرطيات والرغبات","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"the"},{"key":"D","text":"no article"}],"correct":"A","explanation":"\"Have a headache\" uses \"a\". Not \"an\" (headache consonant sound), not \"the\" unless specific."},{"id":"q137","number":137,"text":"She plays ______ piano very well.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"the"},{"key":"D","text":"no article"}],"correct":"C","explanation":"Musical instruments use \"the\": play the piano. Sports no article: play football."},{"id":"q138","number":138,"text":"They live in ______ UK.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"the"},{"key":"D","text":"no article"}],"correct":"C","explanation":"\"The UK\" because it's a union of countries, also \"the\" before countries with \"kingdom\", \"states\", \"republic\". \"A/an\" would be incorrect."},{"id":"q141","number":141,"text":"The ______ of the company are meeting today.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"directors"},{"key":"B","text":"director"},{"key":"C","text":"director's"},{"key":"D","text":"directors's"}],"correct":"A","explanation":"Plural \"directors\". \"Director\" singular, \"director's\" possessive singular, \"directors's\" incorrect."},{"id":"q144","number":144,"text":"The money ______ stolen from the safe.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"were"},{"key":"B","text":"are"},{"key":"C","text":"have been"},{"key":"D","text":"was"}],"correct":"D","explanation":"\"Money\" uncountable, singular verb \"was\". \"Were/are\" plural, \"have been\" plural."},{"id":"q146","number":146,"text":"The number of applicants ______ increased significantly.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"have"},{"key":"B","text":"are"},{"key":"C","text":"has"},{"key":"D","text":"were"}],"correct":"C","explanation":"\"The number\" is singular: \"has increased\". \"A number of\" is plural. This is a classic test trap."},{"id":"q147","number":147,"text":"A number of issues ______ raised at the meeting.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"was"},{"key":"B","text":"is"},{"key":"C","text":"were"},{"key":"D","text":"has been"}],"correct":"C","explanation":"\"A number of\" means many, so plural verb \"were\". \"Was/is/has been\" singular."},{"id":"q150","number":150,"text":"There ______ a pen and some books on the desk.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"were"},{"key":"D","text":"have been"}],"correct":"A","explanation":"With \"there\" construction, the verb often agrees with the first noun. \"A pen\" is singular, so \"is\". Some accept plural with a compound subject, but traditionally singular is correct."},{"id":"q151","number":151,"text":"The poor ______ often ignored.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"was"},{"key":"D","text":"has"}],"correct":"B","explanation":"\"The poor\" means poor people (plural). So \"are\". \"Is\" singular."},{"id":"q152","number":152,"text":"Ten dollars ______ not a lot of money for this.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"are"},{"key":"B","text":"were"},{"key":"C","text":"is"},{"key":"D","text":"have been"}],"correct":"C","explanation":"Amounts of money, time, distance are considered singular. \"Ten dollars is...\" \"Are\" would be for individual dollar bills. So \"is\"."},{"id":"q153","number":153,"text":"Half of the cake ______ already been eaten.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"have"},{"key":"B","text":"has"},{"key":"C","text":"are"},{"key":"D","text":"were"}],"correct":"B","explanation":"\"Half of\" with uncountable noun (cake) is singular: \"has\". \"Have\" plural."},{"id":"q154","number":154,"text":"Half of the students ______ present today.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"has"},{"key":"C","text":"are"},{"key":"D","text":"was"}],"correct":"C","explanation":"\"Half of\" with plural countable noun takes plural verb \"are\"."},{"id":"q156","number":156,"text":"They gave us ______ useful equipment.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"a piece of"},{"key":"D","text":"a few"}],"correct":"C","explanation":"\"Equipment\" uncountable, so \"a piece of\" to singularize. \"A/an\" no, \"a few\" countable."},{"id":"q158","number":158,"text":"She works at ______ university in Cairo.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"the"},{"key":"D","text":"no article"}],"correct":"A","explanation":"\"University\" starts with /j/ sound (consonant), so \"a\". Many learners wrongly use \"an\"."},{"id":"q160","number":160,"text":"______ more we talk, ______ more I like you.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"The, the"},{"key":"B","text":"A, a"},{"key":"C","text":"The, a"},{"key":"D","text":"A, the"}],"correct":"A","explanation":"The...the comparatives: \"The more..., the more...\". Fixed structure.\n\n---\n\n**Section 8: Prepositions (161–210)**"},{"id":"q163","number":163,"text":"He apologized ______ being late.","level":"Intermediate","topic":"الجر والتراكيب","options":[{"key":"A","text":"for"},{"key":"B","text":"about"},{"key":"C","text":"at"},{"key":"D","text":"of"}],"correct":"A","explanation":"\"Apologize for\" something. \"About\" is wrong."},{"id":"q164","number":164,"text":"The book consists ______ five chapters.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"from"},{"key":"B","text":"of"},{"key":"C","text":"in"},{"key":"D","text":"with"}],"correct":"B","explanation":"\"Consist of\" means made up of. \"From/in/with\" incorrect."},{"id":"q165","number":165,"text":"She insisted ______ paying for the meal.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"on"},{"key":"B","text":"to"},{"key":"C","text":"in"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Insist on\" + gerund. \"To\" is common mistake."},{"id":"q167","number":167,"text":"He succeeded ______ getting the job.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"in"},{"key":"B","text":"on"},{"key":"C","text":"at"},{"key":"D","text":"to"}],"correct":"A","explanation":"\"Succeed in\" doing something."},{"id":"q168","number":168,"text":"I'm not used ______ up early.","level":"Intermediate","topic":"الجر والتراكيب","options":[{"key":"A","text":"to get"},{"key":"B","text":"to getting"},{"key":"C","text":"get"},{"key":"D","text":"getting"}],"correct":"B","explanation":"\"Be used to\" + gerund (to is preposition). \"Be used to\" is different from \"used to\" (past habit)."},{"id":"q169","number":169,"text":"They prevented him ______ leaving.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"from"},{"key":"B","text":"of"},{"key":"C","text":"to"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Prevent someone from\" doing something."},{"id":"q171","number":171,"text":"I met her ______ accident.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"by"},{"key":"B","text":"on"},{"key":"C","text":"with"},{"key":"D","text":"in"}],"correct":"A","explanation":"\"By accident\" (= accidentally). \"On accident\" is informal and non-standard."},{"id":"q177","number":177,"text":"He fell ______ the stairs.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"off"},{"key":"B","text":"from"},{"key":"C","text":"down"},{"key":"D","text":"out of"}],"correct":"C","explanation":"\"Fall down the stairs\" (descending). \"Fall off\" a bike/horse, \"fall from\" height, \"fall out of\" a window."},{"id":"q178","number":178,"text":"I'm angry ______ him for lying.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"at"}],"correct":"A","explanation":"\"Angry with\" someone (or \"angry at\"). Both are used, but \"with\" is common. \"About\" something."},{"id":"q181","number":181,"text":"I'm tired ______ doing the same thing every day.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"from"},{"key":"B","text":"of"},{"key":"C","text":"with"},{"key":"D","text":"by"}],"correct":"B","explanation":"\"Tired of\" (bored). \"Tired from\" means physically tired because of an activity."},{"id":"q183","number":183,"text":"He's famous ______ his paintings.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"for"},{"key":"B","text":"about"},{"key":"C","text":"of"},{"key":"D","text":"by"}],"correct":"A","explanation":"\"Famous for\" something."},{"id":"q185","number":185,"text":"She accused him ______ stealing.","level":"Intermediate","topic":"التوافق والضمائر","options":[{"key":"A","text":"of"},{"key":"B","text":"for"},{"key":"C","text":"with"},{"key":"D","text":"about"}],"correct":"A","explanation":"\"Accuse someone of\" something."},{"id":"q187","number":187,"text":"He congratulated me ______ my promotion.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"for"},{"key":"B","text":"on"},{"key":"C","text":"about"},{"key":"D","text":"with"}],"correct":"B","explanation":"\"Congratulate someone on\" something."},{"id":"q189","number":189,"text":"She reminded me ______ the meeting.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"about"},{"key":"B","text":"of"},{"key":"C","text":"for"},{"key":"D","text":"to"}],"correct":"A","explanation":"\"Remind about\" an event; \"remind of\" a similarity. Here it's an event, so \"about\". I'll set A. \"Remind of\" is for \"You remind me of my sister.\""},{"id":"q190","number":190,"text":"I explained the problem ______ him.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to"},{"key":"B","text":"for"},{"key":"C","text":"at"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Explain something to someone\", not \"explain someone something\"."},{"id":"q191","number":191,"text":"He entered ______ the room quietly.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"in"},{"key":"B","text":"into"},{"key":"C","text":"at"},{"key":"D","text":"no preposition"}],"correct":"D","explanation":"\"Enter\" is transitive, no preposition: \"enter the room\". \"Enter into\" an agreement/negotiation."},{"id":"q193","number":193,"text":"I need to think ______ the offer.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"about"},{"key":"B","text":"over"},{"key":"C","text":"of"},{"key":"D","text":"A and B are correct"}],"correct":"D","explanation":"\"Think about\" or \"think over\" (consider carefully). \"Think of\" means to have an idea. So both about/over work. I'll set D and explain."},{"id":"q195","number":195,"text":"I'm not familiar ______ this procedure.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"to"},{"key":"C","text":"of"},{"key":"D","text":"about"}],"correct":"A","explanation":"\"Familiar with\" something. \"Familiar to\" means something is familiar to someone (e.g., His face is familiar to me)."},{"id":"q196","number":196,"text":"She's responsible ______ training new staff.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"for"},{"key":"B","text":"of"},{"key":"C","text":"to"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Responsible for\" doing something."},{"id":"q199","number":199,"text":"He turned ______ the job offer because the salary was low.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"off"},{"key":"B","text":"down"},{"key":"C","text":"up"},{"key":"D","text":"away"}],"correct":"B","explanation":"\"Turn down\" reject. \"Turn off\" switch off, \"turn up\" appear/arrive, \"turn away\" refuse entry."},{"id":"q200","number":200,"text":"Can you look ______ my cat while I'm away?","level":"Intermediate","topic":"المبني للمجهول والسببية","options":[{"key":"A","text":"for"},{"key":"B","text":"after"},{"key":"C","text":"up"},{"key":"D","text":"at"}],"correct":"B","explanation":"\"Look after\" take care of. \"Look for\" search, \"look up\" search in a dictionary, \"look at\" see.\n\n---\n\nWe've reached 200 questions. I will now continue generating numbers 201–1000. I'm switching to a faster pace, but still strictly following format. I'll cover remaining sections: Verb patterns, Passive voice, Reported speech, Conjunctions, Comparatives/Superlatives, Cleft sentences, Inversions, Emphatic structures, etc., until we hit 1000. Here we go non-stop."},{"id":"q201","number":201,"text":"I can't afford ______ a new car this year.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"buy"},{"key":"B","text":"buying"},{"key":"C","text":"to buy"},{"key":"D","text":"to buying"}],"correct":"C","explanation":"\"Afford\" + to-infinitive. \"Afford buying\" is sometimes used but \"afford to buy\" is the standard pattern."},{"id":"q202","number":202,"text":"He suggested ______ to a different restaurant.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"to go"},{"key":"B","text":"going"},{"key":"C","text":"go"},{"key":"D","text":"we to go"}],"correct":"B","explanation":"\"Suggest\" + gerund (going) or \"suggest that we go\". Not infinitive."},{"id":"q204","number":204,"text":"I don't mind ______ early.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"get up"},{"key":"B","text":"to get up"},{"key":"C","text":"getting up"},{"key":"D","text":"got up"}],"correct":"C","explanation":"\"Don't mind\" + gerund."},{"id":"q206","number":206,"text":"Would you consider ______ to a different city?","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"move"},{"key":"B","text":"to move"},{"key":"C","text":"moving"},{"key":"D","text":"moved"}],"correct":"C","explanation":"\"Consider\" + gerund."},{"id":"q208","number":208,"text":"I remember ______ the door before I left.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"lock"},{"key":"B","text":"locking"},{"key":"C","text":"to lock"},{"key":"D","text":"locked"}],"correct":"B","explanation":"\"Remember doing\" = recall a past action. \"Remember to do\" = not forget to do. Here it's recalling, so gerund."},{"id":"q210","number":210,"text":"I stopped ______ coffee because it affected my sleep.","level":"Intermediate","topic":"الروابط والجمل","options":[{"key":"A","text":"drink"},{"key":"B","text":"to drink"},{"key":"C","text":"drinking"},{"key":"D","text":"drank"}],"correct":"C","explanation":"\"Stop doing\" = quit an activity. \"Stop to do\" = pause in order to do something else. Here quitting coffee, so drinking."},{"id":"q211","number":211,"text":"He tried ______ the window, but it was stuck.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"open"},{"key":"B","text":"opening"},{"key":"C","text":"to open"},{"key":"D","text":"opened"}],"correct":"C","explanation":"\"Try to do\" = attempt. \"Try doing\" = experiment. Here it's an attempt, so \"to open\"."},{"id":"q212","number":212,"text":"I regret ______ you that your application was unsuccessful.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"inform"},{"key":"B","text":"to inform"},{"key":"C","text":"informing"},{"key":"D","text":"informed"}],"correct":"B","explanation":"\"Regret to do\" (formal) for bad news. \"Regret doing\" = feel sorry about a past action."},{"id":"q213","number":213,"text":"She went on ______ even after everyone had left.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"talk"},{"key":"B","text":"talking"},{"key":"C","text":"to talk"},{"key":"D","text":"talked"}],"correct":"B","explanation":"\"Go on doing\" = continue the same action. \"Go on to do\" = do something new."},{"id":"q215","number":215,"text":"She made me ______ my mind.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"change"},{"key":"B","text":"to change"},{"key":"C","text":"changing"},{"key":"D","text":"changed"}],"correct":"A","explanation":"\"Make\" + object + bare infinitive (without to). \"Make someone do something.\""},{"id":"q216","number":216,"text":"He let us ______ his car.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"borrow"},{"key":"B","text":"to borrow"},{"key":"C","text":"borrowing"},{"key":"D","text":"borrowed"}],"correct":"A","explanation":"\"Let\" + object + bare infinitive."},{"id":"q217","number":217,"text":"I heard her ______ in the next room.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"sing"},{"key":"B","text":"to sing"},{"key":"C","text":"sang"},{"key":"D","text":"sung"}],"correct":"A","explanation":"Verbs of perception (hear, see, watch) can take bare infinitive for complete action or gerund for ongoing. Here \"sing\" (bare) is correct for a complete action heard. \"Singing\" also possible, but \"sing\" is often used."},{"id":"q218","number":218,"text":"It's no use ______ about it.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"cry"},{"key":"B","text":"to cry"},{"key":"C","text":"crying"},{"key":"D","text":"cried"}],"correct":"C","explanation":"\"It's no use\" + gerund. Fixed expression."},{"id":"q219","number":219,"text":"There's no point ______ him. He won't listen.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"in asking"},{"key":"B","text":"to ask"},{"key":"C","text":"asking"},{"key":"D","text":"both A and C"}],"correct":"D","explanation":"\"There's no point in asking\" or \"There's no point asking\". Both are used."},{"id":"q221","number":221,"text":"The teacher had the students ______ in pairs.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"work"},{"key":"B","text":"to work"},{"key":"C","text":"working"},{"key":"D","text":"worked"}],"correct":"A","explanation":"\"Have someone do something\" (bare infinitive) means to instruct. \"Have someone doing something\" means to cause them to be engaged in something. Both can fit. I'll clarify: \"had the students work\" (instructed). So A."},{"id":"q222","number":222,"text":"I got him ______ me with the project.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"help"},{"key":"B","text":"to help"},{"key":"C","text":"helping"},{"key":"D","text":"helped"}],"correct":"B","explanation":"\"Get someone to do\" = persuade. \"Have someone do\" is bare infinitive, but \"get\" requires \"to\"."},{"id":"q224","number":224,"text":"I had my hair ______ yesterday.","level":"Intermediate","topic":"المبني للمجهول والسببية","options":[{"key":"A","text":"cut"},{"key":"B","text":"to cut"},{"key":"C","text":"cutting"},{"key":"D","text":"cuts"}],"correct":"A","explanation":"\"Have something done\" (causative) uses past participle. \"I had my hair cut\" (someone cut it for me)."},{"id":"q225","number":225,"text":"She got her car ______ last week.","level":"Intermediate","topic":"المبني للمجهول والسببية","options":[{"key":"A","text":"repair"},{"key":"B","text":"to repair"},{"key":"C","text":"repairing"},{"key":"D","text":"repaired"}],"correct":"D","explanation":"\"Get something done\" causative: past participle \"repaired\"."},{"id":"q226","number":226,"text":"This room needs ______.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"clean"},{"key":"B","text":"to clean"},{"key":"C","text":"cleaning"},{"key":"D","text":"cleaned"}],"correct":"C","explanation":"\"Need cleaning\" (gerund, passive meaning) or \"need to be cleaned\". \"Need to clean\" active."},{"id":"q228","number":228,"text":"She admitted ______ the money.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"steal"},{"key":"B","text":"to steal"},{"key":"C","text":"stealing"},{"key":"D","text":"stole"}],"correct":"C","explanation":"\"Admit\" + gerund."},{"id":"q229","number":229,"text":"He denied ______ the rules.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"break"},{"key":"B","text":"to break"},{"key":"C","text":"breaking"},{"key":"D","text":"broke"}],"correct":"C","explanation":"\"Deny\" + gerund."},{"id":"q230","number":230,"text":"I appreciate you ______.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"help"},{"key":"B","text":"to help"},{"key":"C","text":"helping"},{"key":"D","text":"helped"}],"correct":"C","explanation":"\"Appreciate\" + gerund (or possessive + gerund: appreciate your helping)."},{"id":"q231","number":231,"text":"The machine is used ______ coffee beans.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"grind"},{"key":"B","text":"to grind"},{"key":"C","text":"grinding"},{"key":"D","text":"for grind"}],"correct":"B","explanation":"\"Used to do\" (past habit) vs \"is used to doing\" (accustomed) vs \"is used to do\" (purpose). Here purpose: \"is used to grind\". Also \"for grinding\". \"To grind\" infinitive of purpose is correct."},{"id":"q232","number":232,"text":"I used ______ a lot when I was younger.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"swim"},{"key":"B","text":"swimming"},{"key":"C","text":"to swimming"},{"key":"D","text":"to swim"}],"correct":"D","explanation":"\"Used to\" (past habit) + base form."},{"id":"q233","number":233,"text":"I'm getting used to ______ in a big city.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"live"},{"key":"B","text":"living"},{"key":"C","text":"live"},{"key":"D","text":"lived"}],"correct":"B","explanation":"\"Get used to\" + gerund."},{"id":"q236","number":236,"text":"She's clever enough ______ the puzzle.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"solve"},{"key":"B","text":"solving"},{"key":"C","text":"to solve"},{"key":"D","text":"solved"}],"correct":"C","explanation":"\"Enough\" + to-infinitive."},{"id":"q238","number":238,"text":"I would rather ______ at home tonight.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"stay"},{"key":"B","text":"staying"},{"key":"C","text":"to stay"},{"key":"D","text":"stayed"}],"correct":"A","explanation":"\"Would rather\" + bare infinitive."},{"id":"q239","number":239,"text":"You'd better ______ a doctor.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"see"},{"key":"B","text":"seeing"},{"key":"C","text":"to see"},{"key":"D","text":"saw"}],"correct":"A","explanation":"\"Had better\" + bare infinitive."},{"id":"q243","number":243,"text":"This shirt needs to ______.","level":"Intermediate","topic":"المبني للمجهول والسببية","options":[{"key":"A","text":"wash"},{"key":"B","text":"be washed"},{"key":"C","text":"washing"},{"key":"D","text":"washed"}],"correct":"B","explanation":"\"Need to be + past participle\" passive."},{"id":"q244","number":244,"text":"The letter ______ tomorrow.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"will send"},{"key":"B","text":"will be sent"},{"key":"C","text":"is sending"},{"key":"D","text":"sends"}],"correct":"B","explanation":"Future passive: \"will be sent\"."},{"id":"q245","number":245,"text":"He ______ by the police yesterday.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"arrested"},{"key":"B","text":"was arrested"},{"key":"C","text":"has arrested"},{"key":"D","text":"is arrested"}],"correct":"B","explanation":"Past passive with agent: \"was arrested by\"."},{"id":"q246","number":246,"text":"I hate ______ at.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"laugh"},{"key":"B","text":"laughing"},{"key":"C","text":"being laughed"},{"key":"D","text":"laughed"}],"correct":"C","explanation":"Passive gerund: \"being laughed at\". The preposition stays."},{"id":"q247","number":247,"text":"She's having her house ______ at the moment.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"paint"},{"key":"B","text":"painted"},{"key":"C","text":"painting"},{"key":"D","text":"to paint"}],"correct":"B","explanation":"Causative \"have something done\": \"having her house painted\"."},{"id":"q250","number":250,"text":"The project is expected ______ by Friday.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"finish"},{"key":"B","text":"finishing"},{"key":"C","text":"to be finished"},{"key":"D","text":"to finish"}],"correct":"C","explanation":"Passive infinitive: \"is expected to be finished\". The project is finished by someone."},{"id":"q251","number":251,"text":"Nothing has ______ about the problem yet.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"do"},{"key":"B","text":"done"},{"key":"C","text":"been done"},{"key":"D","text":"did"}],"correct":"C","explanation":"Present perfect passive: \"has been done\"."},{"id":"q252","number":252,"text":"The manager wants the report ______ immediately.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"type"},{"key":"B","text":"typing"},{"key":"C","text":"to be typed"},{"key":"D","text":"typed"}],"correct":"D","explanation":"\"Want something done\" (past participle) is common. \"Wants it to be typed\" also works. Many test use \"done\". I'll set C \"to be typed\" is also correct, but typical exam pattern: \"want something done\". Actually, \"want something done\" is causative-like. I'll adjust: \"The manager wants the report ______ by noon.\" Both \"typed\" and \"to be typed\" possible. But \"wants it typed\" is standard. I'll use D \"typed\" as the causative passive."},{"id":"q255","number":255,"text":"She got her phone ______.","level":"Intermediate","topic":"الكلام المنقول والأسئلة","options":[{"key":"A","text":"steal"},{"key":"B","text":"stole"},{"key":"C","text":"stolen"},{"key":"D","text":"stealing"}],"correct":"C","explanation":"\"Get something done\" (often for unpleasant events): \"got her phone stolen\".\n\n---\n\n**Section 9: Reported Speech (256–280)**"},{"id":"q257","number":257,"text":"She said, \"I have been to Paris.\" → She said that ______ to Paris.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"she has been"},{"key":"B","text":"she had been"},{"key":"C","text":"I had been"},{"key":"D","text":"she was"}],"correct":"B","explanation":"Present perfect → past perfect."},{"id":"q258","number":258,"text":"\"Where do you live?\" she asked. → She asked me where ______.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"do I live"},{"key":"B","text":"I lived"},{"key":"C","text":"I live"},{"key":"D","text":"did I live"}],"correct":"B","explanation":"Reported questions: word order becomes subject + verb, no do/does. Tense backshift: live → lived."},{"id":"q260","number":260,"text":"He said, \"I'll call you tomorrow.\" → He said he ______ call me the next day.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"will"},{"key":"B","text":"would"},{"key":"C","text":"would have"},{"key":"D","text":"will have"}],"correct":"B","explanation":"Will → would."},{"id":"q262","number":262,"text":"\"I didn't take your pen,\" he said. → He denied ______ my pen.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"take"},{"key":"B","text":"to take"},{"key":"C","text":"taking"},{"key":"D","text":"took"}],"correct":"C","explanation":"\"Deny\" + gerund. He denied taking."},{"id":"q263","number":263,"text":"\"I'm sorry I'm late,\" she said. → She apologized ______ late.","level":"Intermediate","topic":"الجر والتراكيب","options":[{"key":"A","text":"for be"},{"key":"B","text":"to be"},{"key":"C","text":"for being"},{"key":"D","text":"being"}],"correct":"C","explanation":"\"Apologize for\" + gerund."},{"id":"q264","number":264,"text":"\"Let's go to the cinema,\" he said. → He suggested ______ to the cinema.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"go"},{"key":"B","text":"going"},{"key":"C","text":"to go"},{"key":"D","text":"we go"}],"correct":"B","explanation":"\"Suggest\" + gerund or \"that we go\". \"Going\" is correct. \"We go\" subjunctive but \"that we go\" would need \"that\". So B."},{"id":"q265","number":265,"text":"\"You should see a doctor,\" she told me. → She advised me ______ a doctor.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"see"},{"key":"B","text":"seeing"},{"key":"C","text":"to see"},{"key":"D","text":"saw"}],"correct":"C","explanation":"\"Advise\" + object + to infinitive."},{"id":"q267","number":267,"text":"\"Have you ever been to London?\" he asked. → He asked me if I ______ to London.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"have ever been"},{"key":"B","text":"had ever been"},{"key":"C","text":"ever went"},{"key":"D","text":"ever go"}],"correct":"B","explanation":"Present perfect → past perfect in reported question."},{"id":"q268","number":268,"text":"\"What time does the train leave?\" → She asked what time the train ______.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"leaves"},{"key":"B","text":"left"},{"key":"C","text":"is leaving"},{"key":"D","text":"has left"}],"correct":"B","explanation":"Backshift: does leave → left. If the timetable is still true, we can keep present, but classic rule backshifts. I'll use B and explain that both can be accepted but B is standard for reported."},{"id":"q269","number":269,"text":"\"I'll help you,\" he offered. → He offered ______ me.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"to help"},{"key":"B","text":"helping"},{"key":"C","text":"help"},{"key":"D","text":"that he help"}],"correct":"A","explanation":"\"Offer\" + to infinitive."},{"id":"q270","number":270,"text":"\"You stole my wallet!\" she accused. → She accused me ______ her wallet.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"of stealing"},{"key":"B","text":"to steal"},{"key":"C","text":"steal"},{"key":"D","text":"for stealing"}],"correct":"A","explanation":"\"Accuse of\" + gerund."},{"id":"q271","number":271,"text":"\"I wish I had studied more,\" he said. → He regretted ______ more.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"not study"},{"key":"B","text":"not studying"},{"key":"C","text":"not to study"},{"key":"D","text":"not studied"}],"correct":"B","explanation":"\"Regret\" + gerund (regret not doing)."},{"id":"q272","number":272,"text":"\"I'll never lie to you again,\" she promised. → She promised never ______ to me again.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"lying"},{"key":"B","text":"to lie"},{"key":"C","text":"lie"},{"key":"D","text":"lied"}],"correct":"B","explanation":"\"Promise\" + to infinitive."},{"id":"q278","number":278,"text":"He passed the exam ______ he didn't study much.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"despite"},{"key":"B","text":"although"},{"key":"C","text":"because"},{"key":"D","text":"so"}],"correct":"B","explanation":"\"Although\" + clause. \"Despite\" + noun/gerund."},{"id":"q279","number":279,"text":"______ the rain, we went for a walk.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"Although"},{"key":"B","text":"Despite"},{"key":"C","text":"Because"},{"key":"D","text":"Since"}],"correct":"B","explanation":"\"Despite\" + noun. \"Although\" would need \"Although it was raining\"."},{"id":"q280","number":280,"text":"She works hard ______ she can support her family.","level":"Intermediate","topic":"الأفعال الناقصة","options":[{"key":"A","text":"so that"},{"key":"B","text":"because"},{"key":"C","text":"although"},{"key":"D","text":"such that"}],"correct":"A","explanation":"Purpose: \"so that\" + clause."},{"id":"q281","number":281,"text":"It was ______ a good movie that I watched it twice.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"so"},{"key":"B","text":"such"},{"key":"C","text":"very"},{"key":"D","text":"too"}],"correct":"B","explanation":"\"Such a + adjective + noun + that\". \"So\" would be \"so good a movie\" or \"so good that\"."},{"id":"q282","number":282,"text":"The movie was ______ good that I watched it twice.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"so"},{"key":"B","text":"such"},{"key":"C","text":"very"},{"key":"D","text":"too"}],"correct":"A","explanation":"\"So + adjective + that\"."},{"id":"q283","number":283,"text":"He can't drive, ______ can he ride a bike.","level":"Intermediate","topic":"الأفعال الناقصة","options":[{"key":"A","text":"nor"},{"key":"B","text":"so"},{"key":"C","text":"but"},{"key":"D","text":"or"}],"correct":"A","explanation":"\"Nor\" after a negative clause. \"He can't drive, nor can he ride a bike\" (inversion)."},{"id":"q285","number":285,"text":"______ hard she tries, she never wins.","level":"Intermediate","topic":"الروابط والجمل","options":[{"key":"A","text":"However"},{"key":"B","text":"Whatever"},{"key":"C","text":"Although"},{"key":"D","text":"No matter"}],"correct":"A","explanation":"\"However hard she tries\" or \"No matter how hard she tries\". \"Whatever\" is for things, \"Although\" needs a clause with subject and verb without \"hard\" in that position."},{"id":"q286","number":286,"text":"______ you go, I'll follow you.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"Wherever"},{"key":"B","text":"However"},{"key":"C","text":"Whatever"},{"key":"D","text":"Whenever"}],"correct":"A","explanation":"\"Wherever\" (no matter where). \"However\" manner, \"Whatever\" thing, \"Whenever\" time."},{"id":"q290","number":290,"text":"He's the man ______ car was stolen.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"who"},{"key":"B","text":"whose"},{"key":"C","text":"which"},{"key":"D","text":"that"}],"correct":"B","explanation":"\"Whose\" possessive relative pronoun."},{"id":"q291","number":291,"text":"I'll do it, ______ I get paid or not.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"whether"},{"key":"B","text":"if"},{"key":"C","text":"unless"},{"key":"D","text":"as long as"}],"correct":"A","explanation":"\"Whether... or not\". \"If\" is not used with \"or not\" in this position."},{"id":"q293","number":293,"text":"He talks ______ he knew everything.","level":"Intermediate","topic":"الأفعال الناقصة","options":[{"key":"A","text":"as"},{"key":"B","text":"as if"},{"key":"C","text":"like"},{"key":"D","text":"as though"}],"correct":"B","explanation":"\"As if/though\" + unreal past. \"As\" can be used but \"as if/though\" is clearer for hypothetical. I'll set B \"as if\"."},{"id":"q303","number":303,"text":"This car is far ______ than that one.","level":"Intermediate","topic":"المقارنات","options":[{"key":"A","text":"expensive"},{"key":"B","text":"expensiver"},{"key":"C","text":"more expensive"},{"key":"D","text":"most expensive"}],"correct":"C","explanation":"Comparative with \"more\" for long adjectives, \"far\" modifies it: far more expensive."},{"id":"q304","number":304,"text":"The more you practice, the ______ you'll get.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"best"},{"key":"B","text":"good"},{"key":"C","text":"better"},{"key":"D","text":"well"}],"correct":"C","explanation":"The...the + comparative: \"the better\"."},{"id":"q307","number":307,"text":"I'm ______ better today than yesterday.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"much"},{"key":"B","text":"very"},{"key":"C","text":"too"},{"key":"D","text":"so"}],"correct":"A","explanation":"\"Much\" modifies comparatives: much better. \"Very\" for adjectives, not comparatives."},{"id":"q308","number":308,"text":"She's by far ______ candidate for the job.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"good"},{"key":"B","text":"better"},{"key":"C","text":"the best"},{"key":"D","text":"best"}],"correct":"C","explanation":"\"By far\" often with superlatives: \"the best\". Also with comparatives but then \"than\" needed. Here it's superlative."},{"id":"q309","number":309,"text":"The job is getting ______ and ______ difficult.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"more, more"},{"key":"B","text":"much, more"},{"key":"C","text":"as, as"},{"key":"D","text":"more, and"}],"correct":"A","explanation":"\"More and more\" for increasing degree."},{"id":"q310","number":310,"text":"He speaks English as if he ______ a native speaker.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"is"},{"key":"B","text":"was"},{"key":"C","text":"were"},{"key":"D","text":"has been"}],"correct":"C","explanation":"\"As if/though\" + subjunctive \"were\" for unreal present."},{"id":"q315","number":315,"text":"He's capable ______ running the marathon.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to"},{"key":"B","text":"of"},{"key":"C","text":"for"},{"key":"D","text":"in"}],"correct":"B","explanation":"\"Capable of\" + gerund."},{"id":"q316","number":316,"text":"She's committed ______ helping others.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"to"},{"key":"B","text":"for"},{"key":"C","text":"in"},{"key":"D","text":"of"}],"correct":"A","explanation":"\"Committed to\" + gerund."},{"id":"q317","number":317,"text":"The report is due ______ Friday.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"at"},{"key":"B","text":"on"},{"key":"C","text":"in"},{"key":"D","text":"by"}],"correct":"D","explanation":"\"Due by\" (deadline). \"Due on\" specific day, but \"by Friday\" means at the latest on Friday. Both can be used; I'll set D and explain."},{"id":"q318","number":318,"text":"I object ______ being treated like that.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"to"},{"key":"B","text":"against"},{"key":"C","text":"for"},{"key":"D","text":"about"}],"correct":"A","explanation":"\"Object to\" + gerund."},{"id":"q319","number":319,"text":"He's devoted his life ______ helping the poor.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to"},{"key":"B","text":"for"},{"key":"C","text":"in"},{"key":"D","text":"on"}],"correct":"A","explanation":"\"Devote to\" + gerund."},{"id":"q321","number":321,"text":"She's similar ______ her mother.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"to"},{"key":"C","text":"of"},{"key":"D","text":"as"}],"correct":"B","explanation":"\"Similar to\". \"Similar with\" wrong."},{"id":"q322","number":322,"text":"He's hopeless ______ sports.","level":"Intermediate","topic":"المقارنات","options":[{"key":"A","text":"at"},{"key":"B","text":"in"},{"key":"C","text":"for"},{"key":"D","text":"on"}],"correct":"A","explanation":"\"Hopeless at\" something (skill)."},{"id":"q323","number":323,"text":"The city is crowded ______ tourists.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"of"},{"key":"B","text":"with"},{"key":"C","text":"by"},{"key":"D","text":"from"}],"correct":"B","explanation":"\"Crowded with\" people."},{"id":"q324","number":324,"text":"She's experienced ______ teaching young children.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"at"},{"key":"B","text":"in"},{"key":"C","text":"on"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Experienced in\" doing something. \"At\" also possible but \"in\" common."},{"id":"q325","number":325,"text":"I'm short ______ money this month.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"on"},{"key":"C","text":"in"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Short of\" something lacking."},{"id":"q326","number":326,"text":"He's allergic ______ peanuts.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"to"},{"key":"B","text":"with"},{"key":"C","text":"for"},{"key":"D","text":"of"}],"correct":"A","explanation":"\"Allergic to\"."},{"id":"q327","number":327,"text":"The exam consists ______ two parts.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"of"},{"key":"B","text":"in"},{"key":"C","text":"from"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Consist of\"."},{"id":"q328","number":328,"text":"She's dealing ______ a difficult situation.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"in"},{"key":"C","text":"on"},{"key":"D","text":"at"}],"correct":"A","explanation":"\"Deal with\" = handle."},{"id":"q332","number":332,"text":"He's thinking ______ buying a new car.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"about"},{"key":"B","text":"of"},{"key":"C","text":"over"},{"key":"D","text":"both A and B"}],"correct":"D","explanation":"\"Think about\" or \"think of\" (consider)."},{"id":"q333","number":333,"text":"I'm dreaming ______ a beach vacation.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"about"},{"key":"C","text":"on"},{"key":"D","text":"A and B"}],"correct":"D","explanation":"\"Dream of\" or \"dream about\"."},{"id":"q339","number":339,"text":"I'm nervous ______ the interview.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"about"},{"key":"B","text":"of"},{"key":"C","text":"for"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Nervous about\" something."},{"id":"q340","number":340,"text":"She's brilliant ______ solving puzzles.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"at"},{"key":"B","text":"in"},{"key":"C","text":"on"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Brilliant at\" something."},{"id":"q341","number":341,"text":"I'm fed up ______ this weather.","level":"Inte o\" + verb."},{"id":"q504","number":504,"text":"The city is different ______ what I expected.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"with"},{"key":"B","text":"from"},{"key":"C","text":"than"},{"key":"D","text":"to"}],"correct":"B","explanation":"\"Different from\" (standard), \"different to\" (UK), \"different than\" (US). \"From\" is safest for tests."},{"id":"q505","number":505,"text":"I'm angry ______ my brother for losing my phone.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"at"},{"key":"C","text":"about"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Angry with\" someone. \"Angry at\" also possible, but \"with\" is standard."},{"id":"q510","number":510,"text":"I'm impressed ______ her talent.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"by"},{"key":"C","text":"of"},{"key":"D","text":"A and B"}],"correct":"D","explanation":"\"Impressed with\" or \"impressed by\"."},{"id":"q511","number":511,"text":"The teacher was satisfied ______ the results.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"with"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"of"}],"correct":"A","explanation":"\"Satisfied with\"."},{"id":"q512","number":512,"text":"She's disgusted ______ his behavior.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"about"},{"key":"C","text":"at"},{"key":"D","text":"A and C"}],"correct":"D","explanation":"\"Disgusted with\" or \"disgusted at\"."},{"id":"q513","number":513,"text":"I'm confused ______ the instructions.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"about"},{"key":"B","text":"with"},{"key":"C","text":"for"},{"key":"D","text":"of"}],"correct":"A","explanation":"\"Confused about\"."},{"id":"q515","number":515,"text":"She's curious ______ other cultures
