key":"D","text":"haven't done"}],"correct":"C","explanation":"\"Would rather\" + subject + past simple for present/future. \"Didn't do\"."},{"id":"q526","number":526,"text":"It's high time he ______ a decision.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"makes"},{"key":"B","text":"made"},{"key":"C","text":"has made"},{"key":"D","text":"will make"}],"correct":"B","explanation":"\"It's time\" + past simple."},{"id":"q527","number":527,"text":"Suppose you ______ the lottery, what would you buy?","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"win"},{"key":"B","text":"won"},{"key":"C","text":"had won"},{"key":"D","text":"will win"}],"correct":"B","explanation":"\"Suppose\" + past simple for hypothetical present."},{"id":"q530","number":530,"text":"I'll lend you the book provided that you ______ it back.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"bring"},{"key":"B","text":"will bring"},{"key":"C","text":"brought"},{"key":"D","text":"would bring"}],"correct":"A","explanation":"\"Provided that\" + present simple."},{"id":"q531","number":531,"text":"You can borrow my car as long as you ______ carefully.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"drive"},{"key":"B","text":"will drive"},{"key":"C","text":"drove"},{"key":"D","text":"would drive"}],"correct":"A","explanation":"\"As long as\" + present simple for future."},{"id":"q532","number":532,"text":"Unless something urgent ______ up, I'll be there.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"comes"},{"key":"B","text":"will come"},{"key":"C","text":"came"},{"key":"D","text":"would come"}],"correct":"A","explanation":"\"Unless\" + present simple."},{"id":"q534","number":534,"text":"She acted as if she ______ everything.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"knows"},{"key":"B","text":"knew"},{"key":"C","text":"had known"},{"key":"D","text":"will know"}],"correct":"B","explanation":"\"As if\" + past simple for simultaneous unreal; or past perfect for earlier unreal. \"knew\" present unreal. I'll set B."},{"id":"q535","number":535,"text":"He looks as though he ______ a ghost.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"sees"},{"key":"B","text":"saw"},{"key":"C","text":"had seen"},{"key":"D","text":"will see"}],"correct":"C","explanation":"Seeing the ghost before the looking, so past perfect \"had seen\"."},{"id":"q539","number":539,"text":"If I didn't have to work tomorrow, I ______ to the beach.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"go"},{"key":"B","text":"will go"},{"key":"C","text":"would go"},{"key":"D","text":"went"}],"correct":"C","explanation":"Second conditional: \"didn't have\" (unreal present) -> \"would go\"."},{"id":"q540","number":540,"text":"He talks as if he ______ the CEO, but he's just an intern.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"were"},{"key":"C","text":"has been"},{"key":"D","text":"will be"}],"correct":"B","explanation":"\"As if\" + subjunctive \"were\"."},{"id":"q541","number":541,"text":"If you ______ to the party, you would have met her.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"came"},{"key":"B","text":"had come"},{"key":"C","text":"would come"},{"key":"D","text":"come"}],"correct":"B","explanation":"Third conditional: \"had come\"."},{"id":"q542","number":542,"text":"I wish you ______ so much noise.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"don't make"},{"key":"B","text":"didn't make"},{"key":"C","text":"wouldn't make"},{"key":"D","text":"haven't made"}],"correct":"C","explanation":"Annoyance: wish + would."},{"id":"q544","number":544,"text":"She'd rather we ______ earlier.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"leave"},{"key":"B","text":"left"},{"key":"C","text":"had left"},{"key":"D","text":"will leave"}],"correct":"B","explanation":"\"Would rather\" + subject + past simple for present/future preference. \"Left\" (even though meaning future)."},{"id":"q547","number":547,"text":"It's about time you ______ to drive.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"learn"},{"key":"B","text":"learned"},{"key":"C","text":"have learned"},{"key":"D","text":"will learn"}],"correct":"B","explanation":"\"It's about time\" + past simple."},{"id":"q549","number":549,"text":"I'd prefer you ______ by train.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"go"},{"key":"B","text":"to go"},{"key":"C","text":"went"},{"key":"D","text":"going"}],"correct":"C","explanation":"\"Would prefer\" + object + past simple (unreal): \"went\"."},{"id":"q550","number":550,"text":"He suggested that we ______ early.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"leave"},{"key":"B","text":"left"},{"key":"C","text":"leaving"},{"key":"D","text":"to leave"}],"correct":"A","explanation":"\"Suggest\" + that + subject + subjunctive (base form). \"Leave\"."},{"id":"q551","number":551,"text":"The teacher demanded that everyone ______ quiet.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"be"},{"key":"C","text":"was"},{"key":"D","text":"are"}],"correct":"B","explanation":"Subjunctive after \"demand\": \"be\"."},{"id":"q553","number":553,"text":"I insist that he ______ the money back.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"gives"},{"key":"B","text":"give"},{"key":"C","text":"given"},{"key":"D","text":"giving"}],"correct":"B","explanation":"Subjunctive after \"insist\": \"give\" (without -s)."},{"id":"q554","number":554,"text":"I recommend that you ______ this book.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"read"},{"key":"B","text":"reads"},{"key":"C","text":"reading"},{"key":"D","text":"to read"}],"correct":"A","explanation":"Subjunctive after \"recommend\": \"read\"."},{"id":"q555","number":555,"text":"She requested that he ______ her alone.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"leaves"},{"key":"B","text":"leave"},{"key":"C","text":"left"},{"key":"D","text":"leaving"}],"correct":"B","explanation":"Subjunctive after \"request\": \"leave\"."},{"id":"q561","number":561,"text":"She always takes her umbrella in case it ______.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"rains"},{"key":"B","text":"will rain"},{"key":"C","text":"rained"},{"key":"D","text":"would rain"}],"correct":"A","explanation":"\"In case\" + present simple for future precaution."},{"id":"q562","number":562,"text":"I took an umbrella in case it ______.","level":"Intermediate","topic":"الأفعال الناقصة","options":[{"key":"A","text":"rains"},{"key":"B","text":"will rain"},{"key":"C","text":"rained"},{"key":"D","text":"would rain"}],"correct":"C","explanation":"Past precaution: \"in case it rained\" or \"should rain\". \"Rained\" is simple past after past main verb."},{"id":"q563","number":563,"text":"I'll explain the problem so that everyone ______ it.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"understands"},{"key":"B","text":"will understand"},{"key":"C","text":"understood"},{"key":"D","text":"would understand"}],"correct":"A","explanation":"\"So that\" + can/will or present. \"understands\" or \"will understand\". I'll use A."},{"id":"q565","number":565,"text":"He left early so that he ______ the train.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"doesn't miss"},{"key":"B","text":"didn't miss"},{"key":"C","text":"won't miss"},{"key":"D","text":"wouldn't miss"}],"correct":"D","explanation":"Past purpose: \"so that he wouldn't miss\"."},{"id":"q567","number":567,"text":"______ being tired, she continued working.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"Although"},{"key":"B","text":"Despite"},{"key":"C","text":"Because"},{"key":"D","text":"Even though"}],"correct":"B","explanation":"\"Despite\" + gerund/noun. \"Although\" + clause."},{"id":"q568","number":568,"text":"No matter ______ hard I try, I can't solve it.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"what"},{"key":"B","text":"how"},{"key":"C","text":"when"},{"key":"D","text":"where"}],"correct":"B","explanation":"\"No matter how\" + adjective/adverb."},{"id":"q569","number":569,"text":"______ happens, stay calm.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"However"},{"key":"B","text":"Whatever"},{"key":"C","text":"Wherever"},{"key":"D","text":"Whoever"}],"correct":"B","explanation":"\"Whatever happens\" (anything that happens)."},{"id":"q571","number":571,"text":"The city in ______ I was born is beautiful.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"that"},{"key":"C","text":"where"},{"key":"D","text":"who"}],"correct":"A","explanation":"After preposition: \"in which\". \"Where\" would replace \"in which\". \"That\" not after preposition."},{"id":"q572","number":572,"text":"This is the reason ______ I left.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"why"},{"key":"B","text":"which"},{"key":"C","text":"when"},{"key":"D","text":"where"}],"correct":"A","explanation":"\"The reason why\"."},{"id":"q573","number":573,"text":"The moment ______ I saw her, I knew something was wrong.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"when"},{"key":"B","text":"which"},{"key":"C","text":"that"},{"key":"D","text":"A and C"}],"correct":"D","explanation":"\"The moment when\" or \"the moment that\". Both."},{"id":"q574","number":574,"text":"He's the only person ______ can help.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"who"},{"key":"C","text":"what"},{"key":"D","text":"whom"}],"correct":"B","explanation":"Subject relative for person: \"who\". \"Which\" not for people."},{"id":"q575","number":575,"text":"Everything ______ he says is true.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"which"},{"key":"B","text":"what"},{"key":"C","text":"that"},{"key":"D","text":"who"}],"correct":"C","explanation":"After \"everything\", \"all\", \"nothing\", etc., use \"that\"."},{"id":"q578","number":578,"text":"The book, the cover of ______ is torn, is rare.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"that"},{"key":"C","text":"who"},{"key":"D","text":"what"}],"correct":"A","explanation":"\"The cover of which\" or \"whose cover\". \"That\" not in non-defining."},{"id":"q579","number":579,"text":"She's someone for ______ I have great respect.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"whom"},{"key":"C","text":"who"},{"key":"D","text":"that"}],"correct":"B","explanation":"After preposition \"for\", object pronoun \"whom\"."},{"id":"q580","number":580,"text":"This is the house ______ I grew up.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"where"},{"key":"C","text":"that"},{"key":"D","text":"when"}],"correct":"B","explanation":"Place: \"where\". \"In which\" also possible."},{"id":"q581","number":581,"text":"The number of errors ______ significant.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"is"},{"key":"C","text":"were"},{"key":"D","text":"have been"}],"correct":"B","explanation":"\"The number\" singular."},{"id":"q582","number":582,"text":"A series of lectures ______ been planned.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"have"},{"key":"B","text":"are"},{"key":"C","text":"has"},{"key":"D","text":"were"}],"correct":"C","explanation":"\"A series\" singular, even though plural noun after. \"Has\"."},{"id":"q585","number":585,"text":"Two-thirds of the cake ______ gone.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"has"},{"key":"B","text":"have"},{"key":"C","text":"are"},{"key":"D","text":"were"}],"correct":"A","explanation":"Fraction with uncountable \"cake\" -> singular."},{"id":"q586","number":586,"text":"Two-thirds of the students ______ present.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"has"},{"key":"C","text":"are"},{"key":"D","text":"was"}],"correct":"C","explanation":"Fraction with plural countable -> plural."},{"id":"q587","number":587,"text":"The majority of the work ______ done.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"were"},{"key":"C","text":"have been"},{"key":"D","text":"is"}],"correct":"D","explanation":"\"Work\" uncountable, so singular \"is\"."},{"id":"q588","number":588,"text":"The majority of voters ______ in favor.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"was"},{"key":"C","text":"are"},{"key":"D","text":"has"}],"correct":"C","explanation":"\"Voters\" plural, so \"are\"."},{"id":"q591","number":591,"text":"She's been studying English for three years, but she still can't speak it ______.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"fluent"},{"key":"B","text":"fluently"},{"key":"C","text":"more fluent"},{"key":"D","text":"most fluent"}],"correct":"B","explanation":"Adverb \"fluently\" modifies \"speak\"."},{"id":"q595","number":595,"text":"He tasted the soup ______.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"careful"},{"key":"B","text":"carefully"},{"key":"C","text":"more careful"},{"key":"D","text":"most careful"}],"correct":"B","explanation":"Here \"tasted\" is an action verb (he tested it), so adverb."},{"id":"q596","number":596,"text":"The soup tasted ______.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"good"},{"key":"B","text":"well"},{"key":"C","text":"better"},{"key":"D","text":"both A and C"}],"correct":"D","explanation":"Linking verb \"tasted\" with adjective \"good\" or \"better\". \"Well\" is adverb or health."},{"id":"q598","number":598,"text":"He was ______ injured in the accident.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"serious"},{"key":"B","text":"seriously"},{"key":"C","text":"more serious"},{"key":"D","text":"most serious"}],"correct":"B","explanation":"Adverb \"seriously\" modifies the adjective \"injured\"."},{"id":"q599","number":599,"text":"She spoke in a ______ voice.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"soft"},{"key":"B","text":"softly"},{"key":"C","text":"more soft"},{"key":"D","text":"most soft"}],"correct":"A","explanation":"Adjective \"soft\" modifies noun \"voice\"."},{"id":"q600","number":600,"text":"He's an ______ talented musician.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"extreme"},{"key":"B","text":"extremely"},{"key":"C","text":"extremest"},{"key":"D","text":"more extreme"}],"correct":"B","explanation":"Adverb \"extremely\" modifies adjective \"talented\"."},{"id":"q602","number":602,"text":"She's the ______ of the two sisters.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"tall"},{"key":"B","text":"taller"},{"key":"C","text":"tallest"},{"key":"D","text":"more tall"}],"correct":"B","explanation":"Comparative for two things: \"the taller\"."},{"id":"q603","number":603,"text":"He's getting ______ every day.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"more and more tired"},{"key":"B","text":"tired and more tired"},{"key":"C","text":"more tired and tired"},{"key":"D","text":"more tired"}],"correct":"A","explanation":"\"More and more\" for increasing degree."},{"id":"q605","number":605,"text":"She's not as smart as her sister, but she works ______.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"hard"},{"key":"B","text":"harder"},{"key":"C","text":"hardest"},{"key":"D","text":"more harder"}],"correct":"B","explanation":"Implicit comparison: \"works harder\"."},{"id":"q606","number":606,"text":"This problem is far ______ than I thought.","level":"Intermediate","topic":"المقارنات","options":[{"key":"A","text":"complicated"},{"key":"B","text":"more complicated"},{"key":"C","text":"complicatedly"},{"key":"D","text":"most complicated"}],"correct":"B","explanation":"Comparative \"more complicated\". \"Far\" is modifier."},{"id":"q607","number":607,"text":"He speaks English ______ better than his brother.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"very"},{"key":"B","text":"much"},{"key":"C","text":"so"},{"key":"D","text":"too"}],"correct":"B","explanation":"\"Much\" modifies comparatives. \"Very\" doesn't."},{"id":"q609","number":609,"text":"The exam was ______ easier than I expected.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"more"},{"key":"B","text":"much"},{"key":"C","text":"very"},{"key":"D","text":"too"}],"correct":"B","explanation":"\"Much easier\"."},{"id":"q610","number":610,"text":"It's becoming ______ to find a good job.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"more and more difficult"},{"key":"B","text":"difficult and difficult"},{"key":"C","text":"more difficult and difficult"},{"key":"D","text":"difficult and more difficult"}],"correct":"A","explanation":"\"More and more\" structure."},{"id":"q613","number":613,"text":"She has ______ patience with rude people.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"few"},{"key":"B","text":"little"},{"key":"C","text":"many"},{"key":"D","text":"a few"}],"correct":"B","explanation":"\"Patience\" uncountable: \"little\" (negative meaning)."},{"id":"q614","number":614,"text":"We have ______ opportunities left.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"little"},{"key":"B","text":"a little"},{"key":"C","text":"few"},{"key":"D","text":"a few"}],"correct":"C","explanation":"\"Opportunities\" countable: \"few\" means not many."},{"id":"q616","number":616,"text":"______ students passed the test; almost everyone failed.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"Few"},{"key":"B","text":"A few"},{"key":"C","text":"Little"},{"key":"D","text":"A little"}],"correct":"A","explanation":"\"Few\" emphasizes lack. \"A few\" would be positive."},{"id":"q619","number":619,"text":"He has much ______ experience than me.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"less"},{"key":"B","text":"fewer"},{"key":"C","text":"many"},{"key":"D","text":"little"}],"correct":"A","explanation":"\"Experience\" uncountable, comparative: \"less\"."},{"id":"q620","number":620,"text":"There were ______ people than I expected.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"less"},{"key":"B","text":"fewer"},{"key":"C","text":"little"},{"key":"D","text":"a little"}],"correct":"B","explanation":"\"People\" countable, comparative: \"fewer\"."},{"id":"q621","number":621,"text":"Each of us ______ to do our best.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"have"},{"key":"B","text":"are"},{"key":"C","text":"has"},{"key":"D","text":"were"}],"correct":"C","explanation":"\"Each\" singular: \"has\"."},{"id":"q622","number":622,"text":"Neither option ______ suitable.","level":"Intermediate","topic":"التوافق والضمائر","options":[{"key":"A","text":"are"},{"key":"B","text":"is"},{"key":"C","text":"were"},{"key":"D","text":"have"}],"correct":"B","explanation":"\"Neither\" + singular verb."},{"id":"q623","number":623,"text":"The scissors ______ in the drawer.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"has"},{"key":"D","text":"was"}],"correct":"B","explanation":"\"Scissors\" is plural. \"A pair of scissors is\"."},{"id":"q625","number":625,"text":"Three thousand dollars ______ too much for that.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"is"},{"key":"C","text":"were"},{"key":"D","text":"have been"}],"correct":"B","explanation":"Amounts of money are singular."},{"id":"q626","number":626,"text":"The young ______ full of energy.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"has"},{"key":"D","text":"was"}],"correct":"B","explanation":"\"The young\" (people) plural."},{"id":"q629","number":629,"text":"A number of complaints ______ received.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"has"},{"key":"B","text":"is"},{"key":"C","text":"have"},{"key":"D","text":"was"}],"correct":"C","explanation":"\"A number of\" plural."},{"id":"q630","number":630,"text":"The number of complaints ______ increased.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"have"},{"key":"B","text":"are"},{"key":"C","text":"has"},{"key":"D","text":"were"}],"correct":"C","explanation":"\"The number\" singular."},{"id":"q633","number":633,"text":"I ______ this book; you can have it.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"read"},{"key":"B","text":"have read"},{"key":"C","text":"am reading"},{"key":"D","text":"was reading"}],"correct":"B","explanation":"Present relevance (finished, so you can have it): present perfect."},{"id":"q636","number":636,"text":"By next year, I ______ English for five years.", ,"options":[{"key":"A","text":"about"},{"key":"B","text":"with"},{"key":"C","text":"at"},{"key":"D","text":"all of the above"}],"correct":"D","explanation":"\"Disappointed with/about/at\"."},{"id":"q968","number":968,"text":"I'm ashamed ______ what I did.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"A and B"}],"correct":"D","explanation":"\"Ashamed of/about\"."},{"id":"q969","number":969,"text":"She's content ______ her simple life.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"of"}],"correct":"A","explanation":"\"Content with\"."},{"id":"q970","number":970,"text":"He's obsessed ______ cleanliness.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"of"}],"correct":"A","explanation":"\"Obsessed with\"."},{"id":"q971","number":971,"text":"The patient is suffering ______ a rare disease.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"of"},{"key":"B","text":"from"},{"key":"C","text":"with"},{"key":"D","text":"about"}],"correct":"B","explanation":"\"Suffer from\"."},{"id":"q972","number":972,"text":"She's recovering ______ surgery.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"from"},{"key":"B","text":"of"},{"key":"C","text":"with"},{"key":"D","text":"after"}],"correct":"A","explanation":"\"Recover from\"."},{"id":"q973","number":973,"text":"He died ______ a heart attack.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"from"},{"key":"B","text":"of"},{"key":"C","text":"with"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Die of\" a disease/cause."},{"id":"q977","number":977,"text":"He's staring ______ the wall.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to"},{"key":"B","text":"on"},{"key":"C","text":"at"},{"key":"D","text":"for"}],"correct":"C","explanation":"\"Stare at\"."},{"id":"q980","number":980,"text":"He's applying ______ Harvard.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"for"},{"key":"B","text":"to"},{"key":"C","text":"at"},{"key":"D","text":"in"}],"correct":"B","explanation":"\"Apply to\" an institution."},{"id":"q982","number":982,"text":"They agreed ______ the terms.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"with"},{"key":"B","text":"on"},{"key":"C","text":"to"},{"key":"D","text":"B and C"}],"correct":"D","explanation":"\"Agree on\" a topic, \"agree to\" a proposal."},{"id":"q984","number":984,"text":"He's arguing ______ the new policy.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"against"},{"key":"B","text":"with"},{"key":"C","text":"to"},{"key":"D","text":"about"}],"correct":"A","explanation":"\"Argue against\" opposing, \"argue about\" a topic. Both."},{"id":"q985","number":985,"text":"I complained ______ the noisy neighbors.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"about"},{"key":"B","text":"for"},{"key":"C","text":"of"},{"key":"D","text":"against"}],"correct":"A","explanation":"\"Complain about\". \"Complain of\" an illness."},{"id":"q986","number":986,"text":"She cares ______ her aging parents.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"about"},{"key":"B","text":"for"},{"key":"C","text":"of"},{"key":"D","text":"with"}],"correct":"B","explanation":"\"Care for\" = look after. \"Care about\" = have feelings for."},{"id":"q987","number":987,"text":"He doesn't care ______ money.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"for"},{"key":"B","text":"about"},{"key":"C","text":"of"},{"key":"D","text":"with"}],"correct":"B","explanation":"\"Care about\" = consider important."},{"id":"q988","number":988,"text":"I'm thinking ______ you.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"about"},{"key":"C","text":"on"},{"key":"D","text":"A and B"}],"correct":"D","explanation":"\"Think of/about\" = have in mind."},{"id":"q990","number":990,"text":"She's fond ______ classical music.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"about"},{"key":"C","text":"with"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Fond of\"."},{"id":"q991","number":991,"text":"I'm not keen ______ spicy food.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"on"},{"key":"B","text":"about"},{"key":"C","text":"of"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Keen on\"."},{"id":"q992","number":992,"text":"He's hopeless ______ cooking.","level":"Intermediate","topic":"المقارنات","options":[{"key":"A","text":"in"},{"key":"B","text":"at"},{"key":"C","text":"on"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Hopeless at\" a skill."},{"id":"q993","number":993,"text":"She's brilliant ______ math.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"in"},{"key":"B","text":"at"},{"key":"C","text":"on"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Brilliant at\" a subject."},{"id":"q994","number":994,"text":"I'm terrible ______ remembering names.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"in"},{"key":"B","text":"at"},{"key":"C","text":"on"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Terrible at\" something."},{"id":"q996","number":996,"text":"The bag is empty ______ contents.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"of"},{"key":"B","text":"with"},{"key":"C","text":"from"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Empty of\"."},{"id":"q997","number":997,"text":"The city is crowded ______ tourists.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"of"},{"key":"B","text":"with"},{"key":"C","text":"by"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Crowded with\"."},{"id":"q998","number":998,"text":"I'm short ______ cash at the moment.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"of"},{"key":"B","text":"on"},{"key":"C","text":"with"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Short of\" lacking."},{"id":"q999","number":999,"text":"She's rich ______ experience.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"in"},{"key":"C","text":"with"},{"key":"D","text":"for"}],"correct":"B","explanation":"\"Rich in\" resources/qualities."},{"id":"q1136","number":1136,"text":"Every one of the students ______ a different opinion.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"have"},{"key":"B","text":"are having"},{"key":"C","text":"has"},{"key":"D","text":"having"}],"correct":"C","explanation":"\"Every one\" is singular. The phrase \"of the students\" is a prepositional phrase and does not change the subject. The correct verb is \"has\". Many learners incorrectly make the verb agree with \"students\"."},{"id":"q1137","number":1137,"text":"The news about the layoffs ______ shocking to all of us.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"were"},{"key":"C","text":"is"},{"key":"D","text":"have been"}],"correct":"C","explanation":"\"News\" is an uncountable singular noun despite the -s ending. Use a singular verb \"is\". Similar words: politics, mathematics, measles."},{"id":"q1139","number":1139,"text":"She gave me ______ useful information.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"many"},{"key":"B","text":"a few"},{"key":"C","text":"a lot"},{"key":"D","text":"a little"}],"correct":"D","explanation":"\"Information\" is uncountable. \"A little\" is used with uncountable nouns to indicate a small amount. \"Many\" and \"a few\" are for countables."},{"id":"q1141","number":1141,"text":"She insisted on ______ the bill.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"pay"},{"key":"B","text":"to pay"},{"key":"C","text":"paying"},{"key":"D","text":"paid"}],"correct":"C","explanation":"\"Insist on\" is followed by a gerund. \"Paying\" is correct. Using the infinitive \"to pay\" is a frequent mistake."},{"id":"q1142","number":1142,"text":"I'm looking forward to ______ you at the party.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"see"},{"key":"B","text":"seeing"},{"key":"C","text":"have seen"},{"key":"D","text":"seen"}],"correct":"B","explanation":"\"Look forward to\" is a phrasal verb where \"to\" is a preposition, so it must be followed by a gerund \"seeing\". The infinitive \"to see\" is a common error."},{"id":"q1143","number":1143,"text":"This book is worth ______.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"read"},{"key":"B","text":"to read"},{"key":"C","text":"reading"},{"key":"D","text":"being read"}],"correct":"C","explanation":"\"Worth\" is followed by a gerund: \"worth reading\". It is not followed by an infinitive."},{"id":"q1144","number":1144,"text":"The police ______ investigating the case thoroughly.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"has been"},{"key":"D","text":"was"}],"correct":"B","explanation":"\"Police\" is a collective noun that is always plural in English. \"Are\" is correct."},{"id":"q1146","number":1146,"text":"The scissors ______ in the top drawer.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"has"},{"key":"D","text":"was"}],"correct":"B","explanation":"\"Scissors\" is a plural noun and takes a plural verb. If you want to make it singular, you say \"a pair of scissors is\"."},{"id":"q1147","number":1147,"text":"Ten miles ______ a long way to walk.","level":"Intermediate","topic":"دقة عامة","options":[{"key":"A","text":"are"},{"key":"B","text":"were"},{"key":"C","text":"is"},{"key":"D","text":"have been"}],"correct":"C","explanation":"Expressions of distance, money, time, and weight are considered singular when they refer to a total amount. \"Ten miles\" is a single distance, so \"is\" is correct."},{"id":"q1148","number":1148,"text":"The number of people suffering from allergies ______ increased.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"have"},{"key":"B","text":"are"},{"key":"C","text":"has"},{"key":"D","text":"were"}],"correct":"C","explanation":"\"The number\" is singular; \"has increased\" is correct. This is often confused with \"a number of\", which is plural."},{"id":"q1149","number":1149,"text":"A number of complaints ______ received about the noise.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"has been"},{"key":"B","text":"have been"},{"key":"C","text":"is"},{"key":"D","text":"was"}],"correct":"B","explanation":"\"A number of\" means \"many\" and takes a plural verb: \"have been received\"."},{"id":"q1150","number":1150,"text":"If I ______ you, I would accept the offer immediately.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"am"},{"key":"B","text":"was"},{"key":"C","text":"were"},{"key":"D","text":"have been"}],"correct":"C","explanation":"In a second conditional expressing an unreal present situation, \"were\" is the subjunctive form for all persons. \"If I were you\" is correct, though \"was\" is informally used."},{"id":"q1151","number":1151,"text":"If you had told me earlier, I ______ you.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"will help"},{"key":"B","text":"would help"},{"key":"C","text":"would have helped"},{"key":"D","text":"helped"}],"correct":"C","explanation":"Third conditional: \"If + past perfect\" requires \"would have + past participle\" in the main clause. \"Would have helped\" is correct."},{"id":"q1152","number":1152,"text":"She wishes she ______ so much junk food yesterday.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"doesn't eat"},{"key":"B","text":"didn't eat"},{"key":"C","text":"hadn't eaten"},{"key":"D","text":"wouldn't eat"}],"correct":"C","explanation":"A wish about a past action requires the past perfect \"hadn't eaten\". \"Didn't eat\" is for present wishes."},{"id":"q1154","number":1154,"text":"You look tired. You'd better ______ a break.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"take"},{"key":"B","text":"to take"},{"key":"C","text":"taking"},{"key":"D","text":"took"}],"correct":"A","explanation":"\"Had better\" is always followed by the bare infinitive (without 'to'). \"Take\" is correct."},{"id":"q1155","number":1155,"text":"He denied ______ the money.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"steal"},{"key":"B","text":"to steal"},{"key":"C","text":"stealing"},{"key":"D","text":"stole"}],"correct":"C","explanation":"The verb \"deny\" is followed by a gerund \"stealing\". It cannot be followed by an infinitive."},{"id":"q1156","number":1156,"text":"I'm not used to ______ in such a hot climate.","level":"Intermediate","topic":"المصدر و ing","options":[{"key":"A","text":"live"},{"key":"B","text":"living"},{"key":"C","text":"be lived"},{"key":"D","text":"lived"}],"correct":"B","explanation":"\"Be used to\" means \"be accustomed to\" and is followed by a gerund (or noun). \"Living\" is correct."},{"id":"q1158","number":1158,"text":"Despite ______ very hard, he didn't pass the exam.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"he studied"},{"key":"B","text":"studying"},{"key":"C","text":"study"},{"key":"D","text":"to study"}],"correct":"B","explanation":"\"Despite\" is a preposition and must be followed by a noun or gerund. \"Studying\" is correct. \"Although\" would be used with a clause."},{"id":"q1162","number":1162,"text":"The teacher asked me where ______.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"did I live"},{"key":"B","text":"I lived"},{"key":"C","text":"I live"},{"key":"D","text":"lived I"}],"correct":"B","explanation":"In an embedded question, the word order is subject + verb (statement order), not question order. \"I lived\" is correct. Also, tense backshifts to past."},{"id":"q1163","number":1163,"text":"She's the girl ______ mother is a famous actress.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"who"},{"key":"B","text":"which"},{"key":"C","text":"whose"},{"key":"D","text":"whom"}],"correct":"C","explanation":"\"Whose\" is the possessive relative pronoun used for people (and sometimes things). It indicates the mother of the girl."},{"id":"q1164","number":1164,"text":"I don't have ______ time to waste on this project.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"many"},{"key":"B","text":"much"},{"key":"C","text":"a few"},{"key":"D","text":"few"}],"correct":"B","explanation":"\"Time\" is uncountable, so \"much\" is the correct quantifier. \"Many\", \"a few\", and \"few\" are for countable nouns."},{"id":"q1165","number":1165,"text":"There are ______ students in the library today than yesterday.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"less"},{"key":"B","text":"fewer"},{"key":"C","text":"little"},{"key":"D","text":"a little"}],"correct":"B","explanation":"\"Students\" is countable, so the comparative form \"fewer\" is required. \"Less\" is for uncountable nouns."},{"id":"q1166","number":1166,"text":"He's the man ______ car was stolen last night.","level":"Intermediate","topic":"الجمل الوصلية","options":[{"key":"A","text":"who"},{"key":"B","text":"which"},{"key":"C","text":"whose"},{"key":"D","text":"that"}],"correct":"C","explanation":"\"Whose\" shows possession. \"The man whose car\" means \"the car of the man\"."},{"id":"q1168","number":1168,"text":"The team ______ in separate rooms during the tournament.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"stays"},{"key":"B","text":"stay"},{"key":"C","text":"is staying"},{"key":"D","text":"has stayed"}],"correct":"B","explanation":"When a collective noun like \"team\" acts as individuals, a plural verb is used. \"Stay\" (plural) matches the idea of individuals in separate rooms. \"Stays\" would treat them as a unit."},{"id":"q1171","number":1171,"text":"The company is different ______ what it was ten years ago.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"than"},{"key":"B","text":"from"},{"key":"C","text":"with"},{"key":"D","text":"of"}],"correct":"B","explanation":"\"Different from\" is the standard preposition. \"Different than\" is common in American English but \"different from\" is universally accepted."},{"id":"q1172","number":1172,"text":"I'm angry ______ him for being late.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"with"},{"key":"B","text":"about"},{"key":"C","text":"for"},{"key":"D","text":"at"}],"correct":"A","explanation":"\"Angry with\" someone. \"Angry at\" is also possible but \"angry with\" is the standard collocation. \"Angry about\" a situation."},{"id":"q1174","number":1174,"text":"I'll call you ______ I arrive at the hotel.","level":"Intermediate","topic":"الأزمنة","options":[{"key":"A","text":"as soon as"},{"key":"B","text":"until"},{"key":"C","text":"while"},{"key":"D","text":"during"}],"correct":"A","explanation":"\"As soon as\" indicates that the call will happen immediately after arrival. No future tense in the time clause: present simple \"arrive\"."},{"id":"q1175","number":1175,"text":"You can't go out ______ you finish your homework.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"while"},{"key":"B","text":"until"},{"key":"C","text":"as soon as"},{"key":"D","text":"when"}],"correct":"B","explanation":"\"Until\" indicates the up to the point in time when the homework is finished. \"While\" would mean during the process."},{"id":"q1177","number":1177,"text":"I'm tired ______ doing the same thing every day.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"from"},{"key":"B","text":"of"},{"key":"C","text":"with"},{"key":"D","text":"by"}],"correct":"B","explanation":"\"Tired of\" means bored or fed up. \"Tired from\" means physically exhausted because of an activity."},{"id":"q1179","number":1179,"text":"We arrived ______ the station just in time.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to"},{"key":"B","text":"at"},{"key":"C","text":"in"},{"key":"D","text":"into"}],"correct":"B","explanation":"\"Arrive at\" is used for specific points (station, airport, school). \"Arrive in\" for cities/countries. \"Arrive to\" is wrong."},{"id":"q1182","number":1182,"text":"She congratulated me ______ my promotion.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"for"},{"key":"B","text":"on"},{"key":"C","text":"about"},{"key":"D","text":"with"}],"correct":"B","explanation":"\"Congratulate someone on\" something. \"Congratulations on\" is the noun form."},{"id":"q1185","number":1185,"text":"The hotel is not far; it's only a ______ walk.","level":"Intermediate","topic":"الأدوات والأسماء","options":[{"key":"A","text":"five-minute"},{"key":"B","text":"five minutes"},{"key":"C","text":"five-minutes"},{"key":"D","text":"five minute's"}],"correct":"A","explanation":"When a number + noun is used as an adjective, it becomes singular and hyphenated: \"five-minute walk\". The plural \"five minutes\" is incorrect in this compound adjective."},{"id":"q2","number":2,"text":"By the time the manager arrives, we ______ the report for over three hours.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"will have been writing"},{"key":"B","text":"have been writing"},{"key":"C","text":"have written"},{"key":"D","text":"wrote"}],"correct":"A","explanation":"We need a future perfect continuous tense to describe an action that will be in progress up to a specific point in the future. The phrase \"By the time the manager arrives\" sets that future point. \"Will have been writing\" (A) correctly expresses duration up to that moment. Option B is present perfect continuous, not future. Option C is present perfect simple, no duration. Option D is past simple, completely wrong time reference. Test-takers often misuse present perfect for future contexts."},{"id":"q9","number":9,"text":"She ______ of moving to Canada for years, but she still hasn't made a decision.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"thinks"},{"key":"B","text":"is thinking"},{"key":"C","text":"has been thinking"},{"key":"D","text":"thought"}],"correct":"C","explanation":"\"For years\" with an ongoing, unfinished action that started in the past and continues up to now requires Present Perfect Continuous (has been thinking). Option A (thinks) is simple present for opinions, not duration. Option B (is thinking) is present continuous for now, not for years. Option D (thought) is past simple, finished."},{"id":"q110","number":110,"text":"She failed the exam, ______ surprised no one.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"that"},{"key":"B","text":"what"},{"key":"C","text":"which"},{"key":"D","text":"it"}],"correct":"C","explanation":"\"Which\" can refer to a whole clause. \"That\" cannot be used after a comma like this. \"What\" cannot, \"it\" creates a run-on sentence."},{"id":"q115","number":115,"text":"She said she was busy, ______ was obviously a lie.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"that"},{"key":"B","text":"which"},{"key":"C","text":"what"},{"key":"D","text":"it"}],"correct":"B","explanation":"\"Which\" referring to the entire previous clause. \"That\" not used in non-defining clause, \"what\" no, \"it\" creates comma splice."},{"id":"q142","number":142,"text":"This is Sarah's and Jane's room. The room belongs to ______.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"Sarah and Jane together"},{"key":"B","text":"Sarah and Jane individually"},{"key":"C","text":"Sarah"},{"key":"D","text":"Jane"}],"correct":"B","explanation":"\"Sarah's and Jane's room\" means each has her own room (though \"room\" singular is odd; usually plural \"rooms\"). Actually, the structure \"Sarah's and Jane's\" indicates individual possession. But the question might be testing that \"Sarah and Jane's room\" (one room shared). Here it says \"Sarah's and Jane's room\" – that suggests they each have a room, but \"room\" is singular so it's ambiguous. I'll correct: It should be \"Sarah's and Jane's rooms\". I'll adjust to \"This is Sarah and Jane's room. It belongs to both.\" Let's fix to a standard test question:\n\n**Revised Question 142:** This car is ______.\nLevel: Intermediate\nA) John's and Mary's\nB) John and Mary's\nC) of John and Mary\nD) John and Mary\nCorrect Answer: B\nExplanation: Joint possession: add 's only to the last noun: \"John and Mary's\". Individual possession would be \"John's and Mary's\" (each has their own). So for one car jointly owned, B."},{"id":"q145","number":145,"text":"None of the students ______ the answer.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"know"},{"key":"B","text":"knows"},{"key":"C","text":"have known"},{"key":"D","text":"are knowing"}],"correct":"B","explanation":"\"None\" can take singular or plural verb, but formal/academic often uses singular \"knows\". Plural \"know\" is also accepted but many exams prefer singular. I'll go with singular \"knows\" and explain the nuance."},{"id":"q149","number":149,"text":"Neither the teacher nor the students ______ in the classroom.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"was"},{"key":"D","text":"has been"}],"correct":"B","explanation":"With \"neither...nor\", the verb agrees with the closest subject. \"Students\" is plural, so \"are\". If the order were reversed, it would be singular."},{"id":"q159","number":159,"text":"He is ______ MD in a large hospital.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"the"},{"key":"D","text":"no article"}],"correct":"B","explanation":"\"MD\" is pronounced \"em-dee\", starting with a vowel sound. So \"an MD\". The same applies to abbreviations: an MBA, an hour."},{"id":"q207","number":207,"text":"She appears ______ the truth.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"know"},{"key":"B","text":"knowing"},{"key":"C","text":"to know"},{"key":"D","text":"knew"}],"correct":"C","explanation":"\"Appear\" + to-infinitive. \"She appears to know.\" \"Appear knowing\" is not used."},{"id":"q240","number":240,"text":"She'd sooner ______ than get a loan.","level":"Advanced","topic":"المصدر و ing","options":[{"key":"A","text":"save"},{"key":"B","text":"saving"},{"key":"C","text":"to save"},{"key":"D","text":"saved"}],"correct":"A","explanation":"\"Would sooner\" + bare infinitive.\n\n---\n\nNow moving to Passive Voice."},{"id":"q248","number":248,"text":"It is believed that he ______ the race.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"win"},{"key":"B","text":"to win"},{"key":"C","text":"won"},{"key":"D","text":"winning"}],"correct":"C","explanation":"\"It is believed that + clause\". Since it's a past event, \"won\". \"He is believed to have won\" is also possible."},{"id":"q249","number":249,"text":"He is said ______ a great musician.","level":"Advanced","topic":"المبني للمجهول والسببية","options":[{"key":"A","text":"be"},{"key":"B","text":"to be"},{"key":"C","text":"being"},{"key":"D","text":"been"}],"correct":"B","explanation":"\"He is said to be\" (present reference). If past: \"to have been\"."},{"id":"q273","number":273,"text":"\"Why didn't you tell me?\" he asked. → He wanted to know why I ______ him.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"don't tell"},{"key":"B","text":"didn't tell"},{"key":"C","text":"hadn't told"},{"key":"D","text":"haven't told"}],"correct":"C","explanation":"Past simple \"didn't tell\" in direct speech becomes past perfect \"hadn't told\" in reported speech when there is backshift."},{"id":"q295","number":295,"text":"Not only ______ late, but he also forgot his notes.","level":"Advanced","topic":"القلب والتوكيد","options":[{"key":"A","text":"he was"},{"key":"B","text":"was he"},{"key":"C","text":"he is"},{"key":"D","text":"is he"}],"correct":"B","explanation":"Inversion after \"Not only\": \"Not only was he late...\"."},{"id":"q296","number":296,"text":"Hardly ______ the room when the lights went out.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"I had entered"},{"key":"B","text":"had I entered"},{"key":"C","text":"I entered"},{"key":"D","text":"did I enter"}],"correct":"B","explanation":"\"Hardly... when\" with past perfect inversion: \"Hardly had I entered...\"."},{"id":"q297","number":297,"text":"No sooner ______ the news than she started crying.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"she heard"},{"key":"B","text":"did she hear"},{"key":"C","text":"had she heard"},{"key":"D","text":"she had heard"}],"correct":"C","explanation":"\"No sooner... than\" with past perfect inversion: \"No sooner had she heard...\"."},{"id":"q298","number":298,"text":"Only by working hard ______ succeed.","level":"Advanced","topic":"الأفعال الناقصة","options":[{"key":"A","text":"you can"},{"key":"B","text":"can you"},{"key":"C","text":"you will"},{"key":"D","text":"you do"}],"correct":"B","explanation":"\"Only\" + adverbial at beginning requires inversion: \"can you succeed\"."},{"id":"q299","number":299,"text":"Little ______ that he was being watched.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"he knew"},{"key":"B","text":"did he know"},{"key":"C","text":"he had known"},{"key":"D","text":"he knows"}],"correct":"B","explanation":"\"Little\" negative adverbial, inversion: \"did he know\"."},{"id":"q300","number":300,"text":"So beautiful ______ that I couldn't take my eyes off her.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"she was"},{"key":"B","text":"was she"},{"key":"C","text":"she is"},{"key":"D","text":"is she"}],"correct":"B","explanation":"\"So + adjective\" at the beginning → inversion: \"So beautiful was she that...\".\n\n---\n\nWe've reached 300. Continuing to 1000. I'll shift to faster output, covering more topics: comparatives, superlatives, cleft sentences, emphasis, articles, quantifiers, verb tenses review, conditionals mixed, prepositions, phrasal verbs, etc. I'll maintain numbering. Let's power through."},{"id":"q311","number":311,"text":"It's high time you ______ a job.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"find"},{"key":"B","text":"found"},{"key":"C","text":"have found"},{"key":"D","text":"will find"}],"correct":"B","explanation":"\"It's time\" + past simple. \"Found\" is past subjunctive."},{"id":"q314","number":314,"text":"Had I known, I ______.","level":"Advanced","topic":"الشرطيات والرغبات","options":[{"key":"A","text":"will come"},{"key":"B","text":"would come"},{"key":"C","text":"would have come"},{"key":"D","text":"came"}],"correct":"C","explanation":"Third conditional inverted: \"Had I known, I would have come\"."},{"id":"q351","number":351,"text":"The teacher insisted ______ the students being quiet.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"on"},{"key":"B","text":"that"},{"key":"C","text":"for"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Insist on\" + gerund. \"Insist that\" + clause, but here \"being\" so \"on\" needed."},{"id":"q415","number":415,"text":"Either the manager or the employees ______ to attend.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"has"},{"key":"B","text":"have"},{"key":"C","text":"is"},{"key":"D","text":"was"}],"correct":"B","explanation":"Verb agrees with closest subject \"employees\" plural."},{"id":"q416","number":416,"text":"Neither the students nor the teacher ______ present.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"were"},{"key":"B","text":"are"},{"key":"C","text":"have been"},{"key":"D","text":"is"}],"correct":"D","explanation":"Closest subject \"teacher\" singular, so \"is\"."},{"id":"q424","number":424,"text":"More than one student ______ failed the test.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"have"},{"key":"B","text":"has"},{"key":"C","text":"are"},{"key":"D","text":"were"}],"correct":"B","explanation":"\"More than one\" takes a singular verb: \"has\"."},{"id":"q425","number":425,"text":"Many a man ______ tried and failed.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"have"},{"key":"B","text":"has"},{"key":"C","text":"are"},{"key":"D","text":"were"}],"correct":"B","explanation":"\"Many a\" + singular noun + singular verb."},{"id":"q428","number":428,"text":"The manager, as well as his staff, ______ attending the seminar.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"were"},{"key":"C","text":"is"},{"key":"D","text":"have"}],"correct":"C","explanation":"The verb agrees with the main subject \"manager\", not the phrase after comma. \"as well as\" doesn't create a compound subject."},{"id":"q429","number":429,"text":"I, who ______ your friend, will help you.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"am"},{"key":"B","text":"is"},{"key":"C","text":"are"},{"key":"D","text":"be"}],"correct":"A","explanation":"The relative pronoun \"who\" agrees with its antecedent \"I\", so \"am\"."},{"id":"q430","number":430,"text":"You, who ______ always early, arrived late today.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"was"},{"key":"D","text":"has been"}],"correct":"B","explanation":"\"Who\" refers to \"you\", so \"are\"."},{"id":"q437","number":437,"text":"It is essential that everyone ______ on time.","level":"Advanced","topic":"دقة عامة","options":[{"key":"A","text":"is"},{"key":"B","text":"be"},{"key":"C","text":"are"},{"key":"D","text":"was"}],"correct":"B","explanation":"Subjunctive in \"it is essential that\": base form \"be\"."},{"id":"q438","number":438,"text":"I'd rather you ______ to him yesterday.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"spoke"},{"key":"B","text":"had spoken"},{"key":"C","text":"speak"},{"key":"D","text":"have spoken"}],"correct":"B","explanation":"\"I'd rather\" + past perfect for past regret. \"had spoken\"."},{"id":"q442","number":442,"text":"It's about time you ______ a job.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"get"},{"key":"B","text":"got"},{"key":"C","text":"have got"},{"key":"D","text":"will get"}],"correct":"B","explanation":"\"It's about time\" + past simple."},{"id":"q448","number":448,"text":"He is believed ______ in the accident.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to have been killed"},{"key":"B","text":"to kill"},{"key":"C","text":"killing"},{"key":"D","text":"killed"}],"correct":"A","explanation":"\"He is believed to have been killed\" passive perfect infinitive for past event."},{"id":"q495","number":495,"text":"This software is compatible ______ your system.","level":"Advanced","topic":"دقة عامة","options":[{"key":"A","text":"with"},{"key":"B","text":"to"},{"key":"C","text":"for"},{"key":"D","text":"of"}],"correct":"A","explanation":"\"Compatible with\"."},{"id":"q521","number":521,"text":"I would never have believed it if I ______ it with my own eyes.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"don't see"},{"key":"B","text":"didn't see"},{"key":"C","text":"hadn't seen"},{"key":"D","text":"haven't seen"}],"correct":"C","explanation":"Mixed/third conditional: \"would never have believed\" requires past perfect \"hadn't seen\"."},{"id":"q528","number":528,"text":"Had I realized the danger, I ______.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"would stop"},{"key":"B","text":"stopped"},{"key":"C","text":"would have stopped"},{"key":"D","text":"will stop"}],"correct":"C","explanation":"Inverted third conditional: \"Had I realized... I would have stopped\"."},{"id":"q529","number":529,"text":"But for his help, I ______ the exam.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"would fail"},{"key":"B","text":"failed"},{"key":"C","text":"would have failed"},{"key":"D","text":"will fail"}],"correct":"C","explanation":"\"But for\" = if not for, third conditional: \"would have failed\"."},{"id":"q533","number":533,"text":"Even if she ______ me, I wouldn't have believed her.","level":"Advanced","topic":"الشرطيات والرغبات","options":[{"key":"A","text":"told"},{"key":"B","text":"had told"},{"key":"C","text":"tells"},{"key":"D","text":"would tell"}],"correct":"B","explanation":"\"Even if\" with third conditional: \"had told\"."},{"id":"q538","number":538,"text":"If she had taken the medicine, she ______ better now.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"would feel"},{"key":"B","text":"will feel"},{"key":"C","text":"would have felt"},{"key":"D","text":"feels"}],"correct":"A","explanation":"Mixed conditional: past condition (had taken) affecting present result (would feel)."},{"id":"q552","number":552,"text":"It is crucial that she ______ present.","level":"Advanced","topic":"دقة عامة","options":[{"key":"A","text":"is"},{"key":"B","text":"be"},{"key":"C","text":"was"},{"key":"D","text":"will be"}],"correct":"B","explanation":"\"It is crucial that\" + subjunctive \"be\"."},{"id":"q557","number":557,"text":"Were she my daughter, I ______ her go.","level":"Advanced","topic":"الشرطيات والرغبات","options":[{"key":"A","text":"won't let"},{"key":"B","text":"wouldn't let"},{"key":"C","text":"didn't let"},{"key":"D","text":"hadn't let"}],"correct":"B","explanation":"Inverted second conditional: \"Were she...\" -> \"wouldn't let\"."},{"id":"q558","number":558,"text":"Should you need help, ______ me.","level":"Advanced","topic":"الأفعال الناقصة","options":[{"key":"A","text":"you will call"},{"key":"B","text":"call"},{"key":"C","text":"called"},{"key":"D","text":"calling"}],"correct":"B","explanation":"\"Should you need help\" = \"If you should need help\", main clause imperative \"call me\"."},{"id":"q559","number":559,"text":"______ I known, I would have protested.","level":"Advanced","topic":"الشرطيات والرغبات","options":[{"key":"A","text":"If"},{"key":"B","text":"Had"},{"key":"C","text":"Should"},{"key":"D","text":"Were"}],"correct":"B","explanation":"Inverted third conditional: \"Had I known\"."},{"id":"q583","number":583,"text":"More than one answer ______ possible.","level":"Advanced","topic":"المقارنات","options":[{"key":"A","text":"are"},{"key":"B","text":"is"},{"key":"C","text":"were"},{"key":"D","text":"have"}],"correct":"B","explanation":"\"More than one\" + singular verb."},{"id":"q589","number":589,"text":"Not only the students but also the teacher ______ excited.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"were"},{"key":"C","text":"is"},{"key":"D","text":"have been"}],"correct":"C","explanation":"Proximity rule with \"not only... but also\": verb agrees with \"teacher\", singular."},{"id":"q590","number":590,"text":"Every man, woman, and child ______ evacuated.","level":"Advanced","topic":"دقة عامة","options":[{"key":"A","text":"were"},{"key":"B","text":"are"},{"key":"C","text":"have been"},{"key":"D","text":"is"}],"correct":"D","explanation":"\"Every\" before each noun makes it singular."},{"id":"q628","number":628,"text":"Many a student ______ made this mistake.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"have"},{"key":"B","text":"has"},{"key":"C","text":"are"},{"key":"D","text":"were"}],"correct":"B","explanation":"\"Many a\" + singular noun + singular verb."},{"id":"q674","number":674,"text":"He was seen ______ the store.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"enter"},{"key":"B","text":"to enter"},{"key":"C","text":"entered"},{"key":"D","text":"entering"}],"correct":"B","explanation":"Passive of perception: to infinitive. \"to enter\" is standard."},{"id":"q748","number":748,"text":"This song is reminiscent ______ old times.","level":"Advanced","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"to"},{"key":"C","text":"with"},{"key":"D","text":"about"}],"correct":"A","explanation":"\"Reminiscent of\"."},{"id":"q749","number":749,"text":"He's devoid ______ any emotion.","level":"Advanced","topic":"دقة عامة","options":[{"key":"A","text":"of"},{"key":"B","text":"with"},{"key":"C","text":"from"},{"key":"D","text":"for"}],"correct":"A","explanation":"\"Devoid of\"."},{"id":"q750","number":750,"text":"She's intent ______ finishing the race.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"on"},{"key":"B","text":"to"},{"key":"C","text":"for"},{"key":"D","text":"with"}],"correct":"A","explanation":"\"Intent on\"."},{"id":"q772","number":772,"text":"She was heard ______ for help.","level":"Advanced","topic":"المصدر و ing","options":[{"key":"A","text":"call"},{"key":"B","text":"to call"},{"key":"C","text":"calling"},{"key":"D","text":"called"}],"correct":"B","explanation":"Passive of \"hear\" with to-infinitive. \"To call\" is standard."},{"id":"q778","number":778,"text":"The children were watched ______ in the park.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"play"},{"key":"B","text":"to play"},{"key":"C","text":"playing"},{"key":"D","text":"played"}],"correct":"B","explanation":"Passive \"watch\" with to-infinitive."},{"id":"q787","number":787,"text":"He forbade them ______.","level":"Advanced","topic":"المصدر و ing","options":[{"key":"A","text":"enter"},{"key":"B","text":"to enter"},{"key":"C","text":"entering"},{"key":"D","text":"entered"}],"correct":"B","explanation":"\"Forbid\" + object + to infinitive."},{"id":"q800","number":800,"text":"I ______ have told him the truth, but I lied instead.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"should"},{"key":"B","text":"must"},{"key":"C","text":"can't"},{"key":"D","text":"needn't"}],"correct":"A","explanation":"Regret: \"should have\" (it was the right thing to do but didn't)."},{"id":"q810","number":810,"text":"She ______ have known about the surprise; someone must have told her.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"can't"},{"key":"B","text":"shouldn't"},{"key":"C","text":"mustn't"},{"key":"D","text":"needn't"}],"correct":"A","explanation":"Past impossibility: \"can't have known\". Wait, the second clause \"someone must have told her\" indicates she did know, so \"can't have not known\"? Actually, the logic: She knew, so \"she can't have not known\" is double negative. I'll rephrase the question:\n\n**Revised Q810:** She didn't know about the surprise; she ______ have been told.\nLevel: Intermediate\nA) can't\nB) shouldn't\nC) mustn't\nD) needn't\nCorrect Answer: A\nExplanation: \"Can't have been told\" = it's impossible that she was told."},{"id":"q816","number":816,"text":"He is believed ______ a spy.","level":"Advanced","topic":"المبني للمجهول والسببية","options":[{"key":"A","text":"be"},{"key":"B","text":"to be"},{"key":"C","text":"being"},{"key":"D","text":"been"}],"correct":"B","explanation":"\"He is believed to be\" (present). If past: \"to have been\"."},{"id":"q881","number":881,"text":"You must account ______ the missing funds.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"for"},{"key":"B","text":"on"},{"key":"C","text":"about"},{"key":"D","text":"of"}],"correct":"A","explanation":"\"Account for\" explain."},{"id":"q914","number":914,"text":"We had to do without water during the storm. \"Do without\" means:","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"use more of"},{"key":"B","text":"manage despite lack"},{"key":"C","text":"enjoy"},{"key":"D","text":"waste"}],"correct":"B","explanation":"\"Do without\" = manage without."},{"id":"q1001","number":1001,"text":"It was in 2015 ______ she graduated from university.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"when"},{"key":"B","text":"that"},{"key":"C","text":"which"},{"key":"D","text":"what"}],"correct":"B","explanation":"This is a cleft sentence emphasizing the time. The structure \"It was... that...\" is used, not \"when\". \"It was in 2015 that she graduated.\" However, if the sentence was \"2015 was the year when she graduated,\" \"when\" would be correct. Many learners incorrectly use \"when\" in cleft sentences with time adverbials."},{"id":"q1002","number":1002,"text":"______ he said surprised everyone at the meeting.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"What"},{"key":"B","text":"That"},{"key":"C","text":"Which"},{"key":"D","text":"It"}],"correct":"A","explanation":"A nominal clause starting with \"What\" acts as the subject. \"What he said\" means \"the thing that he said\". \"That he said\" would need a complement, e.g., \"That he said anything surprised everyone.\" Here, the meaning is \"the content of his words\", so \"What\" is correct."},{"id":"q1003","number":1003,"text":"She acted as if she ______ the boss, but she was only an intern.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"were"},{"key":"C","text":"had been"},{"key":"D","text":"B and C"}],"correct":"B","explanation":"\"As if\" + subjunctive \"were\" indicates an unreal present situation. If referring to a past unreal, \"had been\" is correct. Here, the main verb \"acted\" is past, but the state of being the boss is simultaneous and unreal, so \"were\" is the subjunctive form. Many exams prefer \"were\" after \"as if/though\" for present unreality, even with a past main verb, though \"had been\" is for prior unreality. The sentence suggests she pretended to be the boss at that time, so \"were\" (unreal present in the past) is the typical test answer."},{"id":"q1004","number":1004,"text":"On no account ______ the door open during the test.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"you should leave"},{"key":"B","text":"should you leave"},{"key":"C","text":"you must leave"},{"key":"D","text":"leave"}],"correct":"B","explanation":"Negative adverbial at the beginning \"On no account\" requires inversion: auxiliary + subject + verb. \"Should you leave\" is correct. The same rule applies to \"under no circumstances\", \"never\", \"rarely\", etc."},{"id":"q1005","number":1005,"text":"He's so stubborn that he would rather ______ than admit he's wrong.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to argue"},{"key":"B","text":"arguing"},{"key":"C","text":"argue"},{"key":"D","text":"argued"}],"correct":"C","explanation":"\"Would rather\" + bare infinitive (without \"to\"). \"He would rather argue than admit...\" The correct parallel structure is also important: would rather do something than do something else."},{"id":"q1006","number":1006,"text":"______ of the two candidates impressed the interview panel.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"None"},{"key":"B","text":"Neither"},{"key":"C","text":"Either"},{"key":"D","text":"Any"}],"correct":"B","explanation":"When referring to two people or things, use \"neither\" (not \"none\"). \"None\" is for three or more. \"Neither of the two\" is correct."},{"id":"q1007","number":1007,"text":"The government has introduced a new policy, ______ is to reduce carbon emissions.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"the purpose of which"},{"key":"B","text":"the purpose of what"},{"key":"C","text":"whose purpose"},{"key":"D","text":"A and C"}],"correct":"D","explanation":"Both \"the purpose of which\" and \"whose purpose\" are correct for referring to a non-human antecedent in a relative clause. \"The purpose of what\" is incorrect."},{"id":"q1008","number":1008,"text":"Not until she arrived home ______ she had forgotten her keys.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"she realized"},{"key":"B","text":"did she realize"},{"key":"C","text":"she did realize"},{"key":"D","text":"realized she"}],"correct":"B","explanation":"\"Not until\" at the start of the main clause requires inversion: \"did she realize\". The past simple \"did + base form\" is used."},{"id":"q1009","number":1009,"text":"The report, ______ in 2005, is still widely cited today.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"which was first published"},{"key":"B","text":"first published"},{"key":"C","text":"being first published"},{"key":"D","text":"both A and B"}],"correct":"D","explanation":"A reduced relative clause: \"first published\" (past participle) is an elliptical form of \"which was first published\". Both are correct, but in exams, the reduced form often tests the understanding of participle clauses."},{"id":"q1010","number":1010,"text":"______, the train had already left.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"On arrival"},{"key":"B","text":"When we arrived"},{"key":"C","text":"On arriving"},{"key":"D","text":"All of the above"}],"correct":"D","explanation":"All three can be used to mean \"when we arrived\". \"On arrival\" and \"On arriving\" are prepositional phrases with the same meaning, and \"When we arrived\" is a time clause. The question tests the variety of temporal expressions."},{"id":"q1011","number":1011,"text":"It's high time the government ______ action on climate change.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"take"},{"key":"B","text":"takes"},{"key":"C","text":"took"},{"key":"D","text":"will take"}],"correct":"C","explanation":"\"It's (high) time\" is followed by past simple to express that something should have already been done. The past subjunctive \"took\" is used."},{"id":"q1012","number":1012,"text":"He was a great athlete, but his son is even more ______.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"talented"},{"key":"B","text":"talent"},{"key":"C","text":"of a talented"},{"key":"D","text":"talented person"}],"correct":"A","explanation":"\"More talented\" is the comparative form. Option D would need \"more of a talented person\" or \"a more talented person\". The simplest completion is the adjective \"talented\"."},{"id":"q1013","number":1013,"text":"I wish you ______ us about the delay yesterday.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"would tell"},{"key":"B","text":"had told"},{"key":"C","text":"told"},{"key":"D","text":"would have told"}],"correct":"B","explanation":"A wish about a past situation requires past perfect: \"had told\". \"Would tell\" is for irritation about a present/future habit. \"Yesterday\" signals a completed past time."},{"id":"q1014","number":1014,"text":"The conference is likely ______ place in June.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to take"},{"key":"B","text":"taking"},{"key":"C","text":"to be taking"},{"key":"D","text":"that it will take"}],"correct":"A","explanation":"\"Be likely + to-infinitive\". \"Is likely to take place\" is the standard pattern."},{"id":"q1015","number":1015,"text":"______ to the public that the exhibition was cancelled.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"What was announced"},{"key":"B","text":"It was announced"},{"key":"C","text":"That was announced"},{"key":"D","text":"Announcement"}],"correct":"B","explanation":"\"It was announced\" is the passive structure with a dummy \"it\" to introduce news. The full pattern is \"It was announced (that) the exhibition was cancelled.\" Option A would need \"What was announced to the public was that...\"."},{"id":"q1016","number":1016,"text":"The more you study, ______ your chances of passing.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"the higher"},{"key":"B","text":"the higher are"},{"key":"C","text":"higher"},{"key":"D","text":"the more high"}],"correct":"A","explanation":"The parallel comparative structure \"the + comparative..., the + comparative...\". \"The higher your chances...\" is elliptical; \"the higher\" stands for \"the higher (they are)\". Option B unnecessarily inserts \"are\"."},{"id":"q1017","number":1017,"text":"He insisted on his car ______ serviced before the trip.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"being"},{"key":"B","text":"to be"},{"key":"C","text":"was"},{"key":"D","text":"be"}],"correct":"A","explanation":"\"Insist on\" + gerund. The passive gerund \"being serviced\" is needed. The structure \"his car being serviced\" is a possessive + gerund construction."},{"id":"q1018","number":1018,"text":"Only by practicing every day ______ improve your English.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"you can"},{"key":"B","text":"can you"},{"key":"C","text":"you will"},{"key":"D","text":"you"}],"correct":"B","explanation":"Inversion after \"Only\" + adverbial. \"Only by practicing... can you improve.\" The auxiliary \"can\" must come before the subject."},{"id":"q1019","number":1019,"text":"The professor, together with his assistants, ______ conducting the experiment.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"were"},{"key":"C","text":"is"},{"key":"D","text":"have been"}],"correct":"C","explanation":"Phrases like \"together with\", \"along with\", \"as well as\" do not create a compound subject. The verb agrees with the main subject \"professor\" (singular). So \"is\"."},{"id":"q1020","number":1020,"text":"She walked out of the meeting without ______ a word.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to say"},{"key":"B","text":"saying"},{"key":"C","text":"say"},{"key":"D","text":"said"}],"correct":"B","explanation":"\"Without\" is a preposition and must be followed by a gerund: \"without saying\"."},{"id":"q1021","number":1021,"text":"I'd prefer you ______ to him about it.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"don't speak"},{"key":"B","text":"not to speak"},{"key":"C","text":"didn't speak"},{"key":"D","text":"not speaking"}],"correct":"C","explanation":"\"I'd prefer\" + object + past simple (unreal). \"I'd prefer you didn't speak.\" Alternatively, \"I'd prefer you not to speak\" is also possible in some informal contexts, but the standard exam form is past simple for unreal after \"would prefer\"."},{"id":"q1022","number":1022,"text":"Not a single word ______ since the tragedy.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"did he utter"},{"key":"B","text":"he uttered"},{"key":"C","text":"has he uttered"},{"key":"D","text":"he has uttered"}],"correct":"C","explanation":"\"Not a single word\" is a negative adverbial phrase starting the sentence, triggering inversion. Present perfect is appropriate for \"since the tragedy\": \"has he uttered\"."},{"id":"q1023","number":1023,"text":"The house is in a poor state; it ______ decorated for years.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"didn't decorate"},{"key":"B","text":"hasn't been decorated"},{"key":"C","text":"wasn't decorated"},{"key":"D","text":"hadn't decorated"}],"correct":"B","explanation":"Present perfect passive is needed: \"hasn't been decorated\" (up to now). The context \"for years\" and present state require present perfect."},{"id":"q1024","number":1024,"text":"______ your help, we wouldn't have finished on time.","level":"Advanced","topic":"الشرطيات والرغبات","options":[{"key":"A","text":"But for"},{"key":"B","text":"If it wasn't for"},{"key":"C","text":"Without"},{"key":"D","text":"A and C"}],"correct":"D","explanation":"\"But for\" and \"Without\" are both used for third conditionals meaning \"if it hadn't been for\". \"If it wasn't for\" would be for present unreal, not past. So \"But for your help\" and \"Without your help\" are correct."},{"id":"q1025","number":1025,"text":"She is under the impression that she ______ the job, but she hasn't heard officially.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"was offering"},{"key":"B","text":"has been offered"},{"key":"C","text":"offered"},{"key":"D","text":"was being offered"}],"correct":"B","explanation":"The passive is needed: she was offered the job. \"Has been offered\" indicates a recent past action with present relevance (she still thinks she has the job). \"Was being offered\" suggests an ongoing past process."},{"id":"q1026","number":1026,"text":"The film was ______ good that I watched it twice.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"so"},{"key":"B","text":"such"},{"key":"C","text":"very"},{"key":"D","text":"too"}],"correct":"A","explanation":"\"So + adjective + that\". \"Such\" would need a noun: \"such a good film that\"."},{"id":"q1027","number":1027,"text":"It is vital that she ______ informed immediately.","level":"Advanced","topic":"دقة عامة","options":[{"key":"A","text":"is"},{"key":"B","text":"be"},{"key":"C","text":"will be"},{"key":"D","text":"was"}],"correct":"B","explanation":"Subjunctive after \"it is vital that\": base form \"be\". Formal contexts."},{"id":"q1028","number":1028,"text":"The results of the survey are not ______ with what we expected.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"consistent"},{"key":"B","text":"consistency"},{"key":"C","text":"consistently"},{"key":"D","text":"consist"}],"correct":"A","explanation":"Adjective after linking verb \"are\": \"consistent\". \"Are consistent with\" means match."},{"id":"q1029","number":1029,"text":"I can't afford ______ a new car this year.","level":"Advanced","topic":"المصدر و ing","options":[{"key":"A","text":"buy"},{"key":"B","text":"to buy"},{"key":"C","text":"buying"},{"key":"D","text":"bought"}],"correct":"B","explanation":"\"Afford\" + to-infinitive. \"Can't afford to buy\". Some may use gerund, but standard is infinitive."},{"id":"q1030","number":1030,"text":"______ we had taken a different route.","level":"Advanced","topic":"الشرطيات والرغبات","options":[{"key":"A","text":"If only"},{"key":"B","text":"I wish"},{"key":"C","text":"Would"},{"key":"D","text":"A and B"}],"correct":"D","explanation":"Both \"If only we had taken...\" and \"I wish we had taken...\" express regret about a past action. \"Would\" cannot start this clause without a subject."},{"id":"q1031","number":1031,"text":"The manager demanded that everyone ______ the new safety regulations.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"follow"},{"key":"B","text":"follows"},{"key":"C","text":"followed"},{"key":"D","text":"was following"}],"correct":"A","explanation":"Subjunctive after \"demand\" + that-clause: base form \"follow\", no -s for third person."},
