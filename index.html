{"id":"q1032","number":1032,"text":"He was seen ______ the building shortly after the incident.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to leave"},{"key":"B","text":"leave"},{"key":"C","text":"leaving"},{"key":"D","text":"A and C"}],"correct":"D","explanation":"Passive of \"see\" can take either \"to leave\" (to-infinitive) or \"leaving\" (present participle). Both are correct, but \"to leave\" is the standard passive infinitive form."},{"id":"q1033","number":1033,"text":"Seldom ______ such a talented musician.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"I have met"},{"key":"B","text":"have I met"},{"key":"C","text":"I met"},{"key":"D","text":"I meet"}],"correct":"B","explanation":"\"Seldom\" is a negative adverb requiring inversion. Present perfect \"have I met\" matches the meaning of experience."},{"id":"q1034","number":1034,"text":"The book, ______ cover is torn, is a first edition.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"whose"},{"key":"C","text":"of which"},{"key":"D","text":"B and C"}],"correct":"D","explanation":"Both \"whose cover\" and \"the cover of which\" are correct possessive forms for non-human antecedents. \"Which cover\" is wrong."},{"id":"q1035","number":1035,"text":"I'd rather you ______ that to anyone yet.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"not mention"},{"key":"B","text":"didn't mention"},{"key":"C","text":"haven't mentioned"},{"key":"D","text":"not to mention"}],"correct":"B","explanation":"\"Would rather\" + subject + past simple (unreal present/future). Negative: \"didn't mention\". \"I'd rather you didn't mention it.\""},{"id":"q1036","number":1036,"text":"By the time we arrived, the show ______.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"already started"},{"key":"B","text":"has already started"},{"key":"C","text":"had already started"},{"key":"D","text":"was already started"}],"correct":"C","explanation":"Past perfect for an action completed before another past action. \"Had already started\"."},{"id":"q1037","number":1037,"text":"He is ______ a talented musician that everyone admires him.","level":"Advanced","topic":"المقارنات","options":[{"key":"A","text":"so"},{"key":"B","text":"such"},{"key":"C","text":"very"},{"key":"D","text":"so much"}],"correct":"B","explanation":"\"Such a + adjective + noun + that\". \"Such a talented musician that...\". \"So talented a musician that...\" is also possible but less common."},{"id":"q1038","number":1038,"text":"______ as the manager entered, everyone stopped talking.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"No sooner"},{"key":"B","text":"Hardly"},{"key":"C","text":"So quickly"},{"key":"D","text":"So soon"}],"correct":"D","explanation":"\"So soon as\" means \"as soon as\". It's a fixed expression, often with inversion. \"So soon as he entered...\" or \"As soon as he entered\". Actually, the common expression is \"As soon as\", but \"So soon as\" is an older/formal alternative. More likely, \"No sooner had... than\" and \"Hardly had... when\" are the traps. But the sentence structure given \"______ as the manager entered, everyone stopped talking.\" needs a phrase that works with \"as\". \"As soon as\" is the complete conjunction. Wait: The blank before \"as\" would require \"As soon\" to form \"As soon as\". So \"As soon as the manager entered...\" would be correct. However, \"So soon as\" also exists. But in modern tests, \"Just as\" or \"As soon\" might appear. Let's check: \"Just as\" means exactly when. \"Just as the manager entered...\" works. I'll set the correct answer as something like \"Just as\" but the blank is before \"as\". I need to create a proper question. Let's rephrase to: \"Just as the manager entered, everyone stopped talking.\" That's a standard structure. So I'll make the options: A) Just, B) No sooner, C) Hardly, D) As soon. Only \"Just as\" works as an adverbial phrase. \"As soon as\" would be \"As soon as\", but the sentence has \"as\" already, so \"Just as\" fits. I'll correct: Option A: Just, B: No sooner, C: Hardly, D: As soon. Correct is A \"Just\". \"Just as\" = exactly when.\n\n**Revised Q1038:** ______ as the manager entered, everyone stopped talking.\nA) Just\nB) No sooner\nC) Hardly\nD) As soon\nCorrect Answer: A\nExplanation: \"Just as\" means \"exactly at the moment when\". \"No sooner\" requires \"than\", \"Hardly\" requires \"when\", \"As soon as\" would be \"As soon as\" with no separate \"as\". So \"Just as\" is the only correct collocation."},{"id":"q1039","number":1039,"text":"The police are investigating the theft; several suspects ______.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"are being questioned"},{"key":"B","text":"are questioning"},{"key":"C","text":"have questioned"},{"key":"D","text":"question"}],"correct":"A","explanation":"Present continuous passive: suspects are being questioned by the police."},{"id":"q1040","number":1040,"text":"It's no use ______ over spilt milk.","level":"Advanced","topic":"المصدر و ing","options":[{"key":"A","text":"cry"},{"key":"B","text":"crying"},{"key":"C","text":"to cry"},{"key":"D","text":"cried"}],"correct":"B","explanation":"\"It's no use\" + gerund. Fixed expression: \"It's no use crying over spilt milk.\""},{"id":"q1041","number":1041,"text":"The more I learn about him, ______ I like him.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"the less"},{"key":"B","text":"the lesser"},{"key":"C","text":"less"},{"key":"D","text":"lesser"}],"correct":"A","explanation":"Parallel comparative: \"the more..., the less...\". \"Lesser\" is not used in this structure; \"the less\" is correct."},{"id":"q1042","number":1042,"text":"She couldn't remember ______ she had left her keys.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"where"},{"key":"B","text":"that"},{"key":"C","text":"what"},{"key":"D","text":"which"}],"correct":"A","explanation":"\"Remember where she had left her keys\" — an embedded question. \"That\" would be for a fact: \"remember that she had left\", but the meaning is location."},{"id":"q1043","number":1043,"text":"Had I known about the meeting, I ______ it.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"would attend"},{"key":"B","text":"would have attended"},{"key":"C","text":"attended"},{"key":"D","text":"will attend"}],"correct":"B","explanation":"Inverted third conditional: \"Had I known... I would have attended\"."},{"id":"q1044","number":1044,"text":"He walked into the room as if he ______ the place.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"owns"},{"key":"B","text":"owned"},{"key":"C","text":"had owned"},{"key":"D","text":"own"}],"correct":"B","explanation":"\"As if\" + past subjunctive \"owned\" for unreal present/past. He doesn't own the place, so \"owned\" is the unreal form."},{"id":"q1045","number":1045,"text":"The test was ______ easier than I had expected.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"very"},{"key":"B","text":"much"},{"key":"C","text":"more"},{"key":"D","text":"so"}],"correct":"B","explanation":"Comparatives are modified by \"much\", \"far\", \"a lot\", not \"very\". \"Much easier\" is correct."},{"id":"q1046","number":1046,"text":"She is one of the few people who ______ survived the accident.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"has"},{"key":"B","text":"have"},{"key":"C","text":"was"},{"key":"D","text":"is"}],"correct":"B","explanation":"The relative pronoun \"who\" refers to \"people\", so plural verb \"have survived\". The antecedent is plural, despite \"one of the\". \"One of the few people who have\" is the correct agreement."},{"id":"q1047","number":1047,"text":"He suggested that the meeting ______ until next week.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"be postponed"},{"key":"B","text":"should postpone"},{"key":"C","text":"postponed"},{"key":"D","text":"being postponed"}],"correct":"A","explanation":"\"Suggest\" + that + subjunctive. Passive subjunctive: \"be postponed\". \"Should be postponed\" is also possible but the subjunctive \"be postponed\" is the more formal test answer."},{"id":"q1048","number":1048,"text":"Rarely ______ such a beautiful sunset.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"I have seen"},{"key":"B","text":"have I seen"},{"key":"C","text":"I saw"},{"key":"D","text":"I had seen"}],"correct":"B","explanation":"Inversion after \"Rarely\": \"have I seen\". Present perfect for experience."},{"id":"q1049","number":1049,"text":"The data ______ analyzed carefully before the conclusion was reached.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"was"},{"key":"B","text":"were"},{"key":"C","text":"has"},{"key":"D","text":"is"}],"correct":"B","explanation":"In formal/academic English, \"data\" is plural (singular \"datum\"), so \"were analyzed\". However, \"data\" as singular is also common, but in advanced exams, plural is often preferred."},{"id":"q1050","number":1050,"text":"I'd like the report ______ on my desk by Monday.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"placing"},{"key":"B","text":"to place"},{"key":"C","text":"placed"},{"key":"D","text":"place"}],"correct":"C","explanation":"\"I'd like the report placed\" = \"I'd like the report to be placed\", past participle used as a passive causative. \"Like something done\"."},{"id":"q1051","number":1051,"text":"______ the circumstances, we had no choice but to cancel.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"Under"},{"key":"B","text":"In"},{"key":"C","text":"On"},{"key":"D","text":"By"}],"correct":"A","explanation":"Fixed preposition: \"Under the circumstances\"."},{"id":"q1052","number":1052,"text":"He appears ______ weight since we last saw him.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"to have lost"},{"key":"B","text":"losing"},{"key":"C","text":"to lose"},{"key":"D","text":"lost"}],"correct":"A","explanation":"\"Appears\" + perfect infinitive \"to have lost\" for a past action with present result. \"He appears to have lost weight.\""},{"id":"q1053","number":1053,"text":"The teacher, along with her students, ______ the museum tomorrow.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"visit"},{"key":"B","text":"is visiting"},{"key":"C","text":"are visiting"},{"key":"D","text":"have visited"}],"correct":"B","explanation":"Singular verb agrees with \"teacher\". \"Along with\" doesn't affect number. \"Is visiting\" is correct."},{"id":"q1054","number":1054,"text":"I can't get used to ______ on the left side of the road.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"drive"},{"key":"B","text":"driving"},{"key":"C","text":"be driven"},{"key":"D","text":"drove"}],"correct":"B","explanation":"\"Get used to\" + gerund: \"driving\"."},{"id":"q1055","number":1055,"text":"The politician denied ______ any involvement in the scandal.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to have"},{"key":"B","text":"having"},{"key":"C","text":"to having"},{"key":"D","text":"have"}],"correct":"B","explanation":"\"Deny\" + gerund: \"having\" (or \"having had\" if prior). \"Denied having any involvement.\""},{"id":"q1056","number":1056,"text":"______ from the top of the hill, the city looked magnificent.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"Seeing"},{"key":"B","text":"Seen"},{"key":"C","text":"To see"},{"key":"D","text":"Having seen"}],"correct":"B","explanation":"A participle clause. The city is seen, so a past participle \"Seen\" is used (passive meaning). \"Seeing\" would imply the city was doing the seeing."},{"id":"q1057","number":1057,"text":"She will have been working here for ten years ______ next month.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"by"},{"key":"B","text":"since"},{"key":"C","text":"from"},{"key":"D","text":"for"}],"correct":"A","explanation":"Future perfect continuous with \"by\" for a point in the future when the duration is completed. \"By next month\" indicates a deadline."},{"id":"q1058","number":1058,"text":"I object to ______ like a child.","level":"Advanced","topic":"المصدر و ing","options":[{"key":"A","text":"be treated"},{"key":"B","text":"being treated"},{"key":"C","text":"treat"},{"key":"D","text":"treating"}],"correct":"B","explanation":"\"Object to\" + gerund. Passive gerund: \"being treated\"."},{"id":"q1059","number":1059,"text":"The car needs ______ before the trip.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"servicing"},{"key":"B","text":"to service"},{"key":"C","text":"serviced"},{"key":"D","text":"being serviced"}],"correct":"A","explanation":"\"Need\" + gerund with passive meaning: \"needs servicing\" = \"needs to be serviced\". \"Needs to be serviced\" is also correct, but \"servicing\" is the common gerund form."},{"id":"q1060","number":1060,"text":"It was because of his dedication ______ he was promoted.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"that"},{"key":"B","text":"which"},{"key":"C","text":"so"},{"key":"D","text":"why"}],"correct":"A","explanation":"Cleft sentence focusing on the reason: \"It was because of his dedication that he was promoted.\" \"Why\" is incorrect here."},{"id":"q1061","number":1061,"text":"The incident caused a great deal of ______ among the passengers.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"confusion"},{"key":"B","text":"confusions"},{"key":"C","text":"confused"},{"key":"D","text":"confusing"}],"correct":"A","explanation":"\"Confusion\" is uncountable, no plural. \"A great deal of\" + uncountable noun."},{"id":"q1062","number":1062,"text":"She ______ have passed the exam; she was so well-prepared.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"must"},{"key":"B","text":"should"},{"key":"C","text":"could"},{"key":"D","text":"would"}],"correct":"A","explanation":"\"Must have passed\" expresses strong deduction about the past. \"Should have passed\" suggests expectation but not certainty, while \"must\" indicates logical certainty."},{"id":"q1063","number":1063,"text":"He insisted that he ______ innocent.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"be"},{"key":"C","text":"was"},{"key":"D","text":"been"}],"correct":"C","explanation":"\"Insist\" can mean \"state emphatically\" (no subjunctive) or \"demand\" (subjunctive). \"He insisted that he was innocent\" is a statement of fact, not a demand, so indicative \"was\" is correct. The subjunctive \"be\" would be for a demand: \"He insisted that she be present.\""},{"id":"q1064","number":1064,"text":"Many a student ______ this mistake on the test.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"have made"},{"key":"B","text":"has made"},{"key":"C","text":"make"},{"key":"D","text":"are making"}],"correct":"B","explanation":"\"Many a\" + singular noun + singular verb: \"Many a student has made\"."},{"id":"q1065","number":1065,"text":"The jury ______ divided in their opinions on the case.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"is"},{"key":"B","text":"are"},{"key":"C","text":"was"},{"key":"D","text":"has been"}],"correct":"B","explanation":"Collective noun \"jury\" can take plural verb when emphasizing the individuals. \"Divided in their opinions\" signals individual members, so plural \"are\" is appropriate. \"Was\" singular would not match \"their\"."},{"id":"q1066","number":1066,"text":"Not only ______ the exam, but he also got the highest score.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"he passed"},{"key":"B","text":"did he pass"},{"key":"C","text":"he did pass"},{"key":"D","text":"passed he"}],"correct":"B","explanation":"Inversion after \"Not only\": \"did he pass\". The structure is \"Not only + auxiliary + subject + verb\"."},{"id":"q1067","number":1067,"text":"It's about time you ______ some responsibility.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"take"},{"key":"B","text":"took"},{"key":"C","text":"have taken"},{"key":"D","text":"will take"}],"correct":"B","explanation":"\"It's about time\" + past simple: \"took\" (subjunctive meaning)."},{"id":"q1068","number":1068,"text":"I'd rather you ______ to him at the party last night.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"didn't speak"},{"key":"B","text":"hadn't spoken"},{"key":"C","text":"haven't spoken"},{"key":"D","text":"not speak"}],"correct":"B","explanation":"\"Would rather\" for a past reference uses past perfect: \"hadn't spoken\". \"Last night\" indicates finished past."},{"id":"q1069","number":1069,"text":"Supposing you ______ the lottery, what would you do?","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"win"},{"key":"B","text":"won"},{"key":"C","text":"had won"},{"key":"D","text":"would win"}],"correct":"B","explanation":"\"Supposing\" + past simple for hypothetical present/future: \"Supposing you won...\". \"Had won\" would be for past hypothetical."},{"id":"q1070","number":1070,"text":"He's a man of ______ integrity.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"an"},{"key":"C","text":"the"},{"key":"D","text":"no article"}],"correct":"D","explanation":"\"Integrity\" is uncountable and abstract; we say \"a man of integrity\" without an article. \"A man of great integrity\" uses adjective, but article still not needed before \"integrity\"."},{"id":"q1071","number":1071,"text":"The children were made ______ the room.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"clean"},{"key":"B","text":"to clean"},{"key":"C","text":"cleaning"},{"key":"D","text":"cleaned"}],"correct":"B","explanation":"In the passive, \"make\" is followed by to-infinitive: \"were made to clean\". Active: \"made them clean\"."},{"id":"q1072","number":1072,"text":"The house ______ we visited yesterday is for sale.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"where"},{"key":"B","text":"which"},{"key":"C","text":"that"},{"key":"D","text":"B and C"}],"correct":"D","explanation":"\"The house that/which we visited\" — object relative pronoun can be omitted or used. \"Where\" would be for location if no verb required object: \"The house where we stayed\"."},{"id":"q1073","number":1073,"text":"It is the first time I ______ such a beautiful painting.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"see"},{"key":"B","text":"am seeing"},{"key":"C","text":"have seen"},{"key":"D","text":"saw"}],"correct":"C","explanation":"\"It is the first time\" + present perfect: \"have seen\"."},{"id":"q1074","number":1074,"text":"They live in a small house ______ back onto a park.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"which gardens"},{"key":"B","text":"whose gardens"},{"key":"C","text":"the gardens of which"},{"key":"D","text":"B and C"}],"correct":"D","explanation":"Possessive relative: \"whose gardens\" or \"the gardens of which\". Both are correct."},{"id":"q1075","number":1075,"text":"The problem was so complicated that it took hours ______.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"solving"},{"key":"B","text":"to solve"},{"key":"C","text":"being solved"},{"key":"D","text":"solved"}],"correct":"B","explanation":"\"It took hours to solve the problem\" — the infinitive of purpose or result. The dummy \"it\" structure: \"It took hours to solve.\""},{"id":"q1076","number":1076,"text":"There's no point ______ the issue any further.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to discuss"},{"key":"B","text":"in discussing"},{"key":"C","text":"discussing"},{"key":"D","text":"B and C"}],"correct":"D","explanation":"\"There's no point in discussing\" or \"There's no point discussing\". Both are accepted."},{"id":"q1077","number":1077,"text":"The suspect is known ______ the country.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to leave"},{"key":"B","text":"to have left"},{"key":"C","text":"leaving"},{"key":"D","text":"left"}],"correct":"B","explanation":"\"Is known\" + perfect infinitive \"to have left\" for a prior action. \"He is known to have left\" means people know that he left."},{"id":"q1078","number":1078,"text":"Hardly had she sat down ______ the phone rang.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"than"},{"key":"B","text":"when"},{"key":"C","text":"then"},{"key":"D","text":"while"}],"correct":"B","explanation":"\"Hardly... when\" is the fixed conjunction pair. \"No sooner... than\"."},{"id":"q1079","number":1079,"text":"He was the last person ______ the building.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"leaving"},{"key":"B","text":"left"},{"key":"C","text":"to leave"},{"key":"D","text":"leave"}],"correct":"C","explanation":"\"The last person to leave\" uses the infinitive after superlatives/last/only."},{"id":"q1080","number":1080,"text":"I'm afraid I didn't have ______ time to finish the report.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"enough"},{"key":"B","text":"enough of"},{"key":"C","text":"much time"},{"key":"D","text":"A and C"}],"correct":"D","explanation":"\"Enough time\" and \"much time\" both work in negative sentences. \"Enough of\" requires a determiner: \"enough of the time\"."},{"id":"q1081","number":1081,"text":"The company's profits are expected ______ by 10% this year.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"to rise"},{"key":"B","text":"rising"},{"key":"C","text":"rise"},{"key":"D","text":"to be risen"}],"correct":"A","explanation":"\"Be expected + to-infinitive\". \"To rise\" is intransitive, so active infinitive is correct."},{"id":"q1082","number":1082,"text":"He would never have succeeded ______ the support of his family.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"without"},{"key":"B","text":"but for"},{"key":"C","text":"if it hadn't been for"},{"key":"D","text":"all of the above"}],"correct":"D","explanation":"All three phrases mean \"if he hadn't had the support\". \"Without\", \"but for\", and \"if it hadn't been for\" are interchangeable in third conditionals."},{"id":"q1083","number":1083,"text":"It is ______ that the meeting will be postponed.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"high likely"},{"key":"B","text":"highly likely"},{"key":"C","text":"highly like"},{"key":"D","text":"high like"}],"correct":"B","explanation":"\"Highly likely\" — \"highly\" is the adverb form used to modify adjectives like \"likely\"."},{"id":"q1084","number":1084,"text":"The boy, ______ to be a genius, amazed everyone with his questions.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"considered"},{"key":"B","text":"considering"},{"key":"C","text":"was considered"},{"key":"D","text":"is considered"}],"correct":"A","explanation":"A past participle phrase: \"considered to be a genius\" is reduced from \"who was considered to be a genius\". \"Considered\" alone works as a non-finite clause."},{"id":"q1085","number":1085,"text":"It is essential that every employee ______ the new guidelines.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"understands"},{"key":"B","text":"understand"},{"key":"C","text":"will understand"},{"key":"D","text":"understood"}],"correct":"B","explanation":"Subjunctive after \"it is essential that\": base form \"understand\" (no -s)."},{"id":"q1086","number":1086,"text":"The meeting will be held in the main hall, ______ is on the second floor.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"which"},{"key":"B","text":"where"},{"key":"C","text":"that"},{"key":"D","text":"what"}],"correct":"A","explanation":"Non-defining relative clause referring to \"the main hall\", use \"which\". \"Where\" would be: \"the main hall, where the meeting will be held\" (changing the focus). Here the clause says \"which is on the second floor\", so \"which\" is correct."},{"id":"q1087","number":1087,"text":"He'd rather we ______ the matter alone.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"leave"},{"key":"B","text":"left"},{"key":"C","text":"have left"},{"key":"D","text":"had left"}],"correct":"B","explanation":"\"Would rather\" + subject + past simple for present/future preference: \"left\". For past, \"had left\"."},{"id":"q1088","number":1088,"text":"The lecturer spoke so fast that I could hardly make ______ what he was saying.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"out"},{"key":"B","text":"up"},{"key":"C","text":"off"},{"key":"D","text":"over"}],"correct":"A","explanation":"Phrasal verb \"make out\" = manage to understand or see. \"Make up\" = invent, reconcile. \"Make off\" = leave quickly."},{"id":"q1089","number":1089,"text":"______ I known the truth, I would have acted differently.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"If"},{"key":"B","text":"Had"},{"key":"C","text":"Should"},{"key":"D","text":"Were"}],"correct":"B","explanation":"Inversion of third conditional: \"Had I known\" = \"If I had known\"."},{"id":"q1090","number":1090,"text":"She's not used to ______ at in public.","level":"Advanced","topic":"المصدر و ing","options":[{"key":"A","text":"be laughed"},{"key":"B","text":"laughing"},{"key":"C","text":"being laughed"},{"key":"D","text":"laugh"}],"correct":"C","explanation":"\"Used to\" + gerund. Passive gerund: \"being laughed at\"."},{"id":"q1091","number":1091,"text":"The two countries are at ______ war.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"a"},{"key":"B","text":"the"},{"key":"C","text":"no article"},{"key":"D","text":"some"}],"correct":"C","explanation":"\"At war\" is a fixed phrase without an article."},{"id":"q1092","number":1092,"text":"He recommended that she ______ more time on research.","level":"Advanced","topic":"دقة عامة","options":[{"key":"A","text":"spends"},{"key":"B","text":"spent"},{"key":"C","text":"spend"},{"key":"D","text":"to spend"}],"correct":"C","explanation":"Subjunctive after \"recommend\": base form \"spend\"."},{"id":"q1093","number":1093,"text":"We were made ______ the documents twice.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"sign"},{"key":"B","text":"to sign"},{"key":"C","text":"signing"},{"key":"D","text":"signed"}],"correct":"B","explanation":"Passive \"make\" + to-infinitive: \"were made to sign\". Active: \"made us sign\"."},{"id":"q1094","number":1094,"text":"The view from the mountain was nothing short of ______.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"breathtaking"},{"key":"B","text":"breathtakingly"},{"key":"C","text":"breath"},{"key":"D","text":"breathed"}],"correct":"A","explanation":"\"Nothing short of\" + adjective/noun. \"Breathtaking\" is the adjective."},{"id":"q1095","number":1095,"text":"______ his disability, he achieved remarkable success.","level":"Advanced","topic":"الجر والتراكيب","options":[{"key":"A","text":"In spite of"},{"key":"B","text":"Despite"},{"key":"C","text":"Although"},{"key":"D","text":"A and B"}],"correct":"D","explanation":"Both \"In spite of\" and \"Despite\" are prepositions and take nouns/gerunds. \"Although\" is a conjunction and needs a clause."},{"id":"q1096","number":1096,"text":"You can't carry that heavy suitcase; let me help you, ______?","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"can you"},{"key":"B","text":"will you"},{"key":"C","text":"shall I"},{"key":"D","text":"do I"}],"correct":"C","explanation":"After an imperative \"let me\", the question tag is \"shall I?\"."},{"id":"q1097","number":1097,"text":"She left early, for she was feeling unwell. \"For\" here means:","level":"Advanced","topic":"الروابط والجمل","options":[{"key":"A","text":"because"},{"key":"B","text":"since"},{"key":"C","text":"before"},{"key":"D","text":"despite"}],"correct":"A","explanation":"\"For\" as a coordinating conjunction means \"because\" (literary/formal)."},{"id":"q1098","number":1098,"text":"The number of cases ______ decreasing.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"is"},{"key":"C","text":"have been"},{"key":"D","text":"were"}],"correct":"B","explanation":"\"The number\" is singular: \"is decreasing\"."},{"id":"q1099","number":1099,"text":"A number of suggestions ______ been made.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"has"},{"key":"B","text":"have"},{"key":"C","text":"is"},{"key":"D","text":"was"}],"correct":"B","explanation":"\"A number of\" is plural: \"have been made\"."},{"id":"q1100","number":1100,"text":"Not only the students but also the teacher ______ surprised by the announcement.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"were"},{"key":"B","text":"was"},{"key":"C","text":"are"},{"key":"D","text":"have been"}],"correct":"B","explanation":"Proximity rule with \"not only... but also\": verb agrees with the closest subject, \"teacher\" (singular), so \"was surprised\".\n\n---\n\n\nYes, inversion questions were already included in both the 1,000 questions and the 100 advanced questions (examples: Q1004, Q1008, Q1018, Q1022, Q1033, Q1048, Q1066, Q1078, Q1089, etc.). However, to guarantee that you have a dedicated, comprehensive set covering every subtle inversion pattern tested in advanced exams, I have created **20 additional pure inversion questions** that address the most challenging traps. Here they are:"},{"id":"q1101","number":1101,"text":"______ the opportunity, she would have been an excellent leader.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"If giving"},{"key":"B","text":"Had she been given"},{"key":"C","text":"Should she give"},{"key":"D","text":"Were she to give"}],"correct":"B","explanation":"Inverted third conditional. \"Had she been given the opportunity\" is the inversion of \"If she had been given\". The passive form \"been given\" is needed because the opportunity is received, not given by her."},{"id":"q1102","number":1102,"text":"Such was the force of the explosion ______ windows were shattered half a mile away.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"that"},{"key":"B","text":"so"},{"key":"C","text":"and"},{"key":"D","text":"which"}],"correct":"A","explanation":"\"Such + be + noun + that\" is an inverted structure meaning \"The force of the explosion was so great that...\". \"That\" introduces the result clause."},{"id":"q1103","number":1103,"text":"No sooner ______ the president's speech than the audience erupted in applause.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"finished"},{"key":"B","text":"had finished"},{"key":"C","text":"did finish"},{"key":"D","text":"was finished"}],"correct":"B","explanation":"\"No sooner... than\" requires past perfect in the inverted clause: \"No sooner had + subject + past participle\". \"No sooner had the president's speech finished\" (or \"had the president finished his speech\")."},{"id":"q1104","number":1104,"text":"Only when the investigation is complete ______ the truth.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"we will know"},{"key":"B","text":"will we know"},{"key":"C","text":"we know"},{"key":"D","text":"do we know"}],"correct":"B","explanation":"\"Only when\" introduces a time clause, and the inversion occurs in the main clause: \"will we know\". Present simple \"do we know\" would not fit the future sense of \"is complete\". Future auxiliary \"will\" is required."},{"id":"q1105","number":1105,"text":"At no point during the meeting ______ the budget deficit.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"was mentioned"},{"key":"B","text":"mentioned"},{"key":"C","text":"did mention"},{"key":"D","text":"was mentioning"}],"correct":"A","explanation":"\"At no point\" is a negative adverbial triggering inversion. The passive \"was the budget deficit mentioned\" is needed. The subject \"the budget deficit\" is singular, so \"was mentioned\". \"Did mention\" would be active, missing the subject."},{"id":"q1106","number":1106,"text":"Not a soul ______ when the intruder crept into the room.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"did hear"},{"key":"B","text":"heard"},{"key":"C","text":"was hearing"},{"key":"D","text":"could hear"}],"correct":"A","explanation":"\"Not a soul\" at the beginning requires inversion. The correct form is \"Not a soul did hear\" (auxiliary + subject + base verb) or \"Not a soul heard\" (if no auxiliary needed, but formal inversion uses \"did\"). Actually, with past simple, \"Not a soul heard\" is also grammatical and does not require inversion because the subject itself is negative. However, \"Not a soul did hear\" is an emphatic inversion. Many tests consider \"did hear\" as the inverted form. Let's verify: \"Not a soul did hear\" is an older literary inversion. More common inversion with \"Not a soul\" would be \"Not a soul was there\", but with an action verb, both \"Not a soul heard\" (no inversion) and \"Not a soul did hear\" (emphatic) exist. But the test trap: after a negative adverbial phrase that is the object (Not a soul), we often invert using \"did\". Actually, \"Not a soul did I hear\" would be correct if \"I\" is the subject. Here \"the intruder\" is the subject? Let's parse: \"Not a soul ______ when the intruder crept in.\" The implied subject of \"hear\" is \"soul\"? \"Not a soul heard\" means \"No one heard\", so \"soul\" is the subject. Then we don't invert because \"Not a soul\" is the subject, not an adverbial. Inversion is required when a negative adverbial (not the subject) begins the sentence. If \"Not a soul\" is the subject, inversion is wrong. So \"Not a soul heard\" is correct. I should rephrase the question to make it a clear inversion case. I'll change to: \"Not for a moment ______ that he was lying.\" Then inversion: \"did she suspect\". I'll adjust the question to avoid confusion.\n\n**Revised Question 1106:** Not for a moment ______ that he was lying.\nLevel: Advanced\nA) she suspected\nB) did she suspect\nC) she did suspect\nD) suspected she\nCorrect Answer: B\nExplanation: \"Not for a moment\" is a negative adverbial phrase requiring inversion. Past simple: \"did she suspect\"."},{"id":"q1107","number":1107,"text":"So brilliantly ______ the pianist that the audience gave a standing ovation.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"performed"},{"key":"B","text":"did perform"},{"key":"C","text":"did she perform"},{"key":"D","text":"she performed"}],"correct":"C","explanation":"\"So + adverb\" at the beginning triggers inversion: \"So brilliantly did she perform that...\"."},{"id":"q1108","number":1108,"text":"Under no circumstances ______ the confidentiality of our clients.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"we should compromise"},{"key":"B","text":"should we compromise"},{"key":"C","text":"we compromise"},{"key":"D","text":"we ought compromise"}],"correct":"B","explanation":"Negative adverbial: \"Under no circumstances\" → inversion \"should we compromise\". Modal \"should\" before subject."},{"id":"q1109","number":1109,"text":"Only after the results are published ______ the full extent of the damage.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"we will realise"},{"key":"B","text":"will we realise"},{"key":"C","text":"realise we"},{"key":"D","text":"we realise"}],"correct":"B","explanation":"\"Only after\" clause, main clause inverted with \"will\"."},{"id":"q1110","number":1110,"text":"Not until I saw the evidence with my own eyes ______ what had happened.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"I believed"},{"key":"B","text":"did I believe"},{"key":"C","text":"I did believe"},{"key":"D","text":"believed I"}],"correct":"B","explanation":"\"Not until\" at the beginning, main clause inverted with auxiliary \"did\" for past simple."},{"id":"q1111","number":1111,"text":"On no account ______ be held responsible for any loss or damage.","level":"Advanced","topic":"الأفعال الناقصة","options":[{"key":"A","text":"the company can"},{"key":"B","text":"can the company"},{"key":"C","text":"the company should"},{"key":"D","text":"does the company"}],"correct":"B","explanation":"\"On no account\" negative → inversion with modal \"can\"."},{"id":"q1112","number":1112,"text":"Rarely ______ such a display of public anger.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"has there been"},{"key":"B","text":"there has been"},{"key":"C","text":"there is"},{"key":"D","text":"is there"}],"correct":"A","explanation":"\"Rarely\" negative frequency → inversion. Present perfect \"has there been\" for an experience up to now."},{"id":"q1113","number":1113,"text":"Not only ______ the exam, but she also got the highest marks.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"she passed"},{"key":"B","text":"did she pass"},{"key":"C","text":"she did pass"},{"key":"D","text":"passed she"}],"correct":"B","explanation":"\"Not only\" requires inversion in the first clause."},{"id":"q1114","number":1114,"text":"Scarcely ______ the house than the phone rang.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"he had entered"},{"key":"B","text":"had he entered"},{"key":"C","text":"he entered"},{"key":"D","text":"did he enter"}],"correct":"B","explanation":"\"Scarcely... than/when\" uses past perfect inversion: \"Scarcely had he entered...\"."},{"id":"q1115","number":1115,"text":"To such an extent ______ that the airport was closed.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"the snow fell"},{"key":"B","text":"did the snow fall"},{"key":"C","text":"fell the snow"},{"key":"D","text":"the snow did fall"}],"correct":"B","explanation":"\"To such an extent\" + inversion: \"did the snow fall that...\". This pattern mirrors \"So heavily did it snow that...\"."},{"id":"q1116","number":1116,"text":"Never before ______ such a talented musician in this country.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"we have had"},{"key":"B","text":"have we had"},{"key":"C","text":"we had"},{"key":"D","text":"had we"}],"correct":"B","explanation":"\"Never before\" → inversion, present perfect \"have we had\" for experience up to now."},{"id":"q1117","number":1117,"text":"Little ______ that his words would come true one day.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"he knew"},{"key":"B","text":"did he know"},{"key":"C","text":"he did know"},{"key":"D","text":"knew he"}],"correct":"B","explanation":"\"Little\" as a negative adverb of degree → inversion. \"Little did he know\"."},{"id":"q1118","number":1118,"text":"______, I would not accept the offer.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"If I were you"},{"key":"B","text":"Were I you"},{"key":"C","text":"Was I you"},{"key":"D","text":"Should I be you"}],"correct":"B","explanation":"Inverted second conditional: \"Were I you\" = \"If I were you\". \"Should I be you\" is not standard."},{"id":"q1119","number":1119,"text":"Only by chance ______ the missing documents in the attic.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"they found"},{"key":"B","text":"did they find"},{"key":"C","text":"they did find"},{"key":"D","text":"found they"}],"correct":"B","explanation":"\"Only by chance\" → inversion with auxiliary \"did\" for past simple."},{"id":"q1120","number":1120,"text":"So intense ______ that they had to stop the match.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"the heat was"},{"key":"B","text":"was the heat"},{"key":"C","text":"the heat did be"},{"key":"D","text":"did the heat be"}],"correct":"B","explanation":"\"So + adjective\" at the beginning: \"So intense was the heat that...\". Inversion of the verb \"was\" before the subject.\n\n---\n\nI've checked the entire 1,120-question bank against your list of 20 advanced grammar rules. The following five topics were **not** explicitly covered with dedicated questions:\n\n- So / Neither Inversion (Agreement)  \n- Fronting  \n- Get-Passive  \n- Ellipsis  \n- Comparative Ellipsis  \n\nI have now created targeted questions for these missing patterns. They are numbered from 1121 to 1135. Here they are:"},{"id":"q1121","number":1121,"text":"A: \"I don't like horror movies.\" B: \"______.\"","level":"Advanced","topic":"التوافق والضمائر","options":[{"key":"A","text":"So do I"},{"key":"B","text":"Neither do I"},{"key":"C","text":"So I don't"},{"key":"D","text":"I don't too"}],"correct":"B","explanation":"To agree with a negative statement, we use \"Neither + auxiliary + subject\". \"Neither do I\" = \"I don't either\". \"So do I\" is for positive agreement. \"So I don't\" is wrong word order."},{"id":"q1122","number":1122,"text":"A: \"She has never been to Paris.\" B: \"______ her sister.\"","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"So has"},{"key":"B","text":"Neither has"},{"key":"C","text":"Nor did"},{"key":"D","text":"Either has"}],"correct":"B","explanation":"Negative agreement with \"neither/nor + auxiliary + subject\". \"Neither has her sister\" means \"Her sister hasn't either\". The present perfect auxiliary \"has\" matches the original statement."},{"id":"q1123","number":1123,"text":"A: \"I can speak three languages.\" B: \"Really? ______.\"","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"So can I"},{"key":"B","text":"So I can"},{"key":"C","text":"Neither can I"},{"key":"D","text":"I can so"}],"correct":"A","explanation":"Positive agreement uses \"So + auxiliary + subject\". \"So can I\" means \"I can too\". \"So I can\" is used to confirm a statement you already know, not to express that you share the ability."},{"id":"q1124","number":1124,"text":"The guests have arrived and with them ______ an unexpected relative from abroad.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"came"},{"key":"B","text":"have come"},{"key":"C","text":"comes"},{"key":"D","text":"did come"}],"correct":"A","explanation":"This is fronting of an adverbial phrase \"with them\". The subject \"an unexpected relative\" is singular, so \"came\" (past simple) or \"has come\" would work. The sentence is in the past, so \"came\" is correct. The fronting places emphasis on the relative's arrival. Option C \"comes\" would be present tense, inconsistent with \"have arrived\"."},{"id":"q1125","number":1125,"text":"A complete failure, ______.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"the project was considered"},{"key":"B","text":"was the project considered"},{"key":"C","text":"did the project consider"},{"key":"D","text":"the project considered"}],"correct":"A","explanation":"Fronting a subject complement (\"A complete failure\") does not trigger subject-verb inversion; the normal word order follows: \"A complete failure, the project was considered.\" This type of fronting is used for dramatic emphasis. Option B would incorrectly invert."},{"id":"q1126","number":1126,"text":"The most delicious cake I have ever eaten, ______.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"this is"},{"key":"B","text":"is this"},{"key":"C","text":"this was"},{"key":"D","text":"was this"}],"correct":"A","explanation":"Fronting of the object/complement phrase for emphasis. The standard word order after the fronted phrase is \"this is\". No inversion is required."},{"id":"q1127","number":1127,"text":"He ______ speeding twice last month, so he lost his licence.","level":"Advanced","topic":"الجمل الوصلية","options":[{"key":"A","text":"got caught"},{"key":"B","text":"was caught"},{"key":"C","text":"caught"},{"key":"D","text":"A and B"}],"correct":"D","explanation":"Both \"get caught\" and \"be caught\" are passives. \"Get caught\" often emphasises the result or the negative consequence, which fits here. \"Caught\" alone is active."},{"id":"q1128","number":1128,"text":"Several windows ______ during the storm.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"got broken"},{"key":"B","text":"were broken"},{"key":"C","text":"broke"},{"key":"D","text":"A and B"}],"correct":"D","explanation":"The get-passive (\"got broken\") and the be-passive (\"were broken\") are both possible. \"Get broken\" often implies that the breaking was a result of the circumstances or a mishap."},{"id":"q1129","number":1129,"text":"They ______ their house burgled while they were away on holiday.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"got"},{"key":"B","text":"had"},{"key":"C","text":"were"},{"key":"D","text":"both A and B"}],"correct":"D","explanation":"\"Get something done\" or \"have something done\" can both be used causatively for negative events. \"They got their house burgled\" and \"They had their house burgled\" mean the house was burgled, often with the nuance that it happened to them."},{"id":"q1130","number":1130,"text":"She can play the piano, but I ______.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"can't"},{"key":"B","text":"can't play"},{"key":"C","text":"can't play the piano"},{"key":"D","text":"All of the above"}],"correct":"D","explanation":"Ellipsis allows omission of the repeated verb phrase. \"I can't\" (verb phrase omitted), \"I can't play\" (object omitted), and \"I can't play the piano\" (full) are all grammatically correct, but \"I can't\" is the most typical example of ellipsis."},{"id":"q1131","number":1131,"text":"I told him to apologise, but he ______.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"refused to"},{"key":"B","text":"refused"},{"key":"C","text":"refused to apologise"},{"key":"D","text":"All of the above"}],"correct":"D","explanation":"After \"refused\", we can use \"to\" as a stranded infinitive marker (ellipsis of the infinitive phrase), or simply \"refused\", or the full form. All are correct, demonstrating verb phrase ellipsis."},{"id":"q1132","number":1132,"text":"She hasn't finished the report yet, but I hope she will ______ soon.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"finish"},{"key":"B","text":"finish it"},{"key":"C","text":"do"},{"key":"D","text":"A and B"}],"correct":"D","explanation":"After \"will\", we can omit the following verb phrase if it's understood. However, \"will\" alone without a verb sounds incomplete; we need either the full verb \"finish\" / \"finish it\" or use the pro-verb \"do\". But \"will finish\" with object \"it\" omitted is also ellipsis. The most natural ellipsis is \"will finish\" or \"will do\". I'll clarify: \"I hope she will finish it soon\" is full; \"I hope she will finish soon\" still has \"finish\" but object omitted; \"I hope she will do soon\" is a bit off. Actually, standard ellipsis: \"I hope she will\" is acceptable? \"I hope she will soon\" can stand with the verb omitted. So multiple ellipsis types. I'll set the answer to include \"finish it\" and \"finish\" as valid ellipses, and \"do\" as a possible substitute. I'll make the correct answer D (A and B) and explain that we often keep the main verb. I'll adjust options: A) finish it, B) finish, C) do, D) A and B. So D works."},{"id":"q1133","number":1133,"text":"He is much more patient than I ______.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"am"},{"key":"B","text":"am patient"},{"key":"C","text":"do"},{"key":"D","text":"A and B"}],"correct":"D","explanation":"Comparative ellipsis allows the omission of the adjective after \"than\". \"He is much more patient than I am\" (leaving out \"patient\") or \"He is much more patient than I\" (omitting even \"am\") are both correct. \"Than I am patient\" is full form, also grammatical but less common. So both A and B are acceptable, but A is the typical ellipsis. I'll set D (A and B) and explain."},{"id":"q1134","number":1134,"text":"The situation was far worse than we ______.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"had expected"},{"key":"B","text":"had expected it"},{"key":"C","text":"had expected it would be"},{"key":"D","text":"All of the above"}],"correct":"D","explanation":"All these are possible with comparative ellipsis. \"Than we had expected\" omits the object and complement; \"had expected it\" includes the object; \"had expected it would be\" is the full clause. All are correct."},{"id":"q1135","number":1135,"text":"Sarah's performance was as flawless as her brother's ______.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"was"},{"key":"B","text":"performance"},{"key":"C","text":"performance was"},{"key":"D","text":"All of the above"}],"correct":"D","explanation":"Ellipsis after possessive \"her brother's\". We can say \"as her brother's was\" (ellipsis of \"performance\"), \"as her brother's performance\" (including the noun but omitting \"was\"), or the full \"as her brother's performance was\". All are grammatically acceptable, demonstrating the flexibility of comparative ellipsis.\n\n---\n\nHere are 50 additional questions targeting the most common and persistent grammar mistakes learners make. These focus on subject-verb agreement traps, countable vs. uncountable errors, preposition misuse, gerund vs. infinitive, modal confusion, conditional errors, tense consistency, and article mistakes."},{"id":"q1138","number":1138,"text":"I have a few ______ for you regarding the proposal.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"advice"},{"key":"B","text":"advices"},{"key":"C","text":"pieces of advice"},{"key":"D","text":"piece of advices"}],"correct":"C","explanation":"\"Advice\" is uncountable. To count it, use \"pieces of advice\" or \"bits of advice\". \"Advices\" is incorrect."},{"id":"q1140","number":1140,"text":"I suggested that he ______ a doctor immediately.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"sees"},{"key":"B","text":"saw"},{"key":"C","text":"see"},{"key":"D","text":"to see"}],"correct":"C","explanation":"The subjunctive is used after \"suggest\". The base form of the verb is required: \"that he see\". No -s for third person singular."},{"id":"q1145","number":1145,"text":"Neither of the two candidates ______ suitable for the position.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"were"},{"key":"C","text":"is"},{"key":"D","text":"have been"}],"correct":"C","explanation":"\"Neither\" as a pronoun is singular and takes a singular verb \"is\". The prepositional phrase \"of the two candidates\" does not change the number."},{"id":"q1153","number":1153,"text":"It's high time the government ______ something about pollution.","level":"Advanced","topic":"الأزمنة","options":[{"key":"A","text":"does"},{"key":"B","text":"did"},{"key":"C","text":"has done"},{"key":"D","text":"will do"}],"correct":"B","explanation":"\"It's high time\" is followed by a past simple verb to express that something should have happened already. \"Did\" is correct here."},{"id":"q1159","number":1159,"text":"She's so ______ that she always makes mistakes when writing emails.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"careless"},{"key":"B","text":"carelessful"},{"key":"C","text":"carefully"},{"key":"D","text":"care"}],"correct":"A","explanation":"The sentence requires an adjective after \"so\" to describe \"She\". \"Careless\" is the correct adjective meaning not careful. \"Carelessful\" is a non-existent word."},{"id":"q1167","number":1167,"text":"Neither my parents nor my sister ______ coming to the airport.","level":"Advanced","topic":"الأدوات والأسماء","options":[{"key":"A","text":"are"},{"key":"B","text":"is"},{"key":"C","text":"have been"},{"key":"D","text":"were"}],"correct":"B","explanation":"With \"neither... nor\", the verb agrees with the noun closest to it. \"Sister\" is singular, so \"is\" is correct."}]</script>
  <script>
    const QUESTIONS = JSON.parse(document.getElementById("questions-data").textContent);
    const STORE_KEY = `grammarTrainerUsers.v2.${QUESTIONS.length}`;
    const REVIEW_STEPS_MS = [60_000, 10 * 60_000];
    const levelRank = { Beginner: 0, Intermediate: 1, Advanced: 2 };
    const queue = QUESTIONS.slice().sort((a, b) => (levelRank[a.level] ?? 9) - (levelRank[b.level] ?? 9) || a.number - b.number);
    const byId = Object.fromEntries(QUESTIONS.map((q) => [q.id, q]));
    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));

    let authMode = "login";
    let store = loadStore();
    let currentUser = null;
    let profile = null;
    let questionStartedAt = Date.now();
    let timerLast = Date.now();
    let lastShownMinute = -1;

    function loadStore() {
      try {
        return Object.assign({ users: {}, lastUser: "" }, JSON.parse(localStorage.getItem(STORE_KEY) || "{}"));
      } catch {
        return { users: {}, lastUser: "" };
      }
    }

    function saveStore() {
      localStorage.setItem(STORE_KEY, JSON.stringify(store));
    }

    function defaultProfile(username) {
      return {
        username,
        currentId: "",
        feedbackId: "",
        history: [],
        progress: {},
        daily: {},
        totalSeconds: 0,
        createdAt: Date.now(),
        updatedAt: Date.now()
      };
    }

    function normalizeUsername(value) {
      return value.trim().toLowerCase();
    }

    function makeSalt() {
      const bytes = new Uint8Array(16);
      crypto.getRandomValues(bytes);
      return Array.from(bytes, (b) => b.toString(16).padStart(2, "0")).join("");
    }

    async function sha256(text) {
      const encoded = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest("SHA-256", encoded);
      return Array.from(new Uint8Array(digest), (b) => b.toString(16).padStart(2, "0")).join("");
    }

    async function passwordHash(password, salt) {
      return sha256(`${salt}:${password}`);
    }

    function todayKey() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
    }

    function todayRecord() {
      profile.daily ||= {};
      const key = todayKey();
      profile.daily[key] ||= { seconds: 0 };
      return profile.daily[key];
    }

    function persistProfile() {
      if (!currentUser || !profile) return;
      profile.updatedAt = Date.now();
      store.users[currentUser].profile = profile;
      store.lastUser = currentUser;
      saveStore();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    function latinNumber(value) {
      return new Intl.NumberFormat("en-US").format(Number(value || 0));
    }

    function getProgress(id) {
      return profile.progress?.[id] || null;
    }

    function isMastered(id) {
      return Boolean(getProgress(id)?.mastered);
    }

    function totalErrors() {
      return Object.values(profile.progress || {}).reduce((sum, item) => sum + (item.wrongCount || 0), 0);
    }

    function dueReviewQuestions(now = Date.now()) {
      return queue
        .filter((q) => {
          const item = getProgress(q.id);
          return item && !item.mastered && item.dueAt <= now;
        })
        .sort((a, b) => getProgress(a.id).dueAt - getProgress(b.id).dueAt || a.number - b.number);
    }

    function newQuestions() {
      return queue.filter((q) => !getProgress(q.id));
    }

    function nextRecommended(excludeId = "") {
      const due = dueReviewQuestions().filter((q) => q.id !== excludeId);
      if (due.length) return due[0];
      const fresh = newQuestions().filter((q) => q.id !== excludeId);
      if (fresh.length) return fresh[0];
      return queue.find((q) => !isMastered(q.id) && q.id !== excludeId) || queue.find((q) => q.id !== excludeId) || queue[0];
    }

    function currentQuestion() {
      if (!profile.currentId || !byId[profile.currentId]) {
        profile.currentId = nextRecommended()?.id || queue[0]?.id || "";
      }
      return byId[profile.currentId];
    }

    function renderStats() {
      if (!profile) return;
      const mastered = queue.filter((q) => isMastered(q.id)).length;
      const minutes = Math.floor((todayRecord().seconds || 0) / 60);
      $("#todayMinutes").textContent = latinNumber(minutes);
      $("#masteredCount").textContent = latinNumber(mastered);
      $("#errorCount").textContent = latinNumber(totalErrors());
      $("#remainingCount").textContent = latinNumber(Math.max(queue.length - mastered, 0));
    }

    function answerButton(q, option, progress, answeredCurrent) {
      let cls = "answer-btn";
      if (answeredCurrent) {
        if (option.key === q.correct) cls += " correct";
        if (option.key === progress.selected && !progress.lastCorrect) cls += " wrong";
      }
      return `
        <button class="${cls}" data-answer="${option.key}" type="button" ${answeredCurrent ? "disabled" : ""}>
          <span class="answer-key">${option.key}</span>
          <span>${escapeHtml(option.text)}</span>
        </button>`;
    }

    function feedbackMarkup(q, progress, answeredCurrent) {
      if (!progress || !answeredCurrent) return "";
      const selected = q.options.find((opt) => opt.key === progress.selected);
      const correct = q.options.find((opt) => opt.key === q.correct);
      return `
        <div class="feedback-head ${progress.lastCorrect ? "ok" : "no"}">
          <span>${progress.lastCorrect ? "صحيح" : "غير صحيح"}</span>
          <span dir="ltr">${escapeHtml(selected?.text || progress.selected)}${progress.lastCorrect ? "" : " → " + escapeHtml(correct?.text || q.correct)}</span>
        </div>
        <div class="feedback-body">${escapeHtml(q.explanation)}</div>`;
    }

    function chatGptPrompt(q) {
      const correct = q.options.find((opt) => opt.key === q.correct);
      const options = q.options.map((opt) => `${opt.key}) ${opt.text}`).join("\n");
      return `اشرح لي قاعدة هذا السؤال في قواعد اللغة الإنجليزية شرحا تعليميا واضحا بالعربية.

السؤال:
${q.text}

الخيارات:
${options}

الإجابة الصحيحة:
${q.correct}) ${correct?.text || ""}

المطلوب:
اشرح القاعدة، ولماذا الإجابة الصحيحة صحيحة، ولماذا الخيارات الأخرى خطأ، ثم أعطني أمثلة إضافية وتمرينين قصيرين.`;
    }

    function openQuestionInChatGPT(q) {
      const url = `https://chatgpt.com/?q=${encodeURIComponent(chatGptPrompt(q))}`;
      const opened = window.open(url, "_blank", "noopener,noreferrer");
      if (!opened) window.location.href = url;
    }

    function renderQuestion() {
      if (!profile) return;
      renderStats();
      const q = currentQuestion();
      if (!q) {
        $("#questionArea").innerHTML = `<div class="empty">لا توجد أسئلة.</div>`;
        return;
      }
      const progress = getProgress(q.id);
      const mastered = queue.filter((item) => isMastered(item.id)).length;
      $("#progressBar").style.width = `${Math.round((mastered / queue.length) * 100)}%`;
      questionStartedAt = Date.now();
      if (profile.feedbackId !== q.id && (!progress || progress.answeredForShown)) {
        profile.progress ||= {};
        profile.progress[q.id] = Object.assign({}, progress || {}, { shownAt: questionStartedAt, answeredForShown: false });
        persistProfile();
      }

      const updatedProgress = getProgress(q.id);
      const answeredCurrent = Boolean(updatedProgress?.answeredForShown && profile.feedbackId === q.id);
      $("#questionArea").innerHTML = `
        <div class="q-meta">
          <span dir="ltr">${latinNumber(queue.findIndex((item) => item.id === q.id) + 1)} / ${latinNumber(queue.length)}</span>
          <span>#${q.number}</span>
        </div>
        <div class="question-text">${escapeHtml(q.text)}</div>
        <div class="answers">${q.options.map((option) => answerButton(q, option, updatedProgress, answeredCurrent)).join("")}</div>
        <div class="feedback ${answeredCurrent ? "show" : ""}">${feedbackMarkup(q, updatedProgress, answeredCurrent)}</div>
        <button class="gpt-btn" id="gptBtn" type="button">اسأل ChatGPT عن القاعدة</button>
        <div class="nav-only">
          <button class="nav-btn" id="prevBtn" type="button">السابق</button>
          <button class="nav-btn primary" id="nextBtn" type="button">التالي</button>
        </div>`;

      $$(".answer-btn").forEach((button) => button.addEventListener("click", () => chooseAnswer(button.dataset.answer)));
      $("#gptBtn").addEventListener("click", () => openQuestionInChatGPT(q));
      $("#prevBtn").addEventListener("click", previousQuestion);
      $("#nextBtn").addEventListener("click", nextQuestion);
    }

    function chooseAnswer(selected) {
      const q = currentQuestion();
      if (!q) return;
      const item = getProgress(q.id) || {};
      if (item.answeredForShown) return;

      const correct = selected === q.correct;
      const responseMs = Math.max(0, Math.min(600000, Date.now() - questionStartedAt));
      const attempts = (item.attempts || 0) + 1;
      const wrongCount = (item.wrongCount || 0) + (correct ? 0 : 1);
      const correctStreak = correct ? (item.correctStreak || 0) + 1 : 0;
      const needsReview = wrongCount > 0 && correctStreak < 2;
      const mastered = correct && !needsReview;
      const reviewIndex = Math.min(Math.max(correctStreak, 0), REVIEW_STEPS_MS.length - 1);
      const dueAt = mastered ? Infinity : Date.now() + (correct ? REVIEW_STEPS_MS[reviewIndex] : REVIEW_STEPS_MS[0]);
      const history = (item.history || []).concat([{ selected, correct, at: Date.now(), responseMs }]).slice(-20);

      profile.progress[q.id] = {
        attempts,
        wrongCount,
        correctCount: (item.correctCount || 0) + (correct ? 1 : 0),
        correctStreak,
        mastered,
        dueAt,
        selected,
        lastCorrect: correct,
        answeredForShown: true,
        lastAnsweredAt: Date.now(),
        shownAt: item.shownAt,
        responseMsTotal: (item.responseMsTotal || 0) + responseMs,
        history
      };
      profile.feedbackId = q.id;
      persistProfile();
      renderQuestion();
    }

    function previousQuestion() {
      const previousId = profile.history.pop();
      if (previousId && byId[previousId]) {
        profile.feedbackId = "";
        profile.currentId = previousId;
        persistProfile();
        renderQuestion();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function nextQuestion() {
      const currentId = profile.currentId;
      if (currentId) profile.history = (profile.history || []).concat(currentId).slice(-100);
      profile.feedbackId = "";
      profile.currentId = nextRecommended(currentId)?.id || currentId;
      persistProfile();
      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startMinuteTracker() {
      timerLast = Date.now();
      setInterval(() => {
        if (!profile || document.hidden) {
          timerLast = Date.now();
          return;
        }
        const now = Date.now();
        const delta = Math.min(30, Math.max(0, Math.round((now - timerLast) / 1000)));
        timerLast = now;
        if (!delta) return;
        profile.totalSeconds = (profile.totalSeconds || 0) + delta;
        todayRecord().seconds += delta;
        const minute = Math.floor((todayRecord().seconds || 0) / 60);
        persistProfile();
        if (minute !== lastShownMinute) {
          lastShownMinute = minute;
          renderStats();
        }
      }, 15000);
    }

    function setAuthMode(mode) {
      authMode = mode;
      $("#loginTab").classList.toggle("active", mode === "login");
      $("#registerTab").classList.toggle("active", mode === "register");
      $("#authSubmit").textContent = mode === "login" ? "دخول" : "تسجيل";
      $("#authMessage").textContent = "";
      $("#passwordInput").setAttribute("autocomplete", mode === "login" ? "current-password" : "new-password");
    }

    async function handleAuth(event) {
      event.preventDefault();
      const usernameRaw = $("#usernameInput").value.trim();
      const username = normalizeUsername(usernameRaw);
      const password = $("#passwordInput").value;
      if (username.length < 2 || password.length < 4) {
        $("#authMessage").textContent = "استخدم اسما من حرفين وكلمة مرور من 4 أحرف على الأقل.";
        return;
      }
      if (authMode === "register") {
        if (store.users[username]) {
          $("#authMessage").textContent = "هذا المستخدم موجود. استخدم الدخول.";
          return;
        }
        const salt = makeSalt();
        store.users[username] = {
          username: usernameRaw,
          salt,
          hash: await passwordHash(password, salt),
          profile: defaultProfile(usernameRaw)
        };
        saveStore();
        loginAs(username);
        return;
      }
      const account = store.users[username];
      if (!account || account.hash !== await passwordHash(password, account.salt)) {
        $("#authMessage").textContent = "اسم المستخدم أو كلمة المرور غير صحيحة.";
        return;
      }
      loginAs(username);
    }

    function loginAs(username) {
      currentUser = username;
      const account = store.users[username];
      profile = Object.assign(defaultProfile(account.username), account.profile || {});
      profile.progress ||= {};
      profile.history ||= [];
      profile.daily ||= {};
      $("#authScreen").hidden = true;
      $("#app").hidden = false;
      $("#userLabel").textContent = account.username;
      persistProfile();
      renderQuestion();
      window.scrollTo(0, 0);
    }

    function logout() {
      persistProfile();
      currentUser = null;
      profile = null;
      $("#app").hidden = true;
      $("#authScreen").hidden = false;
      $("#passwordInput").value = "";
      $("#authMessage").textContent = "";
    }

    function buildStats() {
      const topicStats = {};
      let attempts = 0;
      let correct = 0;
      let wrong = 0;
      let totalMs = 0;
      let dueNow = 0;

      for (const [id, item] of Object.entries(profile.progress || {})) {
        const q = byId[id];
        if (!q || !item.attempts) continue;
        attempts += item.attempts;
        correct += item.correctCount || 0;
        wrong += item.wrongCount || 0;
        totalMs += item.responseMsTotal || 0;
        if (!item.mastered && item.dueAt <= Date.now()) dueNow += 1;

        topicStats[q.topic] ||= { name: q.topic, attempts: 0, correct: 0, wrong: 0, totalMs: 0, due: 0, repeated: 0 };
        topicStats[q.topic].attempts += item.attempts || 0;
        topicStats[q.topic].correct += item.correctCount || 0;
        topicStats[q.topic].wrong += item.wrongCount || 0;
        topicStats[q.topic].totalMs += item.responseMsTotal || 0;
        if (!item.mastered && item.dueAt <= Date.now()) topicStats[q.topic].due += 1;
        if ((item.wrongCount || 0) >= 2) topicStats[q.topic].repeated += 1;
      }

      const decorate = (row) => ({
        ...row,
        accuracy: row.attempts ? Math.round((row.correct / row.attempts) * 100) : 0,
        avgSeconds: row.attempts ? Math.round((row.totalMs / row.attempts) / 1000) : 0,
        risk: row.wrong * 3 + row.repeated * 4 + row.due * 2 + Math.max(0, 70 - (row.attempts ? Math.round((row.correct / row.attempts) * 100) : 0))
      });

      return {
        attempts,
        correct,
        wrong,
        dueNow,
        accuracy: attempts ? Math.round((correct / attempts) * 100) : 0,
        avgSeconds: attempts ? Math.round((totalMs / attempts) / 1000) : 0,
        topics: Object.values(topicStats).map(decorate).sort((a, b) => b.risk - a.risk),
        repeated: Object.entries(profile.progress || {})
          .filter(([, item]) => (item.wrongCount || 0) >= 2)
          .map(([id, item]) => ({ q: byId[id], item }))
          .filter((entry) => entry.q)
          .sort((a, b) => (b.item.wrongCount || 0) - (a.item.wrongCount || 0))
          .slice(0, 8)
      };
    }

    function statCard(value, label) {
      return `<div class="analysis-card"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(label)}</span></div>`;
    }

    function rowMarkup(row) {
      return `
        <div class="list-item">
          <strong>${escapeHtml(row.name)} · ${latinNumber(row.accuracy)}%</strong>
          <p>محاولات ${latinNumber(row.attempts)} · أخطاء ${latinNumber(row.wrong)} · متكرر ${latinNumber(row.repeated)} · مراجعة الآن ${latinNumber(row.due)} · متوسط ${latinNumber(row.avgSeconds)}ث</p>
        </div>`;
    }

    function openAnalysis() {
      const stats = buildStats();
      $("#sheetTitle").textContent = "تحليل الأخطاء";
      if (!stats.attempts) {
        $("#sheetBody").innerHTML = `<div class="empty">أجب عن عدة أسئلة ليظهر تحليل مواضع الخلل.</div>`;
      } else {
        $("#sheetBody").innerHTML = `
          <div class="analysis-grid">
            ${statCard(`${latinNumber(stats.accuracy)}%`, "الدقة العامة")}
            ${statCard(latinNumber(stats.wrong), "إجمالي الأخطاء")}
            ${statCard(latinNumber(stats.dueNow), "مراجعات مستحقة")}
            ${statCard(`${latinNumber(stats.avgSeconds)}ث`, "متوسط زمن الإجابة")}
          </div>
          <div class="section-title">أضعف القواعد</div>
          <div class="list">${stats.topics.slice(0, 6).map(rowMarkup).join("") || `<div class="empty">لا توجد بيانات كافية.</div>`}</div>
          <div class="section-title">أخطاء متكررة</div>
          <div class="list">${stats.repeated.map(({ q, item }) => `
            <div class="list-item">
              <strong>#${q.number} · ${escapeHtml(q.topic)} · ${latinNumber(item.wrongCount)} أخطاء</strong>
              <p dir="ltr">${escapeHtml(q.text)}</p>
            </div>`).join("") || `<div class="empty">لا توجد أخطاء متكررة بعد.</div>`}</div>`;
      }
      $("#sheet").hidden = false;
    }

    function openCompleted() {
      const latestAt = (item) => item.history?.at(-1)?.at || item.lastAnsweredAt || 0;
      const items = Object.entries(profile.progress || {})
        .filter(([, item]) => item.attempts)
        .sort((a, b) => latestAt(b[1]) - latestAt(a[1]));
      $("#sheetTitle").textContent = "الأسئلة المنجزة";
      if (!items.length) {
        $("#sheetBody").innerHTML = `<div class="empty">لم تنجز أي سؤال بعد.</div>`;
      } else {
        $("#sheetBody").innerHTML = `
          <div class="list">${items.map(([id, item]) => {
            const q = byId[id];
            if (!q) return "";
            const status = item.mastered ? "متقن" : item.dueAt <= Date.now() ? "مراجعة الآن" : "قيد المراجعة";
            return `
              <div class="list-item">
                <button type="button" data-go="${id}">
                  <strong>#${q.number} · ${status} · أخطاء ${latinNumber(item.wrongCount || 0)}</strong>
                  <p dir="ltr">${escapeHtml(q.text)}</p>
                </button>
              </div>`;
          }).join("")}</div>`;
        $$("#sheetBody [data-go]").forEach((button) => button.addEventListener("click", () => {
          profile.currentId = button.dataset.go;
          $("#sheet").hidden = true;
          persistProfile();
          renderQuestion();
          window.scrollTo(0, 0);
        }));
      }
      $("#sheet").hidden = false;
    }

    function bindEvents() {
      $("#loginTab").addEventListener("click", () => setAuthMode("login"));
      $("#registerTab").addEventListener("click", () => setAuthMode("register"));
      $("#authForm").addEventListener("submit", handleAuth);
      $("#completedBtn").addEventListener("click", openCompleted);
      $("#analysisBtn").addEventListener("click", openAnalysis);
      $("#logoutBtn").addEventListener("click", logout);
      $("#closeSheet").addEventListener("click", () => $("#sheet").hidden = true);
      $("#sheet").addEventListener("click", (event) => {
        if (event.target.id === "sheet") $("#sheet").hidden = true;
      });
      document.addEventListener("keydown", (event) => {
        if (!profile || event.target.matches("input, textarea")) return;
        if (event.key === "ArrowLeft") nextQuestion();
        if (event.key === "ArrowRight") previousQuestion();
      });
    }

    function init() {
      bindEvents();
      if (store.lastUser && store.users[store.lastUser]) {
        $("#usernameInput").value = store.users[store.lastUser].username || store.lastUser;
      }
      setAuthMode("login");
      startMinuteTracker();
    }

    init();
  </script>
</body>
</html>
